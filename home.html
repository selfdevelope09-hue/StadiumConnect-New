<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; }
        .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .user-icon { width: 40px; height: 40px; background: #ff6b35; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
        .welcome { padding: 24px 20px; background: #fffaf5; }
        .welcome h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .location-bar { padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; }
        .location-btn { display: flex; align-items: center; gap: 8px; background: #f5f5f5; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .categories { padding: 24px 20px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .category-card { background: white; border: 1px solid #f0f0f0; border-radius: 16px; padding: 16px 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .category-card:hover { transform: translateY(-2px); border-color: #ffebe3; }
        .category-icon { font-size: 28px; margin-bottom: 8px; }
        .category-card h3 { font-size: 12px; font-weight: 600; }
        .cities { padding: 24px 20px; background: #fffaf5; }
        .city-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .city-chip { background: white; border: 1px solid #e0e0e0; padding: 10px 20px; border-radius: 30px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .city-chip:hover { background: #ff6b35; color: white; border-color: #ff6b35; }
        footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; }
        .loading-cities { text-align: center; padding: 20px; color: #999; }
        @media (max-width: 600px) { .category-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        async function loadPopularCities() {
            const container = document.getElementById('cityList');
            container.innerHTML = '<div class="loading-cities">Loading cities...</div>';
            
            try {
                const docRef = doc(db, 'settings', 'cities');
                const docSnap = await getDoc(docRef);
                let cities = [];
                
                if (docSnap.exists()) {
                    cities = docSnap.data().list || [];
                }
                
                // Filter only popular cities (where popular = true)
                const popularCities = cities.filter(c => c.popular === true).map(c => c.name);
                
                if (popularCities.length === 0) {
                    container.innerHTML = '<div class="loading-cities">No popular cities added. Add from admin panel.</div>';
                    return;
                }
                
                container.innerHTML = popularCities.map(city => `
                    <div class="city-chip" onclick="window.location.href='vendors.html?city=${city.toLowerCase()}'">
                        ${city}
                    </div>
                `).join('');
                
            } catch (error) {
                console.error("Error loading cities:", error);
                container.innerHTML = '<div class="loading-cities">Error loading cities. Please refresh.</div>';
            }
        }

        window.goToCategory = (category) => {
            window.location.href = `vendors.html?category=${category}`;
        };

        window.detectLocation = () => {
            if (navigator.geolocation) {
                document.getElementById('locationText').innerHTML = '📍 Detecting...';
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        window.location.href = `vendors.html?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`;
                    },
                    () => {
                        document.getElementById('locationText').innerHTML = '📍 Detect location';
                        alert('Please allow location access to see nearby vendors');
                    }
                );
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            }
        });

        loadPopularCities();
    </script>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="user-icon" onclick="window.location.href='profile.html'">👤</div>
</header>

<div class="welcome">
    <h2>Hello, <span id="userName">Guest</span>!</h2>
    <p>Plan your perfect event with us</p>
</div>

<div class="location-bar">
    <div class="location-btn" onclick="detectLocation()">
        <span>📍</span> <span id="locationText">Detect location</span>
    </div>
</div>

<div class="categories">
    <div class="section-title">Browse by category</div>
    <div class="category-grid">
        <div class="category-card" onclick="goToCategory('decorator')"><div class="category-icon">🎨</div><h3>Decorators</h3></div>
        <div class="category-card" onclick="goToCategory('photographer')"><div class="category-icon">📸</div><h3>Photographers</h3></div>
        <div class="category-card" onclick="goToCategory('caterer')"><div class="category-icon">🍽️</div><h3>Caterers</h3></div>
        <div class="category-card" onclick="goToCategory('bandbaja')"><div class="category-icon">🎵</div><h3>Band Baja</h3></div>
        <div class="category-card" onclick="goToCategory('stadium')"><div class="category-icon">🏟️</div><h3>Stadiums</h3></div>
    </div>
</div>

<div class="cities">
    <div class="section-title">Popular cities</div>
    <div class="city-list" id="cityList">
        <div class="loading-cities">Loading...</div>
    </div>
</div>

<footer>© 2025 StadiumConnect | Your Need, Our Network</footer>

</body>
</html>
