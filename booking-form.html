<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent: #ff6b35;
            --accent-dark: #e55a2b;
            --accent-light: #fff5f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body.dark {
            --bg-primary: #0a0a2a;
            --bg-secondary: #12122a;
            --bg-card: #1a1a3a;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-light: rgba(255, 107, 53, 0.15);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            background: none;
            -webkit-text-fill-color: var(--accent);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--accent-light);
            padding: 8px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .user-info i {
            color: var(--accent);
        }

        .theme-toggle, .logout-btn {
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--accent);
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            background: var(--accent);
            color: white;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 32px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #ff9068);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-light);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }

        .stat-info {
            flex: 1;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Booking Cards */
        .bookings-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .booking-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .booking-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-xl);
        }

        .booking-header {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .booking-id {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-confirmed, .status-completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .booking-body {
            padding: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .vendor-info {
            flex: 2;
            min-width: 200px;
        }

        .vendor-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .vendor-category {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .booking-details {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--accent);
        }

        .detail-info {
            flex: 1;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .amount-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
        }

        .booking-footer {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .review-btn {
            background: var(--accent-light);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--accent);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .review-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .rated-badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-card);
            border-radius: 32px;
            border: 1px solid var(--border-color);
        }

        .empty-state i {
            font-size: 80px;
            color: var(--text-muted);
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .empty-state a {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .empty-state a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 80px 40px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .modal-rating {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .modal-rating i {
            font-size: 40px;
            cursor: pointer;
            color: #cbd5e1;
            transition: all 0.2s ease;
        }

        .modal-rating i.active {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .modal textarea {
            width: 100%;
            padding: 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            resize: vertical;
            margin: 16px 0;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .btn-submit {
            background: var(--accent);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 50px;
            z-index: 2000;
            border-left: 4px solid var(--success);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .last-updated {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .page-header h1 { font-size: 28px; }
            .booking-body { flex-direction: column; }
            .booking-details { grid-template-columns: 1fr; }
            .stat-card { padding: 16px; }
            .stat-icon { width: 48px; height: 48px; font-size: 24px; }
            .stat-number { font-size: 24px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Loading...</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
        <p>View and manage all your bookings in one place</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div id="bookingsContainer"></div>
    <div id="lastUpdated" class="last-updated"></div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3>⭐ Rate Your Experience</h3>
        <p id="modalVendorName" style="color: var(--text-secondary); margin-bottom: 8px;"></p>
        <div class="modal-rating" id="modalRatingStars">
            <i class="fas fa-star" data-rating="1"></i>
            <i class="fas fa-star" data-rating="2"></i>
            <i class="fas fa-star" data-rating="3"></i>
            <i class="fas fa-star" data-rating="4"></i>
            <i class="fas fa-star" data-rating="5"></i>
        </div>
        <textarea id="modalReviewText" rows="4" placeholder="Share your experience... (optional)"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeReviewModal()">Cancel</button>
            <button class="btn-submit" onclick="submitReview()">Submit Review</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let unsubscribe = null;
    let currentBookingForReview = null;
    let selectedRating = 0;

    function setupRealtimeListener() {
        if (unsubscribe) unsubscribe();
        
        const bookingsRef = collection(db, "bookings");
        
        unsubscribe = onSnapshot(bookingsRef, async (snapshot) => {
            if (!currentUser) return;
            
            const userId = currentUser.uid;
            const userEmail = currentUser.email;
            const userBookings = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                let isUserBooking = false;
                
                const possibleFields = ['userId', 'user_id', 'customerId', 'customer_id', 'uid', 'bookedBy', 'booked_by'];
                
                for (let field of possibleFields) {
                    if (data[field] === userId || data[field] === userEmail) {
                        isUserBooking = true;
                        break;
                    }
                }
                
                if (isUserBooking) {
                    userBookings.push({ id: doc.id, ...data });
                }
            });
            
            userBookings.sort((a, b) => {
                const dateA = a.createdAt ? new Date(a.createdAt.seconds * 1000) : new Date(0);
                const dateB = b.createdAt ? new Date(b.createdAt.seconds * 1000) : new Date(0);
                return dateB - dateA;
            });
            
            for (let booking of userBookings) {
                const reviewId = `${booking.id}_${currentUser.uid}`;
                const reviewRef = doc(db, "reviews", reviewId);
                const reviewSnap = await getDoc(reviewRef);
                if (reviewSnap.exists()) {
                    booking.review = reviewSnap.data();
                }
            }
            
            allBookings = userBookings;
            updateUI();
            updateLastUpdated();
        }, (error) => {
            console.error("Real-time listener error:", error);
        });
    }
    
    function updateUI() {
        updateStats();
        renderBookings();
    }
    
    function updateLastUpdated() {
        document.getElementById('lastUpdated').innerHTML = `🟢 Live updates • Last synced: ${new Date().toLocaleString()}`;
    }
    
    function updateStats() {
        const total = allBookings.length;
        const confirmed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const totalAmount = allBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
        
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-number">${confirmed}</div>
                    <div class="stat-label">Confirmed</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <div class="stat-number">${pending}</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                <div class="stat-info">
                    <div class="stat-number">₹${formatAmount(totalAmount)}</div>
                    <div class="stat-label">Total Spent</div>
                </div>
            </div>
        `;
    }
    
    function formatAmount(amount) {
        if (amount >= 100000) return (amount / 100000).toFixed(1) + 'L';
        if (amount >= 1000) return (amount / 1000).toFixed(0) + 'k';
        return amount.toLocaleString();
    }
    
    function formatDate(timestamp) {
        if (!timestamp) return '-';
        try {
            if (timestamp.toDate) return timestamp.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            if (timestamp.seconds) return new Date(timestamp.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            return new Date(timestamp).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch {
            return '-';
        }
    }
    
    function renderBookings() {
        const container = document.getElementById('bookingsContainer');
        
        if (allBookings.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-alt"></i>
                    <h3>No Bookings Yet</h3>
                    <p>You haven't made any bookings yet. Start exploring and book your first event!</p>
                    <a href="vendors.html">Browse Vendors →</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="bookings-grid">
                ${allBookings.map(booking => `
                    <div class="booking-card">
                        <div class="booking-header">
                            <span class="booking-id"><i class="fas fa-hashtag"></i> ${booking.id.slice(-8)}</span>
                            <span class="status-badge status-${booking.status || 'pending'}">
                                <i class="fas ${getStatusIcon(booking.status)}"></i> ${booking.status || 'Pending'}
                            </span>
                        </div>
                        <div class="booking-body">
                            <div class="vendor-info">
                                <div class="vendor-name">${escapeHtml(booking.vendorName || booking.stadiumName || 'Vendor')}</div>
                                <span class="vendor-category"><i class="fas fa-tag"></i> ${booking.category || 'Event Service'}</span>
                            </div>
                            <div class="booking-details">
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-calendar-day"></i></div>
                                    <div class="detail-info">
                                        <div class="detail-label">Event Date</div>
                                        <div class="detail-value">${booking.eventDate || booking.date || 'To be confirmed'}</div>
                                    </div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-rupee-sign"></i></div>
                                    <div class="detail-info">
                                        <div class="detail-label">Total Amount</div>
                                        <div class="detail-value amount-value">₹${(booking.amount || 0).toLocaleString()}</div>
                                    </div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-calendar-plus"></i></div>
                                    <div class="detail-info">
                                        <div class="detail-label">Booked On</div>
                                        <div class="detail-value">${formatDate(booking.createdAt)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="booking-footer">
                            ${renderReviewButton(booking)}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function getStatusIcon(status) {
        switch(status) {
            case 'confirmed': return 'fa-check-circle';
            case 'completed': return 'fa-check-double';
            case 'pending': return 'fa-hourglass-half';
            case 'cancelled': return 'fa-times-circle';
            default: return 'fa-info-circle';
        }
    }
    
    function renderReviewButton(booking) {
        const canReview = (booking.status === 'completed' || booking.status === 'confirmed') && !booking.review;
        const hasReview = booking.review;
        
        if (hasReview) {
            const stars = '★'.repeat(booking.review.rating) + '☆'.repeat(5 - booking.review.rating);
            return `<span class="rated-badge"><i class="fas fa-star"></i> ${booking.review.rating}/5 • ${stars}</span>`;
        }
        
        if (canReview) {
            return `<button class="review-btn" onclick="openReviewModal('${booking.id}', '${escapeHtml(booking.vendorName || booking.stadiumName || 'Vendor')}')">
                        <i class="fas fa-star"></i> Write a Review
                    </button>`;
        }
        
        if (booking.status === 'pending') {
            return `<span class="rated-badge" style="background: rgba(245,158,11,0.15); color: var(--warning);">
                        <i class="fas fa-hourglass-half"></i> Awaiting Confirmation
                    </span>`;
        }
        
        return '';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.openReviewModal = (bookingId, vendorName) => {
        const booking = allBookings.find(b => b.id === bookingId);
        if (!booking) return;
        
        currentBookingForReview = booking;
        document.getElementById('modalVendorName').innerHTML = `Booking for: <strong>${vendorName}</strong>`;
        document.getElementById('modalReviewText').value = '';
        selectedRating = 0;
        updateModalStars(0);
        document.getElementById('reviewModal').classList.add('active');
    };
    
    function updateModalStars(rating) {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach((star, index) => {
            if (index < rating) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }
    
    function setupModalRating() {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.rating);
                updateModalStars(selectedRating);
            });
            star.addEventListener('mouseenter', () => {
                const rating = parseInt(star.dataset.rating);
                updateModalStars(rating);
            });
            star.addEventListener('mouseleave', () => {
                updateModalStars(selectedRating);
            });
        });
    }
    
    window.closeReviewModal = () => {
        document.getElementById('reviewModal').classList.remove('active');
        currentBookingForReview = null;
        selectedRating = 0;
    };
    
    window.submitReview = async () => {
        if (!currentBookingForReview) return;
        if (selectedRating === 0) {
            showToast("Please select a rating", true);
            return;
        }
        
        const comment = document.getElementById('modalReviewText').value.trim();
        
        try {
            const reviewId = `${currentBookingForReview.id}_${currentUser.uid}`;
            const reviewData = {
                bookingId: currentBookingForReview.id,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                vendorId: currentBookingForReview.vendorId || currentBookingForReview.stadiumId,
                vendorName: currentBookingForReview.vendorName || currentBookingForReview.stadiumName,
                rating: selectedRating,
                comment: comment,
                createdAt: new Date().toISOString()
            };
            
            await setDoc(doc(db, "reviews", reviewId), reviewData);
            currentBookingForReview.review = reviewData;
            
            showToast("✅ Thank you for your review!");
            closeReviewModal();
            renderBookings();
        } catch (error) {
            showToast("Error submitting review", true);
        }
    };
    
    function showToast(message, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    
    function logout() {
        if (unsubscribe) unsubscribe();
        auth.signOut();
        window.location.href = 'index.html';
    }
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }
    
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email?.split('@')[0] || 'User';
        setupRealtimeListener();
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        setupModalRating();
        document.getElementById('reviewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('reviewModal')) {
                closeReviewModal();
            }
        });
    });
    
    window.toggleTheme = toggleTheme;
    window.logout = logout;
</script>
</body>
</html>
