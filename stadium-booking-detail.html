<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stadium Booking - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; }

        .header {
            background: rgba(0,0,0,0.95);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
        }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #fff, #ff6b35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #ff6b35; }

        .container { max-width: 800px; margin: 0 auto; padding: 30px; }
        .booking-card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .stadium-name { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; color: white; font-size: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .portion-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .portion-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 30px; cursor: pointer; }
        .portion-btn.selected { background: #ff6b35; }
        .price-box { background: rgba(255,107,53,0.1); border-radius: 20px; padding: 20px; margin: 20px 0; text-align: center; }
        .price-amount { font-size: 36px; font-weight: 800; color: #ff6b35; }
        .book-btn { width: 100%; background: #ff6b35; color: white; border: none; padding: 18px; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="window.location.href='stadium-booking.html'">←</button>
    <div class="logo">STADIUM<span>CONNECT</span></div>
    <div style="width: 40px;"></div>
</header>

<div class="container">
    <div class="booking-card">
        <div class="stadium-name" id="stadiumName">Vidarbha Cricket Stadium</div>
        <div class="stadium-location" style="color:#aaa; margin-bottom: 24px;"><i class="fas fa-map-marker-alt"></i> <span id="stadiumLocation">Nagpur</span></div>
        
        <div class="portion-buttons">
            <div class="portion-btn" onclick="selectPortion(25)">25%</div>
            <div class="portion-btn" onclick="selectPortion(50)">50%</div>
            <div class="portion-btn" onclick="selectPortion(75)">75%</div>
            <div class="portion-btn" onclick="selectPortion(100)">Full Stadium</div>
        </div>
        
        <div class="price-box">
            <div style="font-size: 14px; color:#aaa;">AI Calculated Price</div>
            <div class="price-amount" id="priceAmount">₹0</div>
            <div style="font-size: 12px;" id="priceDetail">0% selected</div>
        </div>
        
        <form id="bookingForm">
            <div class="form-row">
                <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" required placeholder="Enter your name"></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required placeholder="10 digit mobile"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email *</label><input type="email" id="email" required placeholder="Email address"></div>
                <div class="form-group"><label>City *</label><input type="text" id="city" required placeholder="Your city"></div>
            </div>
            <div class="form-group"><label>Event Location *</label><input type="text" id="eventLocation" required placeholder="Full address"></div>
            <div class="form-row">
                <div class="form-group"><label>Event Date *</label><input type="date" id="eventDate" required></div>
                <div class="form-group"><label>Event Type *</label><select id="eventType" required><option>Wedding</option><option>Corporate</option><option>Concert</option><option>Sports</option></select></div>
            </div>
            <div class="form-group"><label>Expected Guests</label><input type="number" id="guestCount" placeholder="Number of guests"></div>
        </form>
        
        <button class="book-btn" onclick="bookStadium()"><i class="fas fa-credit-card"></i> Confirm Booking →</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const stadiumId = urlParams.get('id');

    let stadium = { name: "Vidarbha Cricket Stadium", city: "Nagpur", basePrice: 50000 };
    let selectedPercent = 50;

    async function loadStadium() {
        if (stadiumId) {
            const docSnap = await getDoc(doc(db, 'vendors', stadiumId));
            if (docSnap.exists()) {
                stadium = { id: docSnap.id, ...docSnap.data() };
                stadium.basePrice = parseInt(stadium.priceRange?.replace(/[^0-9]/g, '')) || 50000;
            }
        }
        document.getElementById('stadiumName').innerText = stadium.name;
        document.getElementById('stadiumLocation').innerText = stadium.city;
        updatePrice();
    }

    function selectPortion(percent) {
        selectedPercent = percent;
        document.querySelectorAll('.portion-btn').forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
        updatePrice();
    }

    function updatePrice() {
        let price = Math.floor(stadium.basePrice * (selectedPercent / 100));
        document.getElementById('priceAmount').innerHTML = `₹${price.toLocaleString()}`;
        document.getElementById('priceDetail').innerHTML = `${selectedPercent}% of stadium selected`;
    }

    window.bookStadium = async () => {
        const user = auth.currentUser;
        if (!user) { alert('Please login first'); window.location.href = 'login.html'; return; }
        
        const fullName = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const city = document.getElementById('city').value;
        const eventLocation = document.getElementById('eventLocation').value;
        const eventDate = document.getElementById('eventDate').value;
        const eventType = document.getElementById('eventType').value;
        
        if (!fullName || !phone || !email || !city || !eventLocation || !eventDate) {
            alert('Please fill all required fields');
            return;
        }
        
        let price = Math.floor(stadium.basePrice * (selectedPercent / 100));
        
        const booking = {
            vendorId: stadium.id,
            vendorName: stadium.name,
            vendorCity: stadium.city,
            category: 'stadium',
            userId: user.uid,
            userName: fullName,
            userPhone: phone,
            userEmail: email,
            userCity: city,
            eventLocation: eventLocation,
            eventDate: eventDate,
            eventType: eventType,
            guestCount: document.getElementById('guestCount').value,
            selectedPortion: `${selectedPercent}%`,
            amount: price,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        
        await addDoc(collection(db, 'bookings'), booking);
        alert(`✅ Booking request sent!\nStadium: ${stadium.name}\nDate: ${eventDate}\nAmount: ₹${price.toLocaleString()}\n\nAgent will contact you soon.`);
        window.location.href = 'dashboard.html';
    };

    window.selectPortion = selectPortion;
    loadStadium();
</script>

</body>
</html>
