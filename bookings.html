<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Theme Variables */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent: #ff6b35;
            --accent-light: #fff5f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg-primary: #0a0a2a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e3a;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            background: none;
            -webkit-text-fill-color: var(--accent);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--accent-light);
            padding: 8px 20px;
            border-radius: 40px;
        }

        .user-info i {
            color: var(--accent);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            background: var(--accent);
            color: white;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-5px);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 30px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Table Container */
        .table-container {
            overflow-x: auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            animation: fadeInUp 0.6s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-secondary);
        }

        tr {
            transition: background-color 0.3s ease;
        }

        tr:hover {
            background: rgba(255, 107, 53, 0.05);
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-confirmed, .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Review Button */
        .review-btn {
            background: rgba(255, 107, 53, 0.15);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            color: var(--accent);
            transition: all 0.2s ease;
        }

        .review-btn:hover {
            background: var(--accent);
            color: white;
        }

        .rated-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .empty-state a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-rating {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }

        .modal-rating i {
            font-size: 32px;
            cursor: pointer;
            color: #cbd5e1;
            transition: all 0.2s ease;
        }

        .modal-rating i.active {
            color: #fbbf24;
        }

        .modal textarea {
            width: 100%;
            padding: 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            resize: vertical;
            margin: 15px 0;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-submit {
            background: var(--accent);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            border-left: 4px solid var(--success);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .last-updated {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            th, td { font-size: 12px; padding: 10px 8px; }
            .stat-number { font-size: 24px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Loading...</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
        <p>View all your bookings, track status, and leave reviews</p>
    </div>

    <div class="stats-row" id="statsRow">
        <div class="stat-box"><div class="stat-number">0</div><div class="stat-label">Total Bookings</div></div>
        <div class="stat-box"><div class="stat-number">0</div><div class="stat-label">Confirmed</div></div>
        <div class="stat-box"><div class="stat-number">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-box"><div class="stat-number">₹0</div><div class="stat-label">Total Spent</div></div>
    </div>

    <div class="table-container">
        <div id="bookingsTable"></div>
        <div class="last-updated" id="lastUpdated"></div>
    </div>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3>⭐ Rate Your Experience</h3>
        <p id="modalVendorName" style="color: var(--text-secondary); margin-bottom: 10px;"></p>
        <div class="modal-rating" id="modalRatingStars">
            <i class="fas fa-star" data-rating="1"></i>
            <i class="fas fa-star" data-rating="2"></i>
            <i class="fas fa-star" data-rating="3"></i>
            <i class="fas fa-star" data-rating="4"></i>
            <i class="fas fa-star" data-rating="5"></i>
        </div>
        <textarea id="modalReviewText" rows="4" placeholder="Share your experience... (optional)"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeReviewModal()">Cancel</button>
            <button class="btn-submit" onclick="submitReview()">Submit Review</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let unsubscribeBookings = null;
    let currentBookingForReview = null;
    let selectedRating = 0;

    // Helper function to parse date from timestamp
    function parseDate(timestamp) {
        if (!timestamp) return new Date(0);
        if (timestamp.toDate) return timestamp.toDate();
        if (timestamp.seconds) return new Date(timestamp.seconds * 1000);
        if (typeof timestamp === 'string') return new Date(timestamp);
        return new Date(timestamp);
    }

    // Sort bookings by createdAt (newest first)
    function sortBookingsByDate(bookings) {
        return [...bookings].sort((a, b) => {
            const dateA = parseDate(a.createdAt);
            const dateB = parseDate(b.createdAt);
            return dateB - dateA;
        });
    }

    // Load bookings without orderBy (to avoid index requirement)
    function setupBookingsListener() {
        if (unsubscribeBookings) unsubscribeBookings();
        
        if (!currentUser) return;
        
        console.log("Setting up bookings listener for user:", currentUser.uid);
        
        // Try multiple possible field names that might store the user ID
        const possibleFields = ['userId', 'customerId', 'user_id', 'customer_id', 'uid', 'bookedBy'];
        
        // Function to fetch bookings for a specific field
        async function fetchBookingsForField(field) {
            try {
                const bookingsRef = collection(db, "bookings");
                const q = query(bookingsRef, where(field, "==", currentUser.uid));
                const snapshot = await getDocs(q);
                console.log(`Found ${snapshot.size} bookings with field: ${field}`);
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                console.error(`Error fetching with field ${field}:`, error);
                return [];
            }
        }
        
        // Try all fields and combine results
        async function loadAllBookings() {
            let allResults = [];
            for (let field of possibleFields) {
                const results = await fetchBookingsForField(field);
                allResults = [...allResults, ...results];
            }
            
            // Remove duplicates by id
            const uniqueBookings = [];
            const seenIds = new Set();
            for (let booking of allResults) {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            }
            
            // Sort by date (newest first)
            const sortedBookings = sortBookingsByDate(uniqueBookings);
            
            // Fetch reviews for each booking
            for (let booking of sortedBookings) {
                const reviewRef = doc(db, "reviews", `${booking.id}_${currentUser.uid}`);
                const reviewSnap = await getDoc(reviewRef);
                if (reviewSnap.exists()) {
                    booking.review = reviewSnap.data();
                }
            }
            
            allBookings = sortedBookings;
            console.log("Total unique bookings loaded:", allBookings.length);
            updateUI();
            updateLastUpdated();
        }
        
        // Initial load
        loadAllBookings();
        
        // Set up real-time listener (simplified - just reload every 30 seconds)
        // For real-time, we'd need proper listeners but this works without indexes
        const interval = setInterval(() => {
            if (currentUser) {
                loadAllBookings();
            }
        }, 30000);
        
        // Store cleanup function
        unsubscribeBookings = () => clearInterval(interval);
    }

    // Update all UI
    function updateUI() {
        updateStats();
        renderBookingsTable();
    }

    function updateLastUpdated() {
        document.getElementById('lastUpdated').innerHTML = `⏱️ Last sync: ${new Date().toLocaleString()}`;
    }

    function updateStats() {
        const total = allBookings.length;
        const confirmed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const totalAmount = allBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
        
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-box"><div class="stat-number">${total}</div><div class="stat-label">Total Bookings</div></div>
            <div class="stat-box"><div class="stat-number">${confirmed}</div><div class="stat-label">Confirmed</div></div>
            <div class="stat-box"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-box"><div class="stat-number">₹${totalAmount.toLocaleString()}</div><div class="stat-label">Total Spent</div></div>
        `;
    }

    function renderBookingsTable() {
        const container = document.getElementById('bookingsTable');
        
        if (allBookings.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-alt"></i>
                    <p>No bookings found</p>
                    <a href="vendors.html">Browse vendors and make your first booking →</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Vendor / Service</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Booked On</th>
                        <th>Review</th>
                    </tr>
                </thead>
                <tbody>
                    ${allBookings.map(booking => `
                        <tr>
                            <td><code>${booking.id.slice(-8)}</code></td>
                            <td>
                                <strong>${escapeHtml(booking.vendorName || booking.stadiumName || booking.serviceName || 'Vendor')}</strong>
                                <br><small style="color: var(--text-muted);">${booking.category || 'Event Service'}</small>
                            </td>
                            <td>${booking.eventDate || booking.date || booking.bookingDate || '-'}</td>
                            <td><strong>₹${(booking.amount || 0).toLocaleString()}</strong></td>
                            <td><span class="status-badge status-${booking.status || 'pending'}">${booking.status || 'pending'}</span></td>
                            <td><small>${formatDate(booking.createdAt)}</small></td>
                            <td>${renderReviewButton(booking)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function renderReviewButton(booking) {
        const canReview = (booking.status === 'completed' || booking.status === 'confirmed') && !booking.review;
        const hasReview = booking.review;
        
        if (hasReview) {
            const rating = booking.review.rating;
            return `
                <div class="rated-badge">
                    <i class="fas fa-star"></i> ${rating}/5
                    ${booking.review.comment ? `<br><small>${escapeHtml(booking.review.comment.substring(0, 30))}${booking.review.comment.length > 30 ? '...' : ''}</small>` : ''}
                </div>
            `;
        }
        
        if (canReview) {
            return `
                <button class="review-btn" onclick="openReviewModal('${booking.id}', '${escapeHtml(booking.vendorName || booking.stadiumName || 'Vendor')}')">
                    <i class="fas fa-star"></i> Rate & Review
                </button>
            `;
        }
        
        if (booking.status === 'pending') {
            return '<span style="color: var(--text-muted); font-size: 12px;">Awaiting confirmation</span>';
        }
        
        if (booking.status === 'cancelled') {
            return '<span style="color: var(--text-muted); font-size: 12px;">Cancelled</span>';
        }
        
        return '<span style="color: var(--text-muted); font-size: 12px;">—</span>';
    }

    function formatDate(timestamp) {
        if (!timestamp) return '-';
        try {
            if (timestamp.toDate) return timestamp.toDate().toLocaleDateString();
            if (timestamp.seconds) return new Date(timestamp.seconds * 1000).toLocaleDateString();
            if (typeof timestamp === 'string') return new Date(timestamp).toLocaleDateString();
            return '-';
        } catch {
            return '-';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Review Modal Functions
    window.openReviewModal = (bookingId, vendorName) => {
        const booking = allBookings.find(b => b.id === bookingId);
        if (!booking) return;
        
        currentBookingForReview = booking;
        document.getElementById('modalVendorName').innerHTML = `Booking for: <strong>${vendorName}</strong>`;
        document.getElementById('modalReviewText').value = '';
        selectedRating = 0;
        updateModalStars(0);
        document.getElementById('reviewModal').classList.add('active');
    };

    function updateModalStars(rating) {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach((star, index) => {
            if (index < rating) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }

    function setupModalRating() {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.rating);
                updateModalStars(selectedRating);
            });
            star.addEventListener('mouseenter', () => {
                const rating = parseInt(star.dataset.rating);
                updateModalStars(rating);
            });
            star.addEventListener('mouseleave', () => {
                updateModalStars(selectedRating);
            });
        });
    }

    window.closeReviewModal = () => {
        document.getElementById('reviewModal').classList.remove('active');
        currentBookingForReview = null;
        selectedRating = 0;
    };

    window.submitReview = async () => {
        if (!currentBookingForReview) return;
        if (selectedRating === 0) {
            showToast("Please select a rating", true);
            return;
        }
        
        const comment = document.getElementById('modalReviewText').value.trim();
        
        try {
            const reviewId = `${currentBookingForReview.id}_${currentUser.uid}`;
            const reviewData = {
                bookingId: currentBookingForReview.id,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                vendorId: currentBookingForReview.vendorId || currentBookingForReview.stadiumId,
                vendorName: currentBookingForReview.vendorName || currentBookingForReview.stadiumName,
                rating: selectedRating,
                comment: comment,
                createdAt: new Date().toISOString()
            };
            
            await setDoc(doc(db, "reviews", reviewId), reviewData);
            
            // Update local data
            currentBookingForReview.review = reviewData;
            
            showToast("✅ Thank you for your review!");
            closeReviewModal();
            renderBookingsTable(); // Refresh table
        } catch (error) {
            console.error("Error submitting review:", error);
            showToast("Error submitting review: " + error.message, true);
        }
    };

    // Toast Notification
    function showToast(message, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Theme Toggle
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    // Logout
    function logout() {
        if (unsubscribeBookings) unsubscribeBookings();
        auth.signOut();
        window.location.href = 'index.html';
    }

    // Initialize
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    // Auth State
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email?.split('@')[0] || 'User';
        setupBookingsListener();
    });

    // Setup modal rating after DOM ready
    document.addEventListener('DOMContentLoaded', () => {
        setupModalRating();
        document.getElementById('reviewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('reviewModal')) {
                closeReviewModal();
            }
        });
    });

    window.toggleTheme = toggleTheme;
    window.logout = logout;
</script>
</body>
</html>
