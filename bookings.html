<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #ffffff;
            --bg-card: #f5faff;
            --text-primary: #0e2a47;
            --text-secondary: #4f6f8d;
            --text-muted: #7391ac;
            --border-color: #cfe7ff;
            --accent: #ff7a1a;
            --accent-light: #fff1e2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body.dark {
            --bg-primary: #0a0a2a;
            --bg-secondary: #12122a;
            --bg-card: #1a1a3a;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #7391ac;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-light: rgba(255, 107, 53, 0.15);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #ffb066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--accent), #ffb066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--accent);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
        }

        /* Booking Cards */
        .bookings-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .booking-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .booking-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .booking-header {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .booking-id {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .status-confirmed, .status-completed { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-cancelled { background: rgba(239,68,68,0.15); color: var(--danger); }

        .booking-body {
            padding: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .vendor-info {
            flex: 2;
            min-width: 200px;
        }

        .vendor-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .booking-details {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--accent);
        }

        .detail-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
        }

        .amount-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
        }

        .booking-footer {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .review-btn {
            background: var(--accent-light);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--accent);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .review-btn:hover {
            background: var(--accent);
            color: white;
        }

        .rated-badge {
            background: rgba(16,185,129,0.15);
            color: var(--success);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
        }

        .modal-rating {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .modal-rating i {
            font-size: 40px;
            cursor: pointer;
            color: #cbd5e1;
            transition: all 0.2s ease;
        }

        .modal-rating i.active {
            color: #fbbf24;
        }

        .modal textarea {
            width: 100%;
            padding: 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin: 16px 0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            border-left: 4px solid var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .booking-body { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'"><img src="web-logo.png" alt="StadiumConnect logo" style="width:34px;height:34px;border-radius:8px;object-fit:cover;vertical-align:middle;margin-right:8px;">Stadium<span>Connect</span></div>
    <button class="theme-toggle" onclick="toggleTheme()" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">🌙</button>
</header>

<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
        <p>View all your bookings and leave reviews for completed events</p>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div id="bookingsContainer"></div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3>⭐ Rate Your Experience</h3>
        <p id="modalVendorName"></p>
        <div class="modal-rating" id="modalRatingStars">
            <i class="fas fa-star" data-rating="1"></i>
            <i class="fas fa-star" data-rating="2"></i>
            <i class="fas fa-star" data-rating="3"></i>
            <i class="fas fa-star" data-rating="4"></i>
            <i class="fas fa-star" data-rating="5"></i>
        </div>
        <textarea id="modalReviewText" rows="4" placeholder="Share your experience..."></textarea>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button onclick="closeReviewModal()" style="background: transparent; border: 1px solid var(--border-color); padding: 10px 24px; border-radius: 40px; cursor: pointer;">Cancel</button>
            <button onclick="submitReview()" style="background: var(--accent); border: none; padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer;">Submit Review</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let unsubscribe = null;
    let currentBookingForReview = null;
    let selectedRating = 0;

    function setupRealtimeListener() {
        if (unsubscribe) unsubscribe();
        if (!currentUser) return;
        
        const bookingsRef = collection(db, "bookings");
        unsubscribe = onSnapshot(bookingsRef, async (snapshot) => {
            const userId = currentUser.uid;
            const userEmail = currentUser.email;
            const userBookings = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                let isUserBooking = false;
                const possibleFields = ['userId', 'user_id', 'customerId', 'customer_id', 'uid', 'bookedBy'];
                for (let field of possibleFields) {
                    if (data[field] === userId || data[field] === userEmail) {
                        isUserBooking = true;
                        break;
                    }
                }
                if (isUserBooking) {
                    userBookings.push({ id: doc.id, ...data });
                }
            });
            
            userBookings.sort((a, b) => {
                const dateA = a.createdAt ? new Date(a.createdAt.seconds * 1000) : new Date(0);
                const dateB = b.createdAt ? new Date(b.createdAt.seconds * 1000) : new Date(0);
                return dateB - dateA;
            });
            
            // Check for existing reviews
            for (let booking of userBookings) {
                const reviewId = `${booking.id}_${currentUser.uid}`;
                const reviewRef = doc(db, "reviews", reviewId);
                const reviewSnap = await getDoc(reviewRef);
                if (reviewSnap.exists()) {
                    booking.review = reviewSnap.data();
                }
            }
            
            allBookings = userBookings;
            updateUI();
        });
    }
    
    function updateUI() {
        updateStats();
        renderBookings();
    }
    
    function updateStats() {
        const total = allBookings.length;
        const completed = allBookings.filter(b => b.status === 'completed' || b.status === 'confirmed').length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const totalAmount = allBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
        
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div><div class="stat-number">${total}</div><div>Total Bookings</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div><div class="stat-number">${completed}</div><div>Completed</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div><div class="stat-number">${pending}</div><div>Pending</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div><div class="stat-number">₹${totalAmount.toLocaleString()}</div><div>Total Spent</div></div></div>
        `;
    }
    
    function renderBookings() {
        const container = document.getElementById('bookingsContainer');
        
        if (allBookings.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-alt" style="font-size: 64px; margin-bottom: 20px;"></i><p>No bookings yet</p><a href="directory.html" style="color: var(--accent);">Browse vendors →</a></div>`;
            return;
        }
        
        container.innerHTML = `
            <div class="bookings-grid">
                ${allBookings.map(booking => `
                    <div class="booking-card">
                        <div class="booking-header">
                            <span class="booking-id"><i class="fas fa-hashtag"></i> ${booking.id.slice(-8)}</span>
                            <span class="status-badge status-${booking.status || 'pending'}">
                                <i class="fas ${booking.status === 'completed' ? 'fa-check-double' : booking.status === 'confirmed' ? 'fa-check-circle' : booking.status === 'pending' ? 'fa-hourglass-half' : 'fa-times-circle'}"></i>
                                ${booking.status || 'Pending'}
                            </span>
                        </div>
                        <div class="booking-body">
                            <div class="vendor-info">
                                <div class="vendor-name">${escapeHtml(booking.vendorName || booking.stadiumName || 'Vendor')}</div>
                                <span style="background: var(--accent-light); padding: 4px 12px; border-radius: 20px; font-size: 12px;">${booking.category || 'Event'}</span>
                            </div>
                            <div class="booking-details">
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-calendar-day"></i></div>
                                    <div><div class="detail-label">Event Date</div><div class="detail-value">${booking.eventDate || booking.date || '-'}</div></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-rupee-sign"></i></div>
                                    <div><div class="detail-label">Amount</div><div class="detail-value amount-value">₹${(booking.amount || 0).toLocaleString()}</div></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><i class="fas fa-calendar-plus"></i></div>
                                    <div><div class="detail-label">Booked On</div><div class="detail-value">${formatDate(booking.createdAt)}</div></div>
                                </div>
                            </div>
                        </div>
                        <div class="booking-footer">
                            ${renderReviewButton(booking)}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function renderReviewButton(booking) {
        // Only show review button for COMPLETED bookings that haven't been reviewed yet
        const canReview = booking.status === 'completed' && !booking.review;
        const hasReview = booking.review;
        
        if (hasReview) {
            return `<span class="rated-badge"><i class="fas fa-star"></i> Rated ${booking.review.rating}/5 • Thank you!</span>`;
        }
        
        if (canReview) {
            return `<button class="review-btn" onclick="openReviewModal('${booking.id}', '${escapeHtml(booking.vendorName || booking.stadiumName || 'Vendor')}')">
                        <i class="fas fa-star"></i> Leave a Review
                    </button>`;
        }
        
        if (booking.status === 'confirmed') {
            return `<span class="rated-badge" style="background: rgba(16,185,129,0.15); color: var(--success);"><i class="fas fa-clock"></i> Awaiting Completion</span>`;
        }
        
        if (booking.status === 'pending') {
            return `<span class="rated-badge" style="background: rgba(245,158,11,0.15); color: var(--warning);"><i class="fas fa-hourglass-half"></i> Pending Confirmation</span>`;
        }
        
        return '';
    }
    
    function formatDate(timestamp) {
        if (!timestamp) return '-';
        try {
            if (timestamp.toDate) return timestamp.toDate().toLocaleDateString();
            if (timestamp.seconds) return new Date(timestamp.seconds * 1000).toLocaleDateString();
            return new Date(timestamp).toLocaleDateString();
        } catch { return '-'; }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.openReviewModal = (bookingId, vendorName) => {
        const booking = allBookings.find(b => b.id === bookingId);
        if (!booking) return;
        
        currentBookingForReview = booking;
        document.getElementById('modalVendorName').innerHTML = `Booking for: <strong>${vendorName}</strong>`;
        document.getElementById('modalReviewText').value = '';
        selectedRating = 0;
        updateModalStars(0);
        document.getElementById('reviewModal').classList.add('active');
    };
    
    function updateModalStars(rating) {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach((star, index) => {
            if (index < rating) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }
    
    function setupModalRating() {
        const stars = document.querySelectorAll('#modalRatingStars i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.rating);
                updateModalStars(selectedRating);
            });
            star.addEventListener('mouseenter', () => {
                const rating = parseInt(star.dataset.rating);
                updateModalStars(rating);
            });
            star.addEventListener('mouseleave', () => {
                updateModalStars(selectedRating);
            });
        });
    }
    
    window.closeReviewModal = () => {
        document.getElementById('reviewModal').classList.remove('active');
        currentBookingForReview = null;
    };
    
    window.submitReview = async () => {
        if (!currentBookingForReview) return;
        if (selectedRating === 0) {
            showToast("Please select a rating", true);
            return;
        }
        
        const comment = document.getElementById('modalReviewText').value.trim();
        
        try {
            const reviewId = `${currentBookingForReview.id}_${currentUser.uid}`;
            const reviewData = {
                bookingId: currentBookingForReview.id,
                vendorId: currentBookingForReview.vendorId,
                vendorName: currentBookingForReview.vendorName,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                rating: selectedRating,
                comment: comment,
                createdAt: new Date().toISOString()
            };
            
            await setDoc(doc(db, "reviews", reviewId), reviewData);
            currentBookingForReview.review = reviewData;
            
            showToast("✅ Thank you for your review!");
            closeReviewModal();
            renderBookings();
        } catch (error) {
            showToast("Error submitting review", true);
        }
    };
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.cssText = `position: fixed; bottom: 30px; right: 30px; background: var(--bg-card); padding: 12px 24px; border-radius: 50px; z-index: 2000; border-left: 4px solid ${isError ? '#ef4444' : '#10b981'};`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }
    
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        setupRealtimeListener();
    });
    
    document.addEventListener('DOMContentLoaded', setupModalRating);
    window.toggleTheme = toggleTheme;
</script>
</body>
</html>
