<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let currentFilter = 'all';
    let currentBookingForReview = null;
    let selectedRating = 0;
    let unsubscribeBookings = null;

    // Fix: Query without direct orderBy to avoid Index errors, then sort manually
    function setupRealtimeBookings() {
        if (!currentUser) return;
        
        // Simpler query to ensure it doesn't fail due to missing index
        const q = query(
            collection(db, "bookings"),
            where("userId", "==", currentUser.uid)
        );
        
        if (unsubscribeBookings) unsubscribeBookings();
        
        unsubscribeBookings = onSnapshot(q, async (snapshot) => {
            allBookings = snapshot.docs.map(doc => ({ 
                id: doc.id, 
                ...doc.data(),
                amount: Number(doc.data().amount) || 0,
                // Handle both Firestore Timestamp and String dates
                createdDate: doc.data().createdAt?.seconds ? new Date(doc.data().createdAt.seconds * 1000) : new Date(doc.data().createdAt)
            }));

            // Manual sorting by date (latest first)
            allBookings.sort((a, b) => b.createdDate - a.createdDate);
            
            console.log("✅ Data Received:", allBookings);
            updateUI();
        }, (error) => {
            console.error("Firebase Error:", error);
            showToast("Sync Error: " + error.message, true);
        });
    }

    // --- Baki functions (showToast, toggleTheme, particles, updateUI, etc.) same rahenge ---
    // [Tumhara baki logic yahan continue hoga...]

    // Make sure updateUI calls renderBookingsTable correctly
    async function updateUI() {
        updateStats();
        await renderBookingsTable();
    }

    // Review Modal & Auth logic remains same as your original code
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            setupRealtimeBookings();
        } else {
            window.location.href = 'login.html';
        }
    });

    // Initial setup
    createParticles();
    setupStarRating();
</script>
