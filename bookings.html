<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - StadiumConnect Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --primary-light: #ff9068;
            --dark: #0a0a2a;
            --darker: #050517;
            --light: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: #fff;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            color: var(--dark);
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .animated-bg .gradient-1 {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,107,53,0.15) 0%, transparent 50%);
            animation: rotate1 25s linear infinite;
        }

        .animated-bg .gradient-2 {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 60%, rgba(139,92,246,0.1) 0%, transparent 50%);
            animation: rotate2 30s linear infinite reverse;
        }

        @keyframes rotate1 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate2 {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,107,53,0.4);
            border-radius: 50%;
            animation: floatParticle var(--duration, 15s) infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(10, 10, 42, 0.85);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }

        body.light-mode .header {
            background: rgba(255, 255, 255, 0.85);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,107,53,0.15);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,107,53,0.3);
        }

        .user-info i {
            color: var(--primary);
        }

        .user-info span {
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle, .share-btn, .back-btn {
            background: rgba(255,107,53,0.15);
            border: 1px solid rgba(255,107,53,0.3);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            color: var(--primary);
        }

        .theme-toggle:hover, .share-btn:hover, .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239,68,68,0.4);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease;
        }

        .page-header h1 {
            font-size: 36px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header p {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }

        body.light-mode .page-header p {
            color: #666;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.1s backwards;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        body.light-mode .stat-card {
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .stat-card:hover::after {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,107,53,0.5);
        }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-top: 5px;
        }

        body.light-mode .stat-label {
            color: #777;
        }

        /* Bookings Card */
        .bookings-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.2s backwards;
        }

        body.light-mode .bookings-card {
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--primary);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: inherit;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .filter-btn:hover {
            background: rgba(255,107,53,0.3);
            transform: translateY(-2px);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        body.light-mode th, body.light-mode td {
            border-bottom: 1px solid #eee;
        }

        th {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        body.light-mode th {
            color: #888;
        }

        td {
            color: rgba(255,255,255,0.9);
        }

        body.light-mode td {
            color: #444;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        body.light-mode tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.3);
        }

        .status-confirmed, .status-completed {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .status-cancelled {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }

        .review-btn {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .review-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(245,158,11,0.4);
        }

        .reviewed-badge {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Review Modal */
        .review-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .review-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .review-modal-content {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            border-radius: 36px;
            padding: 36px;
            max-width: 520px;
            width: 90%;
            border: 1px solid rgba(255,107,53,0.4);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        body.light-mode .review-modal-content {
            background: white;
        }

        .review-modal-content h3 {
            font-size: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .star-rating {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .star-rating i {
            font-size: 44px;
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s ease;
        }

        .star-rating i:hover, .star-rating i.active {
            color: #ffb347;
            transform: scale(1.1);
        }

        .review-modal textarea {
            width: 100%;
            padding: 16px;
            border-radius: 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 24px;
        }

        body.light-mode .review-modal textarea {
            background: #f5f5f5;
            color: #333;
            border-color: #ddd;
        }

        .review-modal button {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            padding: 14px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.6);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 60px;
            z-index: 2000;
            border-left: 4px solid var(--success);
            color: white;
            animation: slideInRight 0.3s ease;
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .page-header h1 {
                font-size: 28px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            th, td {
                padding: 12px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg">
    <div class="gradient-1"></div>
    <div class="gradient-2"></div>
</div>
<div class="particles" id="particles"></div>

<header class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-info">
            <i class="fas fa-user-astronaut"></i>
            <span id="userName">Loading...</span>
        </div>
        <div class="header-actions">
            <button class="share-btn" onclick="shareBookings()"><i class="fas fa-share-alt"></i></button>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-ticket-alt" style="color: var(--primary);"></i> My Bookings</h1>
        <p>View and manage all your bookings, track status, and share your experience</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="bookings-card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-list"></i> All Bookings</div>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="confirmed">Confirmed</button>
            <button class="filter-btn" data-filter="cancelled">Cancelled</button>
        </div>
        <div class="table-container" id="bookingsContainer"></div>
    </div>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="review-modal">
    <div class="review-modal-content">
        <h3><i class="fas fa-star" style="color: #ffb347;"></i> Rate Your Experience</h3>
        <div class="star-rating" id="reviewStars">
            <i class="far fa-star" data-rating="1"></i>
            <i class="far fa-star" data-rating="2"></i>
            <i class="far fa-star" data-rating="3"></i>
            <i class="far fa-star" data-rating="4"></i>
            <i class="far fa-star" data-rating="5"></i>
        </div>
        <textarea id="reviewComment" rows="4" placeholder="Share your experience with this vendor..."></textarea>
        <button onclick="submitReviewFromModal()"><i class="fas fa-paper-plane"></i> Submit Review</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy, onSnapshot, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let currentFilter = 'all';
    let currentBookingForReview = null;
    let selectedRating = 0;
    let unsubscribeBookings = null;

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    window.shareBookings = async () => {
        const total = allBookings.length;
        const completed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const shareData = {
            title: 'My Bookings - StadiumConnect',
            text: `I've booked ${total} events on StadiumConnect! ${completed} completed successfully.`,
            url: window.location.href
        };
        if (navigator.share) {
            try {
                await navigator.share(shareData);
                showToast('Shared successfully!');
            } catch (err) {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied!');
            }
        } else {
            navigator.clipboard.writeText(window.location.href);
            showToast('Link copied!');
        }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 80; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.setProperty('--duration', (Math.random() * 20 + 10) + 's');
            particle.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(particle);
        }
    }

    async function checkIfUserReviewed(vendorId) {
        if (!currentUser) return false;
        try {
            const q = query(
                collection(db, "reviews"),
                where("userId", "==", currentUser.uid),
                where("vendorId", "==", vendorId)
            );
            const snapshot = await getDocs(q);
            return snapshot.size > 0;
        } catch (error) {
            console.error("Error checking review:", error);
            return false;
        }
    }

    function setupRealtimeBookings() {
        if (!currentUser) return;
        
        // IMPORTANT: Filter by userId - sirf current user ki bookings
        const q = query(
            collection(db, "bookings"),
            where("userId", "==", currentUser.uid),
            orderBy("createdAt", "desc")
        );
        
        if (unsubscribeBookings) unsubscribeBookings();
        
        unsubscribeBookings = onSnapshot(q, async (snapshot) => {
            allBookings = snapshot.docs.map(doc => ({ 
                id: doc.id, 
                ...doc.data(),
                amount: Number(doc.data().amount) || 0
            }));
            console.log("✅ Loaded bookings for user:", currentUser.uid, "Count:", allBookings.length);
            await updateUI();
        }, (error) => {
            console.error("Realtime error:", error);
            showToast("Error loading bookings: " + error.message, true);
        });
    }

    async function updateUI() {
        updateStats();
        await renderBookingsTable();
    }

    function updateStats() {
        const total = allBookings.length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const completed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const cancelled = allBookings.filter(b => b.status === 'cancelled').length;
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-value">${total}</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-value">${pending}</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-double"></i></div>
                <div class="stat-value">${completed}</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
                <div class="stat-value">${cancelled}</div>
                <div class="stat-label">Cancelled</div>
            </div>
        `;
    }

    async function renderBookingsTable() {
        const container = document.getElementById('bookingsContainer');
        
        let filteredBookings = allBookings;
        if (currentFilter === 'pending') {
            filteredBookings = allBookings.filter(b => b.status === 'pending');
        } else if (currentFilter === 'confirmed') {
            filteredBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        } else if (currentFilter === 'cancelled') {
            filteredBookings = allBookings.filter(b => b.status === 'cancelled');
        }
        
        if (filteredBookings.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No ${currentFilter === 'all' ? '' : currentFilter} bookings found.</p>
                    ${currentFilter !== 'all' ? '<button class="filter-btn" onclick="document.querySelector(\'[data-filter="all"]\').click()" style="margin-top: 15px;">View All</button>' : '<a href="vendors.html" style="display: inline-block; margin-top: 15px; background: var(--primary); color: white; padding: 10px 28px; border-radius: 40px; text-decoration: none;">Browse Vendors →</a>'}
                </div>
            `;
            return;
        }
        
        let html = `
             <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Vendor</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Booked On</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        for (const booking of filteredBookings) {
            const hasReviewed = await checkIfUserReviewed(booking.vendorId);
            const isCompleted = booking.status === 'confirmed' || booking.status === 'completed';
            const bookedDate = booking.createdAt ? new Date(booking.createdAt).toLocaleDateString() : '-';
            
            html += `
                <tr>
                    <td><code>${booking.id.slice(-8)}</code></td>
                    <td>
                        <strong>${booking.vendorName || booking.vendor || '-'}</strong>
                        <br><small style="opacity:0.7;">${booking.category || 'stadium'}</small>
                    </td>
                    <td>${booking.eventDate || booking.date || '-'}</td>
                    <td style="color: var(--primary); font-weight: 600;">₹${(booking.amount || 0).toLocaleString()}</td>
                    <td><span class="status-badge status-${booking.status || 'pending'}">${booking.status || 'pending'}</span></td>
                    <td><small>${bookedDate}</small></td>
                    <td>
                        ${isCompleted && !hasReviewed ? 
                            `<button class="review-btn" data-booking='${JSON.stringify(booking).replace(/'/g, "&#39;")}'><i class="fas fa-star"></i> Rate & Review</button>` : 
                            (hasReviewed ? '<span class="reviewed-badge"><i class="fas fa-check-circle"></i> Reviewed</span>' : '<span style="opacity:0.5;">—</span>')}
                    </td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        
        document.querySelectorAll('.review-btn').forEach(btn => {
            btn.onclick = () => {
                try {
                    const booking = JSON.parse(btn.dataset.booking.replace(/&#39;/g, "'"));
                    openReviewModal(booking);
                } catch(e) {
                    console.error("Parse error:", e);
                }
            };
        });
    }

    function openReviewModal(booking) {
        currentBookingForReview = booking;
        selectedRating = 0;
        document.getElementById('reviewComment').value = '';
        
        const stars = document.querySelectorAll('#reviewStars i');
        stars.forEach(star => {
            star.className = 'far fa-star';
            star.style.color = '#ddd';
        });
        
        document.getElementById('reviewModal').classList.add('active');
    }

    function setupStarRating() {
        const stars = document.querySelectorAll('#reviewStars i');
        stars.forEach(star => {
            star.onmouseenter = () => {
                const rating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= rating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
            star.onmouseleave = () => {
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
            star.onclick = () => {
                selectedRating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
        });
    }

    window.submitReviewFromModal = async () => {
        if (selectedRating === 0) {
            showToast('Please select a rating', true);
            return;
        }
        
        const comment = document.getElementById('reviewComment').value.trim();
        if (!comment) {
            showToast('Please write your review', true);
            return;
        }
        
        try {
            await addDoc(collection(db, 'reviews'), {
                vendorId: currentBookingForReview.vendorId,
                vendorName: currentBookingForReview.vendorName,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0],
                rating: selectedRating,
                comment: comment,
                bookingId: currentBookingForReview.id,
                createdAt: new Date().toISOString()
            });
            
            showToast('✅ Thank you for your review!');
            document.getElementById('reviewModal').classList.remove('active');
            await renderBookingsTable();
        } catch (error) {
            showToast('Failed to submit review: ' + error.message, true);
        }
    };

    function closeModalOnBackground(e) {
        if (e.target === document.getElementById('reviewModal')) {
            document.getElementById('reviewModal').classList.remove('active');
        }
    }

    window.logout = () => {
        if (unsubscribeBookings) unsubscribeBookings();
        auth.signOut();
        localStorage.removeItem('user');
        localStorage.removeItem('theme');
        window.location.href = 'index.html';
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { 
            window.location.href = 'login.html'; 
            return; 
        }
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email?.split('@')[0] || 'User';
        console.log("✅ User logged in:", currentUser.uid);
        setupRealtimeBookings();
    });

    document.getElementById('reviewModal').addEventListener('click', closeModalOnBackground);
    setupStarRating();
    createParticles();
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderBookingsTable();
        };
    });
</script>
</body>
</html>
