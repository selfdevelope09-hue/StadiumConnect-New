<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #050517 100%);
            color: #fff;
            min-height: 100vh;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            color: #1a1a2e;
        }
        .header {
            background: rgba(10, 10, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }
        body.light-mode .header { background: rgba(255, 255, 255, 0.95); }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,107,53,0.2);
            padding: 8px 20px;
            border-radius: 40px;
        }
        .theme-toggle {
            background: rgba(255,107,53,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #ff6b35;
        }
        .back-btn {
            background: rgba(255,107,53,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            color: #ff6b35;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ff6b35;
        }
        .table-container {
            overflow-x: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
        }
        body.light-mode .table-container {
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        body.light-mode th, body.light-mode td {
            border-bottom: 1px solid #eee;
        }
        th {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 13px;
        }
        body.light-mode th {
            color: #666;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-confirmed { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-cancelled { background: rgba(239,68,68,0.2); color: #ef4444; }
        .empty-state {
            text-align: center;
            padding: 60px;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Loading...</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
        <p>View all your booking history and track status</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="table-container">
        <div id="bookingsTable"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let bookings = [];

    async function loadBookings() {
        const q = query(collection(db, "bookings"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        bookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderStats();
        renderTable();
    }

    function renderStats() {
        const total = bookings.length;
        const pending = bookings.filter(b => b.status === 'pending').length;
        const confirmed = bookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const totalAmount = bookings.reduce((sum, b) => sum + (b.amount || 0), 0);
        
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-box"><div class="stat-number">${total}</div><div>Total Bookings</div></div>
            <div class="stat-box"><div class="stat-number">${pending}</div><div>Pending</div></div>
            <div class="stat-box"><div class="stat-number">${confirmed}</div><div>Confirmed</div></div>
            <div class="stat-box"><div class="stat-number">₹${totalAmount.toLocaleString()}</div><div>Total Spent</div></div>
        `;
    }

    function renderTable() {
        const container = document.getElementById('bookingsTable');
        if (bookings.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px;"></i><p>No bookings yet</p><a href="vendors.html" style="color: #ff6b35;">Browse vendors →</a></div>';
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Vendor</th><th>Event Date</th><th>Amount</th><th>Status</th><th>Booked On</th></tr>
                </thead>
                <tbody>
                    ${bookings.map(b => `
                        <tr>
                            <td><code>${b.id.slice(-8)}</code></td>
                            <td><strong>${b.vendorName || '-'}</strong><br><small>${b.category || 'stadium'}</small></td>
                            <td>${b.eventDate || '-'}</td>
                            <td>₹${(b.amount || 0).toLocaleString()}</td>
                            <td><span class="status-badge status-${b.status || 'pending'}">${b.status || 'pending'}</span></td>
                            <td><small>${b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '-'}</small></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    function logout() {
        auth.signOut();
        window.location.href = 'index.html';
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email?.split('@')[0] || 'User';
        loadBookings();
    });
</script>
</body>
</html>
