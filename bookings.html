<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let currentFilter = 'all';

    // 1. Toast Notification
    function showToast(msg, err = false) {
        const t = document.createElement('div');
        t.className = `toast ${err ? 'error' : ''}`;
        t.innerHTML = `<i class="fas ${err ? 'fa-exclamation' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // 2. Realtime Listener (Fixed & Simplified)
    function setupRealtimeBookings() {
        if (!currentUser) return;
        
        // Sabse simple query: sirf userId check karo (Index error se bachne ke liye)
        const bookingsRef = collection(db, "bookings");
        const q = query(bookingsRef, where("userId", "==", currentUser.uid));

        onSnapshot(q, (snapshot) => {
            allBookings = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                // Date format fix karein
                let bookingDate = data.createdAt;
                if(bookingDate?.seconds) bookingDate = new Date(bookingDate.seconds * 1000);
                else if(typeof bookingDate === 'string') bookingDate = new Date(bookingDate);
                else bookingDate = new Date();

                allBookings.push({ 
                    id: doc.id, 
                    ...data, 
                    sortDate: bookingDate 
                });
            });

            // Sort manually: Newest First
            allBookings.sort((a, b) => b.sortDate - a.sortDate);
            
            console.log("Bookings Sync Success:", allBookings.length);
            updateUI();
        }, (err) => {
            console.error("Firebase Error:", err);
            showToast("Sync Failed!", true);
        });
    }

    // 3. UI Update Functions
    async function updateUI() {
        updateStats();
        await renderTable();
    }

    function updateStats() {
        const stats = {
            total: allBookings.length,
            pending: allBookings.filter(b => b.status === 'pending').length,
            done: allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length,
            fail: allBookings.filter(b => b.status === 'cancelled').length
        };
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-value">${stats.total}</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-value">${stats.pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-value">${stats.done}</div><div class="stat-label">Confirmed</div></div>
            <div class="stat-card"><div class="stat-value">${stats.fail}</div><div class="stat-label">Cancelled</div></div>
        `;
    }

    async function renderTable() {
        const container = document.getElementById('bookingsContainer');
        let filtered = allBookings;

        if (currentFilter !== 'all') {
            if (currentFilter === 'confirmed') filtered = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
            else filtered = allBookings.filter(b => b.status === currentFilter);
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No bookings found.</p></div>`;
            return;
        }

        let html = `<table><thead><tr><th>ID</th><th>Vendor</th><th>Event Date</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        
        filtered.forEach(b => {
            const statusClass = `status-${b.status || 'pending'}`;
            html += `
                <tr>
                    <td><code>${b.id.slice(-6)}</code></td>
                    <td><strong>${b.vendorName || 'Stadium'}</strong></td>
                    <td>${b.eventDate || b.date || '-'}</td>
                    <td style="color:var(--primary); font-weight:700;">₹${b.amount || 0}</td>
                    <td><span class="status-badge ${statusClass}">${b.status || 'pending'}</span></td>
                    <td>${(b.status === 'confirmed' || b.status === 'completed') ? '<button class="review-btn">Review</button>' : '—'}</td>
                </tr>`;
        });
        container.innerHTML = html + `</tbody></table>`;
    }

    // 4. Auth State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            setupRealtimeBookings();
        } else {
            window.location.href = 'login.html';
        }
    });

    // Event Listeners for Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderTable();
        };
    });

    // Initialize Animations
    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };
</script>
