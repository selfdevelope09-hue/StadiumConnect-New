<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('id');

    // Variables ko window pe attach kiya taaki functions unhe har jagah se access kar sakein
    window.currentVendor = null;
    window.currentPhotos = [];
    window.currentPhotoIndex = 0;
    window.cityAgent = null;

    // 1. Load Vendor Data
    async function loadVendor() {
        if (!vendorId) {
            document.getElementById('vendorDetail').innerHTML = '<div>ID missing in URL</div>';
            return;
        }

        try {
            const vendorDoc = await getDoc(doc(db, 'vendors', vendorId));
            if (vendorDoc.exists()) {
                window.currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                window.currentPhotos = window.currentVendor.photos || [];
                if (window.currentPhotos.length === 0 && window.currentVendor.imageUrl) {
                    window.currentPhotos = [window.currentVendor.imageUrl];
                }
                
                // Agent find karein city ke basis pe
                if (window.currentVendor.city) {
                    const agentsSnap = await getDocs(collection(db, "agents"));
                    agentsSnap.forEach(doc => {
                        const data = doc.data();
                        if (data.city && data.city.toLowerCase() === window.currentVendor.city.toLowerCase()) {
                            window.cityAgent = { id: doc.id, ...data };
                        }
                    });
                }
                
                renderVendorUI();
                updatePaymentPlan();
                setupCallButton();
            } else {
                document.getElementById('vendorDetail').innerHTML = '<div>Vendor not found in database</div>';
            }
        } catch (err) {
            console.error("Load error:", err);
            document.getElementById('vendorDetail').innerHTML = '<div>Error loading data. Check console.</div>';
        }
    }

    // 2. Render UI
    function renderVendorUI() {
        const v = window.currentVendor;
        const rating = v.rating || 4.5;
        let stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));

        document.getElementById('vendorDetail').innerHTML = `
            <div class="vendor-card">
                <div class="vendor-header">
                    <img src="${v.imageUrl || 'https://via.placeholder.com/80'}" class="vendor-avatar">
                    <div class="vendor-info">
                        <h1>${v.name || 'Vendor'}</h1>
                        <div class="vendor-rating"><div class="stars">${stars}</div><span>${rating}</span></div>
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${v.location || v.city || 'N/A'}</div>
                    <div class="info-row"><i class="fas fa-tag"></i> ${v.category || 'Vendor'}</div>
                    <div class="price-box"><span>Price</span><span class="price-value">${v.priceRange || 'Contact'}</span></div>
                </div>
                <div class="gallery-section">
                    <div style="font-weight:600; margin-bottom:12px;">📷 Work Portfolio</div>
                    <div class="gallery-grid">
                        ${window.currentPhotos.slice(0,6).map((p,i)=>`<div class="gallery-item" onclick="window.openLightbox(${i})"><img src="${p}"></div>`).join('')}
                    </div>
                </div>
            </div>`;
    }

    function updatePaymentPlan() {
        const planDiv = document.getElementById('paymentPlan');
        if (window.currentVendor.category === 'decorator') {
            planDiv.innerHTML = `<div class="payment-plan"><strong>📅 3-Step Payment Plan Active</strong></div>`;
        } else {
            planDiv.innerHTML = `<div class="payment-plan"><strong>💰 Full Payment at Booking</strong></div>`;
        }
    }

    function setupCallButton() {
        const callBtn = document.getElementById('callBtn');
        if (window.cityAgent && window.cityAgent.phone) {
            callBtn.style.display = 'flex';
            callBtn.onclick = () => window.location.href = `tel:${window.cityAgent.phone}`;
            callBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Call Agent`;
            
            const sugg = document.getElementById('agentSuggestion');
            if(sugg) sugg.innerHTML = `💡 Agent ${window.cityAgent.name} will handle your booking.`;
        }
    }

    // 3. BOOKING FUNCTION (Most Important)
    window.submitBooking = async () => {
        const user = auth.currentUser;
        if (!user) { alert('Please login first'); return; }

        const bookingBtn = document.querySelector('.book-btn');
        const originalText = bookingBtn.innerHTML;

        // Form values
        const data = {
            vendorId: vendorId,
            vendorName: window.currentVendor?.name || 'Unknown',
            userId: user.uid,
            userName: document.getElementById('userName').value,
            userPhone: document.getElementById('userPhone').value,
            eventDate: document.getElementById('eventDate').value,
            eventLocation: document.getElementById('eventLocation').value,
            eventType: document.getElementById('eventType').value,
            agentId: document.getElementById('agentId').value || (window.cityAgent ? window.cityAgent.id : 'Direct'),
            status: 'pending',
            createdAt: new Date().toISOString()
        };

        if (!data.userName || !data.userPhone || !data.eventDate || !data.eventLocation) {
            alert('Please fill all marked (*) fields');
            return;
        }

        try {
            bookingBtn.disabled = true;
            bookingBtn.innerHTML = "Processing...";
            await addDoc(collection(db, 'bookings'), data);
            alert('✅ Booking Request Sent!');
            window.location.href = 'dashboard.html';
        } catch (err) {
            alert('❌ Error: ' + err.message);
            bookingBtn.disabled = false;
            bookingBtn.innerHTML = originalText;
        }
    };

    // 4. Lightbox Functions
    window.openLightbox = (index) => {
        window.currentPhotoIndex = index;
        document.getElementById('lightboxImage').src = window.currentPhotos[index];
        document.getElementById('lightbox').classList.add('active');
    };
    window.closeLightbox = () => document.getElementById('lightbox').classList.remove('active');

    // Auth state logic
    onAuthStateChanged(auth, (user) => {
        if (user) document.getElementById('userName').value = user.displayName || '';
    });

    // Start loading
    loadVendor();
</script>
