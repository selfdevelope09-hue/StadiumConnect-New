<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('id');

    // Global variables taaki HTML buttons access kar sakein
    window.currentVendor = null;
    window.currentPhotos = [];
    window.currentPhotoIndex = 0;
    window.cityAgent = null;

    // --- 1. LOAD DATA ---
    async function loadVendor() {
        if (!vendorId) {
            document.getElementById('vendorDetail').innerHTML = '<div style="padding:20px; text-align:center;">Vendor ID missing!</div>';
            return;
        }

        try {
            const vendorDoc = await getDoc(doc(db, 'vendors', vendorId));
            if (vendorDoc.exists()) {
                window.currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                window.currentPhotos = window.currentVendor.photos || [];
                if (window.currentPhotos.length === 0 && window.currentVendor.imageUrl) {
                    window.currentPhotos = [window.currentVendor.imageUrl];
                }
                
                // Agent dhoondo city ke liye
                if (window.currentVendor.city) {
                    const agentsSnap = await getDocs(collection(db, "agents"));
                    agentsSnap.forEach(docSnap => {
                        const agentData = docSnap.data();
                        if (agentData.city && agentData.city.toLowerCase() === window.currentVendor.city.toLowerCase()) {
                            window.cityAgent = { id: docSnap.id, ...agentData };
                        }
                    });
                }
                
                renderVendor();
                updatePaymentPlan();
                setupAgentUI();
            } else {
                document.getElementById('vendorDetail').innerHTML = '<div style="padding:20px; text-align:center;">Vendor Not Found!</div>';
            }
        } catch (err) {
            console.error("Error loading vendor:", err);
        }
    }

    // --- 2. RENDER FUNCTIONS ---
    function renderVendor() {
        const v = window.currentVendor;
        const stars = '★'.repeat(Math.floor(v.rating || 4)) + '☆'.repeat(5 - Math.floor(v.rating || 4));
        
        document.getElementById('vendorDetail').innerHTML = `
            <div class="vendor-card">
                <div class="vendor-header">
                    <img src="${v.imageUrl || 'https://via.placeholder.com/80'}" class="vendor-avatar">
                    <div class="vendor-info">
                        <h1>${v.name || 'Vendor'}</h1>
                        <div class="vendor-rating"><div class="stars">${stars}</div><span>${v.rating || 4.5}</span></div>
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${v.location || v.city || 'Location'}</div>
                    <div class="info-row"><i class="fas fa-tag"></i> ${v.category || 'Vendor'}</div>
                    <div class="price-box"><span>Price Range</span><span class="price-value">${v.priceRange || 'Contact'}</span></div>
                </div>
                <div class="gallery-section">
                    <div style="font-weight:600; margin-bottom:12px;">📷 Work Portfolio</div>
                    <div class="gallery-grid">
                        ${window.currentPhotos.slice(0,6).map((p,i)=>`<div class="gallery-item" onclick="window.openLightbox(${i})"><img src="${p}"></div>`).join('')}
                    </div>
                </div>
            </div>`;
    }

    function updatePaymentPlan() {
        const planDiv = document.getElementById('paymentPlan');
        const isDecorator = window.currentVendor?.category?.toLowerCase() === 'decorator';
        planDiv.innerHTML = isDecorator ? 
            `<div class="payment-plan"><strong>📅 3-Installment Plan (Decorator)</strong></div>` : 
            `<div class="payment-plan"><strong>💰 Full Payment at Booking</strong></div>`;
    }

    function setupAgentUI() {
        const callBtn = document.getElementById('callBtn');
        const sugg = document.getElementById('agentSuggestion');
        if (window.cityAgent) {
            if (callBtn) {
                callBtn.style.display = 'flex';
                callBtn.onclick = () => window.location.href = `tel:${window.cityAgent.phone}`;
                callBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Call Agent (${window.cityAgent.name})`;
            }
            if (sugg) sugg.innerHTML = `💡 Agent ${window.cityAgent.name} will be assigned automatically.`;
        }
    }

    // --- 3. THE BOOKING FIX ---
    window.submitBooking = async () => {
        const user = auth.currentUser;
        if (!user) { alert('Please login to book!'); window.location.href='login.html'; return; }

        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const date = document.getElementById('eventDate').value;
        const location = document.getElementById('eventLocation').value.trim();

        if (!name || !phone || !date || !location) {
            alert('Please fill all required fields (*)');
            return;
        }

        const btn = document.querySelector('.book-btn');
        const originalText = btn.innerHTML;
        
        try {
            btn.disabled = true;
            btn.innerHTML = "Booking...";

            const bookingData = {
                vendorId: vendorId,
                vendorName: window.currentVendor?.name || 'Unknown',
                userId: user.uid,
                userName: name,
                userPhone: phone,
                eventDate: date,
                eventLocation: location,
                eventType: document.getElementById('eventType').value,
                agentId: document.getElementById('agentId').value || (window.cityAgent ? window.cityAgent.id : 'Direct'),
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            await addDoc(collection(db, 'bookings'), bookingData);
            alert('✅ Booking request sent! Check your dashboard.');
            window.location.href = 'dashboard.html';
        } catch (error) {
            console.error(error);
            alert('❌ Booking failed: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    };

    // Lightbox & Helper functions
    window.openLightbox = (i) => { window.currentPhotoIndex = i; document.getElementById('lightboxImage').src = window.currentPhotos[i]; document.getElementById('lightbox').classList.add('active'); };
    window.closeLightbox = () => { document.getElementById('lightbox').classList.remove('active'); };
    
    onAuthStateChanged(auth, (user) => {
        if (user && !document.getElementById('userName').value) {
            document.getElementById('userName').value = user.displayName || '';
        }
    });

    loadVendor();
</script>
