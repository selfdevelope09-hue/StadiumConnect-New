<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vendor Details - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #1a1a1a;
        }

        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #ff6b35;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
        }

        .logo span {
            color: #ff6b35;
        }

        .placeholder {
            width: 40px;
        }

        .hero-banner {
            height: 200px;
            background: linear-gradient(135deg, #ff6b35, #ff9068);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vendor-icon-large {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: absolute;
            bottom: -30px;
            left: 20px;
        }

        .content {
            padding: 50px 20px 100px;
        }

        .vendor-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .vendor-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stars {
            color: #ffb347;
            font-size: 14px;
        }

        .rating-value {
            font-size: 14px;
            font-weight: 500;
            color: #666;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #666;
        }

        .info-row i {
            width: 20px;
            color: #ff6b35;
        }

        .price-box {
            background: #fff5f0;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 14px;
            color: #666;
        }

        .price-value {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b35;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
        }

        .description {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
        }

        /* Photo Gallery */
        .photos-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: #f5f5f5;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: #f5f5f5;
            color: #ccc;
        }

        .view-all-btn {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #ff6b35;
        }

        /* Lightbox Modal for Full Screen Photos */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 12px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }

        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 50%;
        }

        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        /* Reviews */
        .review-card {
            background: #f8f8f8;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .reviewer-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .review-stars {
            font-size: 12px;
            color: #ffb347;
            margin-bottom: 8px;
        }

        .review-text {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .book-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            z-index: 100;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #ff6b35;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .modal-btn {
            width: 100%;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab",
            measurementId: "G-X4S6Z1QPC1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const vendorId = urlParams.get('id');

        let currentVendor = null;
        let currentUser = null;
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (vendorId) loadVendorDetails();
        });

        async function loadVendorDetails() {
            const container = document.getElementById('vendorDetail');
            if (!vendorId) {
                container.innerHTML = '<div class="loading">No vendor selected</div>';
                document.getElementById('bookBtn').style.display = 'none';
                return;
            }
            
            try {
                const vendorRef = doc(db, 'vendors', vendorId);
                const vendorDoc = await getDoc(vendorRef);
                
                if (vendorDoc.exists()) {
                    currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                    currentPhotos = currentVendor.photos || [];
                    renderVendorDetails(currentVendor);
                } else {
                    container.innerHTML = '<div class="loading">Vendor not found</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="loading">Error loading vendor</div>';
            }
        }

        function getCategoryIcon(category) {
            const icons = { decorator: '🎨', photographer: '📸', caterer: '🍽️', bandbaja: '🎵', stadium: '🏟️' };
            return icons[category] || '🏷️';
        }

        function getStars(rating) {
            const num = parseFloat(rating);
            if (isNaN(num)) return '☆☆☆☆☆';
            let stars = '';
            for (let i = 0; i < Math.floor(num); i++) stars += '★';
            for (let i = stars.length; i < 5; i++) stars += '☆';
            return stars;
        }

        function renderPhotos(photos) {
            if (!photos || photos.length === 0) {
                return `
                    <div class="photos-gallery">
                        <div class="photo-item"><div class="photo-placeholder">📸</div></div>
                        <div class="photo-item"><div class="photo-placeholder">📸</div></div>
                        <div class="photo-item"><div class="photo-placeholder">📸</div></div>
                    </div>
                    <div class="view-all-btn" onclick="alert('Photos coming soon!')">+ Upload Photos</div>
                `;
            }
            
            const displayPhotos = photos.slice(0, 6);
            return `
                <div class="photos-gallery">
                    ${displayPhotos.map((photo, i) => `
                        <div class="photo-item" onclick="openLightbox(${i})">
                            <img src="${photo}" alt="Work sample">
                        </div>
                    `).join('')}
                </div>
                ${photos.length > 6 ? `<div class="view-all-btn" onclick="openLightbox(0)">View All ${photos.length} Photos →</div>` : ''}
            `;
        }

        function renderVendorDetails(vendor) {
            const container = document.getElementById('vendorDetail');
            const icon = getCategoryIcon(vendor.category);
            
            container.innerHTML = `
                <div class="hero-banner">
                    <div class="vendor-icon-large">${icon}</div>
                </div>
                <div class="vendor-name">${vendor.name || 'Vendor'}</div>
                <div class="vendor-rating">
                    <div class="stars">${getStars(vendor.rating)}</div>
                    <div class="rating-value">${vendor.rating || '4.5'} (${vendor.reviews || 0} reviews)</div>
                </div>
                <div class="info-row"><i>📍</i> ${vendor.location || vendor.city || 'Location'}</div>
                <div class="info-row"><i>📞</i> ${vendor.phone || 'Contact not available'}</div>
                <div class="price-box">
                    <div class="price-label">Price Range</div>
                    <div class="price-value">${vendor.priceRange || 'Contact for price'}</div>
                </div>
                <div class="section-title">About</div>
                <div class="description">${vendor.description || 'Professional vendor with years of experience.'}</div>
                <div class="section-title">Work Portfolio</div>
                ${renderPhotos(currentPhotos)}
                <div class="section-title">Reviews (${vendor.reviews || 0})</div>
                <div id="reviewsContainer"></div>
            `;
            
            loadReviews();
        }

        function loadReviews() {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = `
                <div class="review-card"><div class="reviewer-name">Rahul Sharma</div><div class="review-stars">★★★★★</div><div class="review-text">Excellent service! Highly recommended.</div></div>
                <div class="review-card"><div class="reviewer-name">Priya Patel</div><div class="review-stars">★★★★☆</div><div class="review-text">Great work, on time delivery.</div></div>
                <div class="review-card"><div class="reviewer-name">Amit Kumar</div><div class="review-stars">★★★★★</div><div class="review-text">Best in the business!</div></div>
            `;
        }

        // Lightbox functions
        window.openLightbox = function(index) {
            if (!currentPhotos || currentPhotos.length === 0) {
                alert('No photos available yet');
                return;
            }
            currentPhotoIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = currentPhotos[currentPhotoIndex];
            lightbox.style.display = 'flex';
        };

        window.closeLightbox = function() {
            document.getElementById('lightbox').style.display = 'none';
        };

        window.prevPhoto = function() {
            if (currentPhotos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            document.getElementById('lightboxImg').src = currentPhotos[currentPhotoIndex];
        };

        window.nextPhoto = function() {
            if (currentPhotos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            document.getElementById('lightboxImg').src = currentPhotos[currentPhotoIndex];
        };

        window.openBookingModal = function() {
            if (!currentUser) {
                alert('Please login to book');
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('bookingModal').style.display = 'flex';
        };

        window.closeBookingModal = function() {
            document.getElementById('bookingModal').style.display = 'none';
        };

        window.submitBooking = async function() {
            if (!currentUser || !currentVendor) return;
            
            const eventDate = document.getElementById('eventDate').value;
            if (!eventDate) {
                alert('Please select event date');
                return;
            }
            
            const booking = {
                vendorId: currentVendor.id,
                vendorName: currentVendor.name,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email,
                eventDate: eventDate,
                eventType: document.getElementById('eventType').value,
                guestCount: document.getElementById('guestCount').value,
                specialRequests: document.getElementById('specialRequests').value,
                status: 'pending',
                createdAt: serverTimestamp()
            };
            
            try {
                await addDoc(collection(db, 'bookings'), booking);
                alert('✅ Booking sent! Vendor will contact you.');
                closeBookingModal();
            } catch (error) {
                alert('Booking failed');
            }
        };
    </script>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="window.location.href='vendors.html'">←</button>
    <div class="logo">STADIUM<span>CONNECT</span></div>
    <div class="placeholder"></div>
</header>

<div id="vendorDetail" class="content">
    <div class="loading">🔄 Loading...</div>
</div>

<button class="book-btn" onclick="openBookingModal()">Book Now →</button>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-prev" onclick="event.stopPropagation(); prevPhoto()">❮</span>
    <img id="lightboxImg" src="">
    <span class="lightbox-next" onclick="event.stopPropagation(); nextPhoto()">❯</span>
</div>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeBookingModal()">&times;</span>
        <div class="modal-header">Book this vendor</div>
        <input type="date" id="eventDate" class="modal-input">
        <select id="eventType" class="modal-input">
            <option>Wedding</option><option>Corporate</option><option>Birthday</option><option>Concert</option>
        </select>
        <input type="number" id="guestCount" class="modal-input" placeholder="Guests">
        <textarea id="specialRequests" class="modal-input" rows="2" placeholder="Special requests"></textarea>
        <button class="modal-btn" onclick="submitBooking()">Confirm →</button>
    </div>
</div>

</body>
</html>
