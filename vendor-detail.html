<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vendor Details - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #ff6b35; }

        /* Content */
        .content { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }

        /* Vendor Header */
        .vendor-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #fffaf5, #fff);
            border-radius: 24px;
        }
        .vendor-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
            border: 3px solid #ff6b35;
        }
        .vendor-info h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .vendor-rating { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .stars { color: #ffb347; font-size: 14px; letter-spacing: 2px; }

        /* Info Rows */
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row i { width: 28px; color: #ff6b35; font-size: 16px; }
        .info-row .label { color: #666; font-weight: 500; width: 100px; }
        .info-row .value { flex: 1; color: #333; }

        /* Price Box */
        .price-box {
            background: #fff5f0;
            padding: 18px 20px;
            border-radius: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-label { color: #666; font-weight: 500; }
        .price-value { font-size: 24px; font-weight: 700; color: #ff6b35; }

        /* Description */
        .description {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 20px;
            margin: 20px 0;
            line-height: 1.6;
            color: #555;
        }
        .description strong { color: #ff6b35; display: block; margin-bottom: 8px; }

        /* Gallery */
        .gallery-section { margin: 24px 0; }
        .gallery-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: #f5f5f5;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .gallery-item:hover img { transform: scale(1.05); }
        .view-all-btn {
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #ff6b35;
        }

        /* Book Button */
        .book-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }
        .book-btn:hover { background: #e55a2b; }

        /* Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active { display: flex; }
        .lightbox-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            cursor: pointer;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 2001;
        }
        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 16px;
            border-radius: 50%;
            transition: 0.3s;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-prev:hover, .lightbox-next:hover { background: rgba(0,0,0,0.8); }
        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            font-size: 14px;
        }

        .loading { text-align: center; padding: 60px; color: #ff6b35; }
        .no-photos { text-align: center; padding: 40px; color: #999; background: #f8f9fa; border-radius: 16px; }

        @media (max-width: 600px) {
            .vendor-header { flex-direction: column; text-align: center; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .info-row i { width: auto; }
            .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .lightbox-prev, .lightbox-next { font-size: 32px; padding: 12px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const vendorId = urlParams.get('id');

        let currentVendor = null;
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        async function loadVendor() {
            const container = document.getElementById('vendorDetail');
            if (!vendorId) {
                container.innerHTML = '<div class="loading">No vendor selected</div>';
                document.getElementById('bookBtn').style.display = 'none';
                return;
            }
            
            try {
                const vendorDoc = await getDoc(doc(db, 'vendors', vendorId));
                if (vendorDoc.exists()) {
                    currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                    currentPhotos = currentVendor.photos || [];
                    if (currentPhotos.length === 0 && currentVendor.imageUrl) {
                        currentPhotos = [currentVendor.imageUrl];
                    }
                    renderVendor();
                } else {
                    container.innerHTML = '<div class="loading">Vendor not found</div>';
                    document.getElementById('bookBtn').style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="loading">Error loading vendor</div>';
            }
        }

        function getStars(rating) {
            const num = parseFloat(rating);
            if (isNaN(num)) return '☆☆☆☆☆';
            let stars = '';
            for (let i = 0; i < Math.floor(num); i++) stars += '★';
            for (let i = stars.length; i < 5; i++) stars += '☆';
            return stars;
        }

        function getCategoryIcon(category) {
            const icons = { decorator: '🎨', photographer: '📸', caterer: '🍽️', bandbaja: '🎵', stadium: '🏟️' };
            return icons[category] || '🏷️';
        }

        function renderGallery() {
            if (!currentPhotos || currentPhotos.length === 0) {
                return `<div class="no-photos"><i class="fas fa-images"></i> No work photos uploaded yet</div>`;
            }
            
            const displayPhotos = currentPhotos.slice(0, 6);
            return `
                <div class="gallery-grid">
                    ${displayPhotos.map((photo, i) => `
                        <div class="gallery-item" onclick="openLightbox(${i})">
                            <img src="${photo}" alt="Work sample ${i+1}" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
                        </div>
                    `).join('')}
                </div>
                ${currentPhotos.length > 6 ? `<div class="view-all-btn" onclick="openLightbox(0)">View All ${currentPhotos.length} Photos →</div>` : ''}
            `;
        }

        function renderVendor() {
            const container = document.getElementById('vendorDetail');
            const categoryIcon = getCategoryIcon(currentVendor.category);
            
            container.innerHTML = `
                <div class="vendor-header">
                    <img src="${currentVendor.imageUrl || 'https://via.placeholder.com/80'}" class="vendor-avatar" alt="${currentVendor.name}" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="vendor-info">
                        <h1>${currentVendor.name || 'Vendor'} ${categoryIcon}</h1>
                        <div class="vendor-rating">
                            <div class="stars">${getStars(currentVendor.rating || 4.5)}</div>
                            <span style="font-size: 14px; color: #666;">${currentVendor.rating || 4.5} (${currentVendor.reviews || 0} reviews)</span>
                        </div>
                    </div>
                </div>
                
                <div class="info-row">
                    <i class="fas fa-map-marker-alt"></i>
                    <span class="label">Location</span>
                    <span class="value">${currentVendor.location || currentVendor.city || 'Location not specified'}</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-briefcase"></i>
                    <span class="label">Experience</span>
                    <span class="value">${currentVendor.experience || 'Professional vendor'}</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-tag"></i>
                    <span class="label">Category</span>
                    <span class="value">${currentVendor.category || '-'}</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-phone"></i>
                    <span class="label">Vendor Phone</span>
                    <span class="value">${currentVendor.phone || 'Not available'}</span>
                </div>
                
                <div class="price-box">
                    <span class="price-label">Price Range</span>
                    <span class="price-value">${currentVendor.priceRange || 'Contact for price'}</span>
                </div>
                
                <div class="description">
                    <strong>📖 About</strong>
                    ${currentVendor.description || 'Professional vendor with years of experience in the industry. Known for quality service and customer satisfaction.'}
                </div>
                
                <div class="gallery-section">
                    <div class="gallery-title"><i class="fas fa-images"></i> Work Portfolio</div>
                    ${renderGallery()}
                </div>
            `;
            
            // Update Book Now button with agent phone
            const bookBtn = document.getElementById('bookBtn');
            if (bookBtn) {
                if (currentVendor.agentPhone) {
                    bookBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Book Now - Call Agent (${currentVendor.agentPhone})`;
                    bookBtn.onclick = () => {
                        window.location.href = `tel:${currentVendor.agentPhone}`;
                    };
                    bookBtn.style.display = 'flex';
                } else {
                    bookBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Book Now - Contact Vendor`;
                    bookBtn.onclick = () => {
                        if (currentVendor.phone) {
                            window.location.href = `tel:${currentVendor.phone}`;
                        } else {
                            alert('Contact number not available');
                        }
                    };
                    bookBtn.style.display = 'flex';
                }
            }
        }

        // Lightbox Functions
        window.openLightbox = (index) => {
            if (!currentPhotos.length) return;
            currentPhotoIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        function updateLightboxImage() {
            const img = document.getElementById('lightboxImage');
            if (currentPhotos[currentPhotoIndex]) {
                img.src = currentPhotos[currentPhotoIndex];
            }
            document.getElementById('lightboxCounter').innerText = `${currentPhotoIndex + 1} / ${currentPhotos.length}`;
        }

        window.closeLightbox = () => {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.prevPhoto = (e) => {
            e.stopPropagation();
            if (!currentPhotos.length) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            updateLightboxImage();
        };

        window.nextPhoto = (e) => {
            e.stopPropagation();
            if (!currentPhotos.length) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            updateLightboxImage();
        };

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevPhoto(e);
                if (e.key === 'ArrowRight') nextPhoto(e);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        // Touch swipe for mobile
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (touchEndX < touchStartX - 50) nextPhoto(e);
                if (touchEndX > touchStartX + 50) prevPhoto(e);
            }
        });

        loadVendor();
    </script>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="window.location.href='vendors.html'">←</button>
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div style="width: 40px;"></div>
</header>

<div id="vendorDetail" class="content">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading vendor details...</div>
</div>

<button id="bookBtn" class="book-btn"><i class="fas fa-phone-alt"></i> Book Now - Call Agent</button>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-prev" onclick="prevPhoto(event)">❮</span>
    <img id="lightboxImage" class="lightbox-image" onclick="event.stopPropagation()">
    <span class="lightbox-next" onclick="nextPhoto(event)">❯</span>
    <div id="lightboxCounter" class="lightbox-counter">1 / 1</div>
</div>

</body>
</html>
