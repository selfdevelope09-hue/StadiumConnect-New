<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vendor Details - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; }

        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #ff6b35; }

        .content { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Vendor Profile Card */
        .vendor-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }

        /* Vendor Header with Photo */
        .vendor-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #fffaf5, #fff);
            border-radius: 24px;
        }
        .vendor-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
            border: 3px solid #ff6b35;
        }
        .vendor-info h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .vendor-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stars { color: #ffb347; font-size: 14px; }

        /* Info Rows */
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row i { width: 24px; color: #ff6b35; }
        .price-box {
            background: #fff5f0;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
        }
        .price-value { font-size: 24px; font-weight: 700; color: #ff6b35; }

        /* Photo Gallery */
        .gallery-section {
            margin: 24px 0;
        }
        .gallery-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: #f5f5f5;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .view-all-btn {
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #ff6b35;
        }

        /* Lightbox Modal - Full Screen Photo Viewer */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            cursor: zoom-in;
        }
        .lightbox-image.zoomed {
            cursor: zoom-out;
            transform: scale(1.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 2001;
        }
        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 16px;
            border-radius: 50%;
            transition: 0.3s;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-prev:hover, .lightbox-next:hover {
            background: rgba(0,0,0,0.8);
        }
        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 20px;
        }

        /* Description */
        .description {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            line-height: 1.6;
            color: #555;
        }

        /* Book Button */
        .book-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            z-index: 100;
        }
        .book-btn:hover {
            background: #e55a2b;
        }

        .loading { text-align: center; padding: 60px; color: #ff6b35; }
        
        @media (max-width: 600px) {
            .vendor-header { flex-direction: column; text-align: center; }
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
            .lightbox-prev, .lightbox-next { font-size: 32px; padding: 12px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const vendorId = urlParams.get('id');

        let currentVendor = null;
        let currentPhotos = [];
        let currentPhotoIndex = 0;
        let isZoomed = false;

        async function loadVendor() {
            const container = document.getElementById('vendorDetail');
            if (!vendorId) {
                container.innerHTML = '<div class="loading">No vendor selected</div>';
                document.getElementById('bookBtn').style.display = 'none';
                return;
            }
            
            try {
                const vendorRef = doc(db, 'vendors', vendorId);
                const vendorDoc = await getDoc(vendorRef);
                
                if (vendorDoc.exists()) {
                    currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                    currentPhotos = currentVendor.photos || [];
                    // If no photos array, use single imageUrl as fallback
                    if (currentPhotos.length === 0 && currentVendor.imageUrl) {
                        currentPhotos = [currentVendor.imageUrl];
                    }
                    renderVendor();
                } else {
                    container.innerHTML = '<div class="loading">Vendor not found</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="loading">Error loading vendor</div>';
            }
        }

        function getStars(rating) {
            const num = parseFloat(rating);
            if (isNaN(num)) return '☆☆☆☆☆';
            let stars = '';
            for (let i = 0; i < Math.floor(num); i++) stars += '★';
            for (let i = stars.length; i < 5; i++) stars += '☆';
            return stars;
        }

        function renderGallery() {
            if (!currentPhotos || currentPhotos.length === 0) {
                return `
                    <div class="gallery-section">
                        <div class="gallery-title">Work Portfolio</div>
                        <div class="gallery-grid">
                            <div class="gallery-item" style="display: flex; align-items: center; justify-content: center; background: #f5f5f5;">
                                <span style="color: #999;">No photos yet</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            const displayPhotos = currentPhotos.slice(0, 6);
            return `
                <div class="gallery-section">
                    <div class="gallery-title">Work Portfolio (${currentPhotos.length} photos)</div>
                    <div class="gallery-grid">
                        ${displayPhotos.map((photo, i) => `
                            <div class="gallery-item" onclick="openLightbox(${i})">
                                <img src="${photo}" alt="Work sample ${i+1}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    ${currentPhotos.length > 6 ? `<div class="view-all-btn" onclick="openLightbox(0)">View All ${currentPhotos.length} Photos →</div>` : ''}
                </div>
            `;
        }

        function renderVendor() {
            const container = document.getElementById('vendorDetail');
            const icon = getCategoryIcon(currentVendor.category);
            
            container.innerHTML = `
                <div class="vendor-card">
                    <div class="vendor-header">
                        <img src="${currentVendor.imageUrl || 'https://via.placeholder.com/80'}" class="vendor-avatar" alt="${currentVendor.name}" onerror="this.src='https://via.placeholder.com/80'">
                        <div class="vendor-info">
                            <h1>${currentVendor.name || 'Vendor'}</h1>
                            <div class="vendor-rating">
                                <div class="stars">${getStars(currentVendor.rating)}</div>
                                <span>${currentVendor.rating || '4.5'} (${currentVendor.reviews || 0} reviews)</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${currentVendor.location || currentVendor.city || 'Location not specified'}</div>
                    <div class="info-row"><i class="fas fa-phone"></i> ${currentVendor.phone || 'Contact not available'}</div>
                    <div class="info-row"><i class="fas fa-briefcase"></i> ${currentVendor.experience || 'Experienced vendor'}</div>
                    
                    <div class="price-box">
                        <span>Price Range</span>
                        <span class="price-value">${currentVendor.priceRange || 'Contact for price'}</span>
                    </div>
                    
                    <div class="description">
                        <strong>About</strong><br>
                        ${currentVendor.description || 'Professional vendor with years of experience in the industry.'}
                    </div>
                    
                    ${renderGallery()}
                    
                    <div class="description">
                        <strong>Reviews</strong><br>
                        <div style="margin-top: 12px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                <span>Rahul Sharma</span>
                                <span class="stars">★★★★★</span>
                            </div>
                            <p style="color: #666;">Excellent service! Highly recommended.</p>
                            <div style="margin-top: 12px; display: flex; justify-content: space-between;">
                                <span>Priya Patel</span>
                                <span class="stars">★★★★☆</span>
                            </div>
                            <p style="color: #666;">Great work, on time delivery.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function getCategoryIcon(category) {
            const icons = { decorator: '🎨', photographer: '📸', caterer: '🍽️', bandbaja: '🎵', stadium: '🏟️' };
            return icons[category] || '🏷️';
        }

        // Lightbox Functions
        window.openLightbox = (index) => {
            currentPhotoIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
            isZoomed = false;
        };

        function updateLightboxImage() {
            const img = document.getElementById('lightboxImage');
            if (currentPhotos[currentPhotoIndex]) {
                img.src = currentPhotos[currentPhotoIndex];
            }
            document.getElementById('lightboxCounter').innerText = `${currentPhotoIndex + 1} / ${currentPhotos.length}`;
        }

        window.closeLightbox = () => {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
            isZoomed = false;
            document.getElementById('lightboxImage').classList.remove('zoomed');
        };

        window.prevPhoto = (e) => {
            e.stopPropagation();
            if (currentPhotos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            updateLightboxImage();
            // Reset zoom when changing photo
            isZoomed = false;
            document.getElementById('lightboxImage').classList.remove('zoomed');
        };

        window.nextPhoto = (e) => {
            e.stopPropagation();
            if (currentPhotos.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            updateLightboxImage();
            isZoomed = false;
            document.getElementById('lightboxImage').classList.remove('zoomed');
        };

        window.toggleZoom = (e) => {
            e.stopPropagation();
            const img = document.getElementById('lightboxImage');
            if (isZoomed) {
                img.classList.remove('zoomed');
                isZoomed = false;
            } else {
                img.classList.add('zoomed');
                isZoomed = true;
            }
        };

        // Swipe support for touch devices
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (touchEndX < touchStartX - 50) {
                    nextPhoto(e);
                }
                if (touchEndX > touchStartX + 50) {
                    prevPhoto(e);
                }
            }
        });

        // Keyboard navigation for lightbox
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    prevPhoto(e);
                } else if (e.key === 'ArrowRight') {
                    nextPhoto(e);
                } else if (e.key === 'Escape') {
                    closeLightbox();
                }
            }
        });

        // Booking modal (simplified)
        window.openBooking = () => {
            const user = auth.currentUser;
            if (!user) {
                alert('Please login to book this vendor');
                window.location.href = 'login.html';
                return;
            }
            const date = prompt('Enter event date (YYYY-MM-DD):');
            if (!date) return;
            alert(`✅ Booking request sent to ${currentVendor.name}! Vendor will contact you.`);
        };

        onAuthStateChanged(auth, (user) => {
            // Just for booking check
        });

        loadVendor();
    </script>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="window.location.href='vendors.html'">←</button>
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div style="width: 40px;"></div>
</header>

<div id="vendorDetail" class="content">
    <div class="loading">Loading vendor details...</div>
</div>

<button class="book-btn" onclick="openBooking()">Book Now →</button>

<!-- Lightbox Modal for Full Screen Photo Gallery -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-prev" onclick="prevPhoto(event)">❮</span>
    <img id="lightboxImage" class="lightbox-image" onclick="toggleZoom(event)" src="">
    <span class="lightbox-next" onclick="nextPhoto(event)">❯</span>
    <div id="lightboxCounter" class="lightbox-counter">1 / 1</div>
</div>

</body>
</html>
