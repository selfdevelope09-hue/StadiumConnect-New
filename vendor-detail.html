<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('id');

    // Inhe window object pe dala hai taaki HTML se access ho sake
    window.currentVendor = null;
    window.currentPhotos = [];
    window.currentPhotoIndex = 0;
    window.cityAgent = null;

    async function getAgentForCity(city) {
        try {
            const agentsSnap = await getDocs(collection(db, "agents"));
            let agents = [];
            agentsSnap.forEach(doc => agents.push({ id: doc.id, ...doc.data() }));
            return agents.find(agent => agent.city?.toLowerCase() === city.toLowerCase());
        } catch (error) {
            console.error("Error finding agent:", error);
            return null;
        }
    }

    async function loadVendor() {
        if (!vendorId) {
            document.getElementById('vendorDetail').innerHTML = '<div class="loading">Invalid Vendor ID</div>';
            return;
        }

        const vendorDoc = await getDoc(doc(db, 'vendors', vendorId));
        if (vendorDoc.exists()) {
            window.currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
            window.currentPhotos = window.currentVendor.photos || [];
            if (window.currentPhotos.length === 0 && window.currentVendor.imageUrl) {
                window.currentPhotos = [window.currentVendor.imageUrl];
            }
            
            if (window.currentVendor.city) {
                window.cityAgent = await getAgentForCity(window.currentVendor.city);
                if (window.cityAgent) {
                    const suggestionDiv = document.getElementById('agentSuggestion');
                    if (suggestionDiv) {
                        suggestionDiv.innerHTML = `💡 Agent ${window.cityAgent.name || window.cityAgent.id} (${window.cityAgent.city}) will be assigned automatically.`;
                    }
                }
            }
            
            renderVendor();
            updatePaymentPlan();
            setupCallButton();
        } else {
            document.getElementById('vendorDetail').innerHTML = '<div class="loading">Vendor not found</div>';
        }
    }

    function setupCallButton() {
        const callBtn = document.getElementById('callBtn');
        if (!callBtn) return;
        
        if (window.cityAgent && window.cityAgent.phone) {
            callBtn.onclick = () => { window.location.href = `tel:${window.cityAgent.phone}`; };
            callBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Call ${window.cityAgent.name || 'Agent'}`;
            callBtn.style.display = 'flex';
        } else {
            callBtn.style.display = 'none';
        }
    }

    // Lightbox and Render functions (Global exposure)
    window.renderVendor = () => {
        const v = window.currentVendor;
        document.getElementById('vendorDetail').innerHTML = `
            <div class="vendor-card">
                <div class="vendor-header">
                    <img src="${v.imageUrl || 'https://via.placeholder.com/80'}" class="vendor-avatar">
                    <div class="vendor-info">
                        <h1>${v.name || 'Vendor'}</h1>
                        <div class="vendor-rating">
                            <div class="stars">${'★'.repeat(Math.floor(v.rating || 4))}${'☆'.repeat(5-Math.floor(v.rating || 4))}</div>
                            <span>${v.rating || 4.5} (${v.reviewsCount || 0} reviews)</span>
                        </div>
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${v.location || v.city || 'Location'}</div>
                    <div class="info-row"><i class="fas fa-tag"></i> ${v.category || 'Category'}</div>
                    <div class="price-box"><span>Price Range</span><span class="price-value">${v.priceRange || 'Contact for price'}</span></div>
                </div>
                <div class="gallery-section">
                    <div style="font-weight:600; margin-bottom:12px;">📷 Work Portfolio</div>
                    <div class="gallery-grid">
                        ${window.currentPhotos.slice(0,6).map((p,i)=>`<div class="gallery-item" onclick="openLightbox(${i})"><img src="${p}"></div>`).join('')}
                    </div>
                </div>
            </div>`;
    };

    window.updatePaymentPlan = () => {
        const isDecorator = window.currentVendor?.category?.toLowerCase() === 'decorator';
        const planDiv = document.getElementById('paymentPlan');
        planDiv.innerHTML = isDecorator ? `
            <div class="payment-plan">
                <strong>📅 Payment Plan (Decorator)</strong>
                <div class="installment-steps">
                    <span class="step">30% Adv.</span> <span class="step">30% Mid.</span> <span class="step">40% Final</span>
                </div>
            </div>` : `
            <div class="payment-plan"><strong>💰 Full Payment at Booking</strong></div>`;
    };

    // --- MAIN FIX FOR BOOKING ---
    window.submitBooking = async () => {
        const user = auth.currentUser;
        if (!user) { alert('Please login first'); window.location.href = 'login.html'; return; }

        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const date = document.getElementById('eventDate').value;
        const loc = document.getElementById('eventLocation').value.trim();

        if (!name || !phone || !date || !loc) {
            alert('Please fill all required fields (*)');
            return;
        }

        const btn = document.querySelector('.book-btn');
        btn.disabled = true;
        btn.innerHTML = "Sending...";

        try {
            const bookingData = {
                vendorId: vendorId,
                vendorName: window.currentVendor?.name || 'Unknown',
                userId: user.uid,
                userName: name,
                userPhone: phone,
                eventDate: date,
                eventLocation: loc,
                eventType: document.getElementById('eventType').value,
                agentId: document.getElementById('agentId').value || (window.cityAgent ? window.cityAgent.id : ''),
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            await addDoc(collection(db, 'bookings'), bookingData);
            alert('✅ Booking request sent successfully!');
            window.location.href = 'dashboard.html';
        } catch (error) {
            console.error(error);
            alert('❌ Error: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = "Book Now";
        }
    };

    // Lightbox Global Functions
    window.openLightbox = (i) => { window.currentPhotoIndex = i; updateLightbox(); document.getElementById('lightbox').classList.add('active'); };
    window.closeLightbox = () => { document.getElementById('lightbox').classList.remove('active'); };
    window.nextPhoto = (e) => { e.stopPropagation(); window.currentPhotoIndex = (window.currentPhotoIndex + 1) % window.currentPhotos.length; updateLightbox(); };
    window.prevPhoto = (e) => { e.stopPropagation(); window.currentPhotoIndex = (window.currentPhotoIndex - 1 + window.currentPhotos.length) % window.currentPhotos.length; updateLightbox(); };
    function updateLightbox() { 
        document.getElementById('lightboxImage').src = window.currentPhotos[window.currentPhotoIndex]; 
        document.getElementById('lightboxCounter').innerText = `${window.currentPhotoIndex+1}/${window.currentPhotos.length}`;
    }

    onAuthStateChanged(auth, (user) => {
        if (user) document.getElementById('userName').value = user.displayName || '';
    });

    loadVendor();
</script>
