<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vendor Details - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --primary-light: #ff9068;
            --dark: #0a0a2a;
            --darker: #050517;
            --light: #ffffff;
            --gray: #f8f9fa;
            --dark-gray: #2d2d44;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: #fff;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            color: var(--dark);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255,107,53,0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background: rgba(10, 10, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }
        body.light-mode .header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .back-btn {
            background: rgba(255,107,53,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--primary);
            font-size: 20px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-3px);
        }

        .theme-toggle {
            background: rgba(255,107,53,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--primary);
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Vendor Card Premium */
        .vendor-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: all 0.4s ease;
        }
        body.light-mode .vendor-card {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .vendor-header {
            display: flex;
            gap: 24px;
            padding: 28px;
            background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,107,53,0.02));
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        body.light-mode .vendor-header {
            background: linear-gradient(135deg, #fffaf5, #fff);
            border-bottom: 1px solid #f0f0f0;
        }

        .vendor-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }

        .vendor-info h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .vendor-rating {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stars {
            color: #ffb347;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .rating-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }
        .review-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Info Section */
        .info-section {
            padding: 24px 28px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        body.light-mode .info-row {
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row i {
            width: 28px;
            color: var(--primary);
            font-size: 18px;
        }

        /* Amenities Section */
        .amenities-section {
            padding: 0 28px 20px 28px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .amenities-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .amenity-tag {
            background: rgba(255,107,53,0.2);
            border: 1px solid rgba(255,107,53,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Price Box */
        .price-box {
            background: rgba(255,107,53,0.1);
            padding: 20px 28px;
            margin: 20px 28px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .price-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        /* Gallery */
        .gallery-section {
            padding: 0 28px 28px 28px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Booking Form Card */
        .booking-form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 30px;
        }
        body.light-mode .booking-form-card {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .form-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        body.light-mode .form-group label {
            color: #666;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }
        body.light-mode .form-group input,
        body.light-mode .form-group select,
        body.light-mode .form-group textarea {
            background: #f5f5f5;
            color: var(--dark);
            border-color: #ddd;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Payment Plan */
        .payment-plan {
            background: rgba(255,107,53,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .installment-steps {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .step {
            background: rgba(255,107,53,0.2);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .call-btn {
            flex: 1;
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .call-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,0.4);
        }
        .book-btn {
            flex: 2;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,53,0.4);
        }

        /* Reviews Section */
        .reviews-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 28px;
        }
        body.light-mode .reviews-section {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .reviews-summary {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .avg-rating-box {
            text-align: center;
            background: rgba(255,107,53,0.1);
            padding: 16px 24px;
            border-radius: 24px;
        }
        .avg-rating-number {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
        }
        .avg-rating-stars {
            font-size: 14px;
            color: #ffb347;
        }
        .total-reviews {
            font-size: 14px;
            color: var(--text-muted);
        }
        .rating-distribution {
            flex: 1;
        }
        .rating-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .rating-label {
            width: 30px;
            font-size: 13px;
        }
        .bar-container {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .rating-count {
            width: 35px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .review-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        body.light-mode .review-card {
            background: #f9f9f9;
            border: 1px solid #eee;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .reviewer-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }
        .reviewer-name {
            font-weight: 700;
            font-size: 15px;
        }
        .review-stars {
            color: #ffb347;
            font-size: 14px;
        }
        .review-text {
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            margin: 12px 0;
        }
        body.light-mode .review-text {
            color: #555;
        }
        .review-date {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        .verified-badge {
            background: rgba(16,185,129,0.2);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
        }

        .add-review-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .star-rating {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .star-rating i {
            font-size: 28px;
            cursor: pointer;
            color: #ddd;
            transition: 0.2s;
        }
        .star-rating i.active {
            color: #ffb347;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 16px;
            border-radius: 50%;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            border-left: 4px solid var(--success);
            color: white;
            animation: slideUp 0.3s ease;
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .vendor-header {
                flex-direction: column;
                text-align: center;
                align-items: center;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .reviews-header {
                flex-direction: column;
            }
            .reviews-summary {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<header class="header">
    <div style="display: flex; gap: 15px; align-items: center;">
        <button class="back-btn" onclick="window.location.href='vendors.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    </div>
    <div style="display: flex; gap: 12px;">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div class="container">
    <div id="vendorDetail"></div>

    <!-- Booking Form -->
    <div class="booking-form-card">
        <div class="form-title"><i class="fas fa-calendar-alt"></i> Book This Vendor</div>
        <div id="paymentPlan"></div>
        
        <div class="form-group">
            <label>Your Full Name *</label>
            <input type="text" id="userName" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Your Phone Number *</label>
            <input type="tel" id="userPhone" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
            <label>Event Name</label>
            <input type="text" id="eventName" placeholder="e.g., Wedding Reception, Birthday Party">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Event Date *</label>
                <input type="date" id="eventDate">
            </div>
            <div class="form-group">
                <label>Event Time</label>
                <select id="eventTime">
                    <option>Morning (6am-12pm)</option>
                    <option>Afternoon (12pm-6pm)</option>
                    <option>Evening (6pm-12am)</option>
                    <option>Full Day</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Expected Guests</label>
                <input type="number" id="guestCount" placeholder="Number of guests">
            </div>
            <div class="form-group">
                <label>Event Type *</label>
                <select id="eventType">
                    <option>Wedding</option>
                    <option>Corporate Event</option>
                    <option>Birthday Party</option>
                    <option>Concert</option>
                    <option>Sports Event</option>
                    <option>Other</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Event Location *</label>
            <input type="text" id="eventLocation" placeholder="Full address with city, pincode">
        </div>
        <div class="form-group">
            <label>Special Requests</label>
            <textarea id="specialRequests" rows="2" placeholder="Any special requirements..."></textarea>
        </div>
        <div class="agent-id-field">
            <label>Agent ID <span style="font-size:12px; color:#999;">(if referred by an agent)</span></label>
            <input type="text" id="agentId" placeholder="Enter agent ID if any">
            <div id="agentSuggestion" style="font-size:12px; color:var(--primary); margin-top:5px;"></div>
        </div>
        <div class="action-buttons">
            <button id="callBtn" class="call-btn" style="display:none;"><i class="fas fa-phone-alt"></i> Call Agent</button>
            <button class="book-btn" onclick="submitBooking()"><i class="fas fa-check-circle"></i> Book Now</button>
        </div>
    </div>

    <!-- Reviews Section -->
    <div class="reviews-section" id="reviewsSection">
        <div id="reviewsContent"></div>
        <div id="addReviewSection" class="add-review-section"></div>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-prev" onclick="prevPhoto(event)">❮</span>
    <img id="lightboxImage" class="lightbox-image">
    <span class="lightbox-next" onclick="nextPhoto(event)">❯</span>
    <div id="lightboxCounter" style="position:absolute; bottom:30px; left:0; right:0; text-align:center; color:white; background:rgba(0,0,0,0.5); padding:8px; width:fit-content; margin:0 auto; border-radius:20px;">1/1</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('id');

    let currentVendor = null;
    let currentPhotos = [];
    let currentPhotoIndex = 0;
    let cityAgent = null;
    let currentUser = null;
    let hasBooked = false;
    let reviews = [];

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function getAgentForCity(city) {
        try {
            const agentsSnap = await getDocs(collection(db, "agents"));
            let agents = [];
            agentsSnap.forEach(doc => agents.push({ id: doc.id, ...doc.data() }));
            return agents.find(agent => agent.city?.toLowerCase() === city.toLowerCase());
        } catch (error) {
            console.error("Error finding agent:", error);
            return null;
        }
    }

    async function checkIfUserHasBooked() {
        if (!currentUser || !vendorId) return false;
        const q = query(
            collection(db, "bookings"),
            where("userId", "==", currentUser.uid),
            where("vendorId", "==", vendorId)
        );
        const snapshot = await getDocs(q);
        return snapshot.size > 0;
    }

    async function loadReviews() {
        const q = query(
            collection(db, "reviews"),
            where("vendorId", "==", vendorId),
            orderBy("createdAt", "desc")
        );
        const snapshot = await getDocs(q);
        reviews = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderReviews();
    }

    function getRatingDistribution() {
        const distribution = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
        reviews.forEach(review => {
            distribution[review.rating] = (distribution[review.rating] || 0) + 1;
        });
        return distribution;
    }

    function renderReviews() {
        const container = document.getElementById('reviewsContent');
        
        if (reviews.length === 0) {
            container.innerHTML = `
                <div class="section-title"><i class="fas fa-star"></i> Customer Reviews</div>
                <div style="text-align: center; padding: 40px; opacity: 0.6;">
                    <i class="fas fa-star" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
                    No reviews yet. Be the first to review this vendor!
                </div>
            `;
            return;
        }
        
        const avgRating = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
        const distribution = getRatingDistribution();
        const totalReviews = reviews.length;
        
        container.innerHTML = `
            <div class="section-title"><i class="fas fa-star"></i> Customer Reviews</div>
            <div class="reviews-header">
                <div class="reviews-summary">
                    <div class="avg-rating-box">
                        <div class="avg-rating-number">${avgRating.toFixed(1)}</div>
                        <div class="avg-rating-stars">${'★'.repeat(Math.floor(avgRating))}${'☆'.repeat(5-Math.floor(avgRating))}</div>
                        <div class="total-reviews">${totalReviews} reviews</div>
                    </div>
                    <div class="rating-distribution">
                        ${[5,4,3,2,1].map(rating => {
                            const count = distribution[rating] || 0;
                            const percentage = (count / totalReviews) * 100;
                            return `
                                <div class="rating-bar">
                                    <span class="rating-label">${rating} ★</span>
                                    <div class="bar-container">
                                        <div class="bar-fill" style="width: ${percentage}%"></div>
                                    </div>
                                    <span class="rating-count">${count}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            </div>
            <div class="reviews-list">
                ${reviews.map(review => `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="reviewer-avatar">${(review.userName || 'U').charAt(0).toUpperCase()}</div>
                                <div>
                                    <span class="reviewer-name">${review.userName || 'Anonymous User'}</span>
                                    ${review.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>' : ''}
                                </div>
                            </div>
                            <div class="review-stars">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                        </div>
                        <div class="review-text">${review.comment || 'Great experience!'}</div>
                        <div class="review-date"><i class="far fa-calendar-alt"></i> ${new Date(review.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderAddReviewSection() {
        const container = document.getElementById('addReviewSection');
        if (!currentUser) {
            container.innerHTML = '<div style="text-align: center; padding: 20px;"><a href="login.html" style="color: var(--primary);">Login to leave a review</a></div>';
            return;
        }
        
        if (!hasBooked) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; opacity: 0.6;"><i class="fas fa-lock"></i> Only customers who have booked this vendor can leave a review.</div>';
            return;
        }
        
        container.innerHTML = `
            <h4 style="margin-bottom: 15px;"><i class="fas fa-edit"></i> Write a Review</h4>
            <div class="star-rating" id="starRating">
                <i class="far fa-star" data-rating="1"></i>
                <i class="far fa-star" data-rating="2"></i>
                <i class="far fa-star" data-rating="3"></i>
                <i class="far fa-star" data-rating="4"></i>
                <i class="far fa-star" data-rating="5"></i>
            </div>
            <textarea id="reviewComment" rows="3" placeholder="Share your experience with this vendor..." style="width:100%; padding:14px; border-radius:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; margin-bottom:15px;"></textarea>
            <button onclick="submitReview()" style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); border:none; padding:12px 24px; border-radius:40px; color:white; font-weight:600; cursor:pointer;"><i class="fas fa-paper-plane"></i> Submit Review</button>
        `;
        
        setupStarRating();
    }

    function setupStarRating() {
        let selectedRating = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(star => {
            star.onclick = () => {
                selectedRating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                    }
                });
            };
            star.onmouseover = () => {
                const rating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= rating) {
                        s.className = 'fas fa-star';
                    } else {
                        s.className = 'far fa-star';
                    }
                });
            };
            star.onmouseout = () => {
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                    } else {
                        s.className = 'far fa-star';
                    }
                });
            };
        });
        window.getSelectedRating = () => selectedRating;
    }

    window.submitReview = async () => {
        let selectedRating = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(star => {
            if (star.classList.contains('fas')) {
                selectedRating = Math.max(selectedRating, parseInt(star.dataset.rating));
            }
        });
        
        const comment = document.getElementById('reviewComment').value.trim();
        
        if (selectedRating === 0) {
            showToast('Please select a rating', true);
            return;
        }
        if (!comment) {
            showToast('Please write your review', true);
            return;
        }
        
        try {
            await addDoc(collection(db, 'reviews'), {
                vendorId: vendorId,
                vendorName: currentVendor?.name,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                rating: selectedRating,
                comment: comment,
                verified: hasBooked,
                createdAt: new Date().toISOString()
            });
            showToast('✅ Review submitted successfully!');
            document.getElementById('reviewComment').value = '';
            await loadReviews();
            renderAddReviewSection();
        } catch (error) {
            showToast('Failed to submit review: ' + error.message, true);
        }
    };

    async function loadVendor() {
        const vendorDoc = await getDoc(doc(db, 'vendors', vendorId));
        if (vendorDoc.exists()) {
            currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
            currentPhotos = currentVendor.gallery || currentVendor.photos || [];
            if (currentPhotos.length === 0 && currentVendor.imageUrl) currentPhotos = [currentVendor.imageUrl];
            
            if (currentVendor.city) {
                cityAgent = await getAgentForCity(currentVendor.city);
            }
            
            renderVendor();
            updatePaymentPlan();
            setupCallButton();
            
            if (cityAgent) {
                document.getElementById('agentSuggestion').innerHTML = `💡 Agent ${cityAgent.name || 'Local Agent'} (${cityAgent.city}) will be assigned automatically.`;
            }
            
            await loadReviews();
        }
    }

    function setupCallButton() {
        const callBtn = document.getElementById('callBtn');
        if (!callBtn) return;
        
        if (cityAgent && cityAgent.phone) {
            callBtn.onclick = () => { window.location.href = `tel:${cityAgent.phone}`; };
            callBtn.innerHTML = `<i class="fas fa-phone-alt"></i> Call ${cityAgent.name || 'Agent'} (${cityAgent.city})`;
            callBtn.style.display = 'flex';
        } else {
            callBtn.style.display = 'none';
        }
    }

    function getStars(rating) {
        let stars = '';
        for (let i = 0; i < Math.floor(rating); i++) stars += '★';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return stars;
    }

    function renderGallery() {
        if (!currentPhotos.length) return '<div class="gallery-grid"><div style="background:rgba(255,255,255,0.05); padding:40px; text-align:center; border-radius:20px;">No photos yet</div></div>';
        return `<div class="gallery-grid">${currentPhotos.slice(0,6).map((p,i)=>`<div class="gallery-item" onclick="openLightbox(${i})"><img src="${p}" onerror="this.src='https://via.placeholder.com/150'"></div>`).join('')}</div>`;
    }

    function renderAmenities() {
        const amenities = currentVendor.amenities || [];
        if (!amenities.length) return '';
        return `
            <div class="amenities-section">
                <div class="section-title"><i class="fas fa-crown"></i> Amenities & Services</div>
                <div class="amenities-grid">
                    ${amenities.map(a => `<span class="amenity-tag"><i class="fas fa-check-circle"></i> ${a}</span>`).join('')}
                </div>
            </div>
        `;
    }

    function renderVendor() {
        const avgRating = reviews.length > 0 ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1) : (currentVendor.rating || '4.5');
        
        document.getElementById('vendorDetail').innerHTML = `
            <div class="vendor-card">
                <div class="vendor-header">
                    <img src="${currentVendor.imageUrl || 'https://via.placeholder.com/100'}" class="vendor-avatar" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="vendor-info">
                        <h1>${currentVendor.name || 'Vendor'}</h1>
                        <div class="vendor-rating">
                            <div class="stars">${getStars(parseFloat(avgRating))}</div>
                            <span class="rating-number">${avgRating}</span>
                            <span class="review-count">(${reviews.length} reviews)</span>
                        </div>
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${currentVendor.location || currentVendor.city || 'Location'}</div>
                    <div class="info-row"><i class="fas fa-briefcase"></i> ${currentVendor.experience || 'Experienced vendor'}</div>
                    <div class="info-row"><i class="fas fa-tag"></i> ${currentVendor.category || 'Category'}</div>
                </div>
                ${renderAmenities()}
                <div class="price-box">
                    <span>Price Range</span>
                    <span class="price-value">${currentVendor.priceRange || 'Contact for price'}</span>
                </div>
                <div class="gallery-section">
                    <div class="section-title"><i class="fas fa-images"></i> Gallery</div>
                    ${renderGallery()}
                </div>
            </div>
        `;
    }

    function updatePaymentPlan() {
        const isDecorator = currentVendor.category === 'decorator' || currentVendor.category === 'Decorator';
        const planDiv = document.getElementById('paymentPlan');
        
        if (isDecorator) {
            planDiv.innerHTML = `
                <div class="payment-plan">
                    <strong>📅 Payment Plan (Decorator)</strong>
                    <div class="installment-steps">
                        <span class="step">1st Payment - 30%</span>
                        <span class="step">2nd Payment - 30%</span>
                        <span class="step">Final Payment - 40%</span>
                    </div>
                    <p style="font-size: 12px; margin-top: 10px;">Pay in 3 easy installments</p>
                </div>
            `;
        } else {
            planDiv.innerHTML = `
                <div class="payment-plan">
                    <strong>💰 Full Payment</strong>
                    <div class="installment-steps">
                        <span class="step">100% at Booking</span>
                    </div>
                </div>
            `;
        }
    }

    window.submitBooking = async () => {
        if (!currentUser) {
            showToast('Please login first', true);
            window.location.href = 'login.html';
            return;
        }
        
        const userName = document.getElementById('userName').value;
        const userPhone = document.getElementById('userPhone').value;
        const eventDate = document.getElementById('eventDate').value;
        const eventLocation = document.getElementById('eventLocation').value;
        
        if (!userName || !userPhone || !eventDate || !eventLocation) {
            showToast('Please fill all required fields', true);
            return;
        }
        
        let agentId = document.getElementById('agentId').value;
        if (!agentId && cityAgent) agentId = cityAgent.id;
        
        const bookingData = {
            vendorId: currentVendor.id,
            vendorName: currentVendor.name,
            vendorCity: currentVendor.city || '',
            userId: currentUser.uid,
            userName: userName,
            userEmail: currentUser.email,
            userPhone: userPhone,
            eventName: document.getElementById('eventName').value || 'Event',
            eventDate: eventDate,
            eventTime: document.getElementById('eventTime').value,
            guestCount: parseInt(document.getElementById('guestCount').value) || 0,
            eventLocation: eventLocation,
            eventType: document.getElementById('eventType').value,
            specialRequests: document.getElementById('specialRequests').value || '',
            agentId: agentId || '',
            amount: currentVendor.priceRange || 'Contact for price',
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        
        try {
            await addDoc(collection(db, 'bookings'), bookingData);
            showToast('✅ Booking request sent! Vendor will contact you soon.');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } catch (error) {
            showToast('Failed to send booking: ' + error.message, true);
        }
    };

    // Lightbox functions
    window.openLightbox = (index) => {
        if (!currentPhotos.length) return;
        currentPhotoIndex = index;
        updateLightbox();
        document.getElementById('lightbox').classList.add('active');
    };
    function updateLightbox() {
        document.getElementById('lightboxImage').src = currentPhotos[currentPhotoIndex];
        document.getElementById('lightboxCounter').innerText = `${currentPhotoIndex+1}/${currentPhotos.length}`;
    }
    window.closeLightbox = () => { document.getElementById('lightbox').classList.remove('active'); };
    window.prevPhoto = (e) => {
        e.stopPropagation();
        if (!currentPhotos.length) return;
        currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
        updateLightbox();
    };
    window.nextPhoto = (e) => {
        e.stopPropagation();
        if (!currentPhotos.length) return;
        currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
        updateLightbox();
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user && !document.getElementById('userName').value) {
            document.getElementById('userName').value = user.displayName || '';
        }
        if (vendorId) {
            hasBooked = await checkIfUserHasBooked();
            renderAddReviewSection();
        }
    });

    if (vendorId) {
        loadVendor();
    } else {
        document.getElementById('vendorDetail').innerHTML = '<div style="text-align:center; padding:40px;">Vendor not found</div>';
    }
</script>
</body>
</html>
