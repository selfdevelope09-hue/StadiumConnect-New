<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - StadiumConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 32px;
        }

        .logo span {
            color: #ff6b35;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 32px;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e8e8e8;
            background: #fff;
        }

        .social-btn.google:hover {
            background: #f8f8f8;
            border-color: #ddd;
        }

        .social-btn.facebook {
            background: #1877f2;
            border-color: #1877f2;
            color: white;
        }

        .social-btn.facebook:hover {
            background: #166fe5;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 40px);
            height: 1px;
            background: #e8e8e8;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: #fff;
            padding: 0 16px;
            color: #999;
            font-size: 14px;
        }

        /* Form */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }

        .phone-group {
            display: flex;
            gap: 12px;
        }

        .phone-group select {
            width: 100px;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-family: inherit;
        }

        .phone-group input {
            flex: 1;
        }

        .otp-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .otp-group input {
            flex: 1;
        }

        .otp-btn {
            background: #f0f0f0;
            border: none;
            padding: 14px 20px;
            border-radius: 16px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .otp-btn:active {
            background: #e0e0e0;
        }

        .register-btn {
            width: 100%;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .register-btn:hover {
            background: #e55a2b;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #666;
        }

        .login-link a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 500;
        }

        .terms {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 24px;
        }

        .terms a {
            color: #ff6b35;
            text-decoration: none;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        @media (max-width: 500px) {
            .container {
                padding: 24px 20px;
            }
            .social-login {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">STADIUM<span>CONNECT</span></div>
    <h1>Create account</h1>
    <div class="subtitle">Join India's largest event platform</div>

    <div id="message" class="message"></div>

    <!-- Social Login -->
    <div class="social-login">
        <button class="social-btn google" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn facebook" onclick="socialLogin('facebook')">
            <i class="fab fa-facebook-f"></i> Facebook
        </button>
    </div>

    <div class="divider"><span>or sign up with email</span></div>

    <!-- Email Signup Form -->
    <form id="registerForm">
        <div class="input-group">
            <label>Full name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Phone number</label>
            <div class="phone-group">
                <select id="countryCode">
                    <option value="+91">🇮🇳 +91</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+61">🇦🇺 +61</option>
                </select>
                <input type="tel" id="phone" placeholder="9876543210" required>
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>
        </div>

        <div class="input-group">
            <label>Confirm password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <div class="input-group">
            <label>Verify OTP</label>
            <div class="otp-group">
                <input type="text" id="otp" placeholder="Enter 6-digit OTP">
                <button type="button" class="otp-btn" onclick="sendOTP()">Send OTP</button>
            </div>
        </div>

        <button type="submit" class="register-btn">Create account →</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Log in</a>
    </div>
    <div class="terms">
        By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </div>
</div>

<script>
    // Simulate OTP sending
    function sendOTP() {
        const phone = document.getElementById('phone').value;
        const countryCode = document.getElementById('countryCode').value;
        
        if(!phone || phone.length < 10) {
            showMessage('Please enter a valid phone number', 'error');
            return;
        }
        
        // Simulate OTP sent
        const mockOTP = Math.floor(100000 + Math.random() * 900000);
        console.log('OTP for testing:', mockOTP);
        
        showMessage(`OTP sent to ${countryCode}${phone}. Demo OTP: ${mockOTP}`, 'success');
        
        // Store OTP for verification (in real app, this would be on server)
        window.sentOTP = mockOTP;
        
        // Auto-fill OTP for demo
        document.getElementById('otp').value = mockOTP;
    }

    // Social login simulation
    function socialLogin(provider) {
        showMessage(`Connecting with ${provider}...`, 'success');
        setTimeout(() => {
            // Simulate successful login
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', `${provider}_user`);
            window.location.href = 'directory.html';
        }, 1000);
    }

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const otp = document.getElementById('otp').value;
        
        if(!fullName || !email || !phone || !password) {
            showMessage('Please fill all required fields', 'error');
            return;
        }
        
        if(password.length < 6) {
            showMessage('Password must be at least 6 characters', 'error');
            return;
        }
        
        if(password !== confirm) {
            showMessage('Passwords do not match', 'error');
            return;
        }
        
        // Verify OTP
        if(window.sentOTP && parseInt(otp) !== window.sentOTP) {
            showMessage('Invalid OTP. Please try again.', 'error');
            return;
        }
        
        if(!window.sentOTP) {
            showMessage('Please request OTP first', 'error');
            return;
        }
        
        // Save user data (simulate)
        const user = {
            name: fullName,
            email: email,
            phone: phone,
            registeredAt: new Date().toISOString()
        };
        localStorage.setItem('user', JSON.stringify(user));
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', fullName);
        
        showMessage('Account created successfully! Redirecting...', 'success');
        
        setTimeout(() => {
            window.location.href = 'directory.html';
        }, 1500);
    });
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.className = `message ${type}`;
        msgDiv.innerText = msg;
        setTimeout(() => {
            msgDiv.className = 'message';
        }, 3000);
    }
</script>

</body>
</html>
