<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 32px 24px;
        }

        .back-link {
            margin-bottom: 24px;
        }

        .back-link a {
            color: #ff6b35;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e0e0e0;
            background: white;
        }

        .social-btn.google:hover {
            background: #f8f8f8;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 50px);
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: #fff;
            padding: 0 16px;
            color: #999;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
        }

        .register-btn {
            width: 100%;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.error {
            background: #ffe5e5;
            color: #d32f2f;
            display: block;
        }

        .message.success {
            background: #e5ffe5;
            color: #2e7d32;
            display: block;
        }
    </style>
    <script type="module">
        import { auth, googleProvider, signInWithPopup, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from './firebase-config.js';

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });

        // Google Signup
        document.getElementById('googleSignupBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                localStorage.setItem('userName', result.user.displayName);
                localStorage.setItem('userEmail', result.user.email);
                window.location.href = 'home.html';
            } catch (error) {
                document.getElementById('message').innerText = error.message;
                document.getElementById('message').className = 'message error';
            }
        });

        // Email Signup
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            if(password.length < 6) {
                document.getElementById('message').innerText = 'Password must be at least 6 characters';
                document.getElementById('message').className = 'message error';
                return;
            }
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                localStorage.setItem('userName', name);
                localStorage.setItem('userEmail', email);
                window.location.href = 'home.html';
            } catch (error) {
                document.getElementById('message').innerText = error.message;
                document.getElementById('message').className = 'message error';
            }
        });
    </script>
</head>
<body>

<div class="container">
    <div class="back-link">
        <a href="index.html">← Back</a>
    </div>
    
    <h2>Create account</h2>
    <div class="subtitle">Join India's largest event platform</div>
    
    <div id="message" class="message"></div>
    
    <div class="social-buttons">
        <button class="social-btn google" id="googleSignupBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>
    </div>
    
    <div class="divider"><span>or</span></div>
    
    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="fullName" placeholder="Full name" required>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email address" required>
        </div>
        <div class="input-group">
            <input type="tel" id="phone" placeholder="Phone number" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password (min 6 characters)" required>
        </div>
        <button type="submit" class="register-btn">Create account →</button>
    </form>
    
    <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

</body>
</html>
