<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* [Keeping your original CSS with minor fixes for charts] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; overflow-x: hidden; }
        .header { background: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #ff6b35, #ff9068); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .commission-badge { background: #ff6b35; color: white; padding: 5px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .dashboard-container { display: flex; min-height: calc(100vh - 80px); }
        .sidebar { width: 280px; background: white; border-right: 1px solid #eee; padding: 24px 0; position: sticky; top: 80px; height: calc(100vh - 80px); overflow-y: auto; }
        .sidebar-item { padding: 14px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; color: #4a5568; font-weight: 500; border-left: 3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: #fff5f0; color: #ff6b35; border-left-color: #ff6b35; }
        .main-content { flex: 1; padding: 24px; }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #f0f0f0; }
        .stat-value { font-size: 28px; font-weight: 800; color: #ff6b35; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-primary { background: #ff6b35; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #333; color: white; border-radius: 10px; z-index: 9999; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">STADIUM<span>CONNECT</span> <span class="commission-badge">12.5% Fee</span></div>
    <div>
        <button onclick="window.refreshAllData()" style="padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer;"><i class="fas fa-sync"></i> Sync</button>
        <button onclick="window.logout()" style="padding: 8px 15px; border-radius: 20px; background: #ff6b35; color: white; border: none; cursor: pointer; margin-left: 10px;">Logout</button>
    </div>
</header>

<div class="dashboard-container">
    <div class="sidebar">
        <div class="sidebar-item active" onclick="window.switchPanel('dashboard')"><i class="fas fa-home"></i> <span>Dashboard</span></div>
        <div class="sidebar-item" onclick="window.switchPanel('stadiums')"><i class="fas fa-stadium"></i> <span>Stadiums</span></div>
        <div class="sidebar-item" onclick="window.switchPanel('vendors')"><i class="fas fa-store"></i> <span>Vendors</span></div>
        <div class="sidebar-item" onclick="window.switchPanel('bookings')"><i class="fas fa-list"></i> <span>Bookings</span></div>
        <div class="sidebar-item" onclick="window.switchPanel('analytics')"><i class="fas fa-chart-pie"></i> <span>Analytics</span></div>
    </div>

    <div class="main-content">
        <div id="dashboardPanel" class="panel active">
            <div class="stats-grid" id="dashboardStats"></div>
            <div class="card">
                <h3>Recent Bookings</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>User</th><th>Vendor</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                        <tbody id="recentBookingsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="stadiumsPanel" class="panel">
            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Stadium Management</h3>
                    <button class="btn-primary" style="width: auto;" onclick="window.openAddStadiumModal()">+ Add Stadium</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Name</th><th>City</th><th>Price</th><th>Revenue</th><th>Actions</th></tr></thead>
                        <tbody id="stadiumsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="bookingsPanel" class="panel">
            <div class="card">
                <h3>All Bookings</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>ID</th><th>Customer</th><th>Vendor</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="bookingsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="analyticsPanel" class="panel">
            <div class="stats-grid" id="analyticsStats"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><canvas id="revenueTrendChart"></canvas></div>
                <div class="card"><canvas id="categoryRevenueChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<div id="stadiumModal" class="modal">
    <div class="modal-content">
        <h3 id="stadiumModalTitle">Add/Edit Stadium</h3><br>
        <input type="hidden" id="stadiumEditId">
        <div class="form-group"><label>Name</label><input type="text" id="stadiumName"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group"><label>City</label><input type="text" id="stadiumCity"></div>
            <div class="form-group"><label>Price/Day</label><input type="number" id="stadiumPrice"></div>
        </div>
        <div class="form-group"><label>Type</label><select id="stadiumType"><option>Cricket</option><option>Football</option><option>Multipurpose</option></select></div>
        <div class="form-group"><label>Description</label><textarea id="stadiumDescription"></textarea></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-primary" onclick="window.saveStadium()">Save Stadium</button>
            <button class="btn-primary" style="background:#666;" onclick="window.closeModal('stadiumModal')">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.appspot.com",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COMMISSION_RATE = 0.125;

    let allData = { stadiums: [], vendors: [], bookings: [] };

    // --- Core Functions ---
    window.showToast = (msg) => {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    };

    window.switchPanel = (panelId) => {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar-item').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId + 'Panel').classList.add('active');
        // Add active class to sidebar item
        event.currentTarget.classList.add('active');
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    // --- Data Management ---
    window.loadAllData = async () => {
        try {
            const vSnap = await getDocs(collection(db, "vendors"));
            const bSnap = await getDocs(collection(db, "bookings"));
            
            const vendors = vSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            allData.stadiums = vendors.filter(v => v.category === 'stadium');
            allData.vendors = vendors.filter(v => v.category !== 'stadium');
            allData.bookings = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            renderDashboard();
            renderStadiums();
            renderBookings();
            renderAnalytics();
        } catch (e) { console.error(e); }
    };

    function renderDashboard() {
        const confirmed = allData.bookings.filter(b => b.status === 'confirmed');
        const rev = confirmed.reduce((s, b) => s + (Number(b.amount) || 0), 0);
        
        document.getElementById('dashboardStats').innerHTML = `
            <div class="stat-card"><div class="stat-value">${allData.stadiums.length}</div><div class="stat-label">Stadiums</div></div>
            <div class="stat-card"><div class="stat-value">${allData.bookings.length}</div><div class="stat-label">Total Bookings</div></div>
            <div class="stat-card"><div class="stat-value">₹${rev.toLocaleString()}</div><div class="stat-label">Total Revenue</div></div>
            <div class="stat-card"><div class="stat-value">₹${(rev * COMMISSION_RATE).toLocaleString()}</div><div class="stat-label">Commission (12.5%)</div></div>
        `;

        const recent = allData.bookings.slice(0, 5);
        document.getElementById('recentBookingsBody').innerHTML = recent.map(b => `
            <tr><td>${b.userName}</td><td>${b.vendorName}</td><td>${b.eventDate}</td><td>₹${b.amount}</td><td><span class="status-badge status-${b.status}">${b.status}</span></td></tr>
        `).join('');
    }

    window.openAddStadiumModal = () => {
        document.getElementById('stadiumEditId').value = '';
        document.getElementById('stadiumName').value = '';
        document.getElementById('stadiumModal').style.display = 'flex';
    };

    window.saveStadium = async () => {
        const id = document.getElementById('stadiumEditId').value;
        const data = {
            name: document.getElementById('stadiumName').value,
            city: document.getElementById('stadiumCity').value,
            basePrice: Number(document.getElementById('stadiumPrice').value),
            type: document.getElementById('stadiumType').value,
            description: document.getElementById('stadiumDescription').value,
            category: 'stadium',
            updatedAt: new Date().toISOString()
        };

        if(!data.name || !data.city) return alert("Fill required fields");

        try {
            if(id) await updateDoc(doc(db, "vendors", id), data);
            else await addDoc(collection(db, "vendors"), { ...data, createdAt: new Date().toISOString() });
            
            window.closeModal('stadiumModal');
            window.showToast("Saved Successfully!");
            window.loadAllData();
        } catch (e) { alert(e.message); }
    };

    window.renderStadiums = () => {
        document.getElementById('stadiumsTableBody').innerHTML = allData.stadiums.map(s => {
            const rev = allData.bookings.filter(b => b.vendorId === s.id && b.status === 'confirmed').reduce((sum, b) => sum + Number(b.amount), 0);
            return `<tr>
                <td><b>${s.name}</b></td><td>${s.city}</td><td>₹${s.basePrice}</td><td>₹${rev.toLocaleString()}</td>
                <td>
                    <button onclick="window.editStadium('${s.id}')" style="color:blue; cursor:pointer; border:none; background:none;">Edit</button>
                    <button onclick="window.deleteItem('vendors','${s.id}')" style="color:red; cursor:pointer; border:none; background:none; margin-left:10px;">Delete</button>
                </td>
            </tr>`;
        }).join('');
    };

    window.editStadium = (id) => {
        const s = allData.stadiums.find(st => st.id === id);
        document.getElementById('stadiumEditId').value = s.id;
        document.getElementById('stadiumName').value = s.name;
        document.getElementById('stadiumCity').value = s.city;
        document.getElementById('stadiumPrice').value = s.basePrice;
        document.getElementById('stadiumModal').style.display = 'flex';
    };

    window.deleteItem = async (col, id) => {
        if(confirm("Are you sure?")) {
            await deleteDoc(doc(db, col, id));
            window.loadAllData();
            window.showToast("Deleted!");
        }
    };

    window.renderBookings = () => {
        document.getElementById('bookingsTableBody').innerHTML = allData.bookings.map(b => `
            <tr>
                <td>${b.id.slice(-5)}</td><td>${b.userName}</td><td>${b.vendorName}</td><td>₹${b.amount}</td>
                <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                <td>
                    <button onclick="window.updateStatus('${b.id}', 'confirmed')" style="color:green;">✔</button>
                    <button onclick="window.updateStatus('${b.id}', 'cancelled')" style="color:red;">✖</button>
                </td>
            </tr>
        `).join('');
    };

    window.updateStatus = async (id, status) => {
        await updateDoc(doc(db, "bookings", id), { status });
        window.loadAllData();
    };

    function renderAnalytics() {
        const ctx1 = document.getElementById('revenueTrendChart').getContext('2d');
        const ctx2 = document.getElementById('categoryRevenueChart').getContext('2d');
        
        // Clean previous charts
        if(window.chart1) window.chart1.destroy();
        if(window.chart2) window.chart2.destroy();

        window.chart1 = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr'],
                datasets: [{ label: 'Revenue Growth', data: [12000, 19000, 30000, 45000], borderColor: '#ff6b35' }]
            }
        });

        window.chart2 = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Stadiums', 'Vendors'],
                datasets: [{ data: [allData.stadiums.length, allData.vendors.length], backgroundColor: ['#ff6b35', '#4a5568'] }]
            }
        });
    }

    window.refreshAllData = () => window.loadAllData();
    window.logout = () => { window.location.href = 'admin-login.html'; };

    // Initial Load
    window.loadAllData();

</script>
</body>
</html>
