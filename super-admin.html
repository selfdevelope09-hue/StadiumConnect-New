<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, addDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
    authDomain: "stadiumconnect-8fecb.firebaseapp.com",
    projectId: "stadiumconnect-8fecb",
    storageBucket: "stadiumconnect-8fecb.appspot.com",
    messagingSenderId: "458108198578",
    appId: "1:458108198578:web:83d83646f0e24e718b73ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const COMMISSION_RATE = 0.125;

let allStadiums = [], allVendors = [], allAgents = [], allBookings = [], allCities = [];
let currentSelectedBooking = null;

// ✅ FIX: charts destroy
let revenueChart, categoryChart, cityChart;

function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = `toast ${isError ? 'error' : ''}`;
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function generateRandomId(prefix) {
    return prefix + Math.random().toString(36).substring(2, 10).toUpperCase();
}

function generateRandomPassword() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
    let pass = '';
    for(let i = 0; i < 8; i++) pass += chars[Math.floor(Math.random() * chars.length)];
    return pass;
}

async function uploadImage(file, path) {
    if(!file) return null;
    const storageRef = ref(storage, path + Date.now() + '_' + file.name);
    await uploadBytes(storageRef, file);
    return await getDownloadURL(storageRef);
}

// ✅ FIXED LOAD
async function loadAllData() {
    const vendorsSnap = await getDocs(collection(db, "vendors"));
    const agentsSnap = await getDocs(collection(db, "agents"));
    const bookingsSnap = await getDocs(collection(db, "bookings"));

    const allVendorsData = vendorsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    allStadiums = allVendorsData.filter(v => v.category === 'stadium');
    allVendors = allVendorsData.filter(v => v.category !== 'stadium');
    allAgents = agentsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allBookings = bookingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    updateDashboard();
    renderStadiums();
    renderVendors();
    renderAgents();
    renderBookings();
    renderAnalytics();
}

// ✅ DASHBOARD
function updateDashboard() {
    const confirmed = allBookings.filter(b => b.status === 'confirmed');
    const totalRev = confirmed.reduce((s,b) => s + (parseInt(String(b.amount).replace(/[₹,]/g,''))||0), 0);

    document.getElementById('dashboardStats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${allStadiums.length}</div><div class="stat-label">Stadiums</div></div>
        <div class="stat-card"><div class="stat-value">${allVendors.length}</div><div class="stat-label">Vendors</div></div>
        <div class="stat-card"><div class="stat-value">${allAgents.length}</div><div class="stat-label">Agents</div></div>
        <div class="stat-card"><div class="stat-value">${allBookings.length}</div><div class="stat-label">Bookings</div></div>
        <div class="stat-card"><div class="stat-value">₹${totalRev.toLocaleString()}</div><div class="stat-label">Revenue</div></div>
    `;
}

// ✅ STADIUM RENDER
function renderStadiums() {
    document.getElementById('stadiumsTableBody').innerHTML = allStadiums.map(s => `
        <tr>
            <td>${s.name}</td>
            <td>${s.city}</td>
            <td>${s.loginId || '-'}</td>
        </tr>
    `).join('');
}

// ✅ VENDORS
function renderVendors() {
    document.getElementById('vendorsTableBody').innerHTML = allVendors.map(v => `
        <tr>
            <td>${v.name}</td>
            <td>${v.category}</td>
            <td>${v.city}</td>
        </tr>
    `).join('');
}

// ✅ FIXED AGENTS (NO CRASH)
function renderAgents() {
    document.getElementById('agentsTableBody').innerHTML = allAgents.map(a => `
        <tr>
            <td>${a.name}</td>
            <td>${a.phone}</td>
            <td>${a.city}</td>
        </tr>
    `).join('');
}

// ✅ FIXED BOOKINGS
function renderBookings() {
    document.getElementById('bookingsTableBody').innerHTML = allBookings.map(b => `
        <tr>
            <td>${b.userName}</td>
            <td>${b.vendorName}</td>
            <td>${b.status}</td>
        </tr>
    `).join('');
}

// ✅ ANALYTICS FIX
function renderAnalytics() {
    const monthly = {};
    allBookings.forEach(b => {
        const m = new Date().getMonth();
        monthly[m] = (monthly[m]||0) + 1;
    });

    if(revenueChart) revenueChart.destroy();

    revenueChart = new Chart(document.getElementById('revenueTrendChart'), {
        type:'line',
        data:{
            labels:Object.keys(monthly),
            datasets:[{ data:Object.values(monthly), borderColor:'#ff6b35' }]
        }
    });
}

// ✅ SAVE STADIUM FIX
window.saveStadium = async () => {

    const isEdit = document.getElementById('stadiumEditId').value;
    const existing = allStadiums.find(s => s.id === isEdit);

    const loginId = isEdit 
        ? (existing?.loginId || generateRandomId('STAD')) 
        : generateRandomId('STAD');

    const password = isEdit 
        ? (existing?.password || generateRandomPassword()) 
        : generateRandomPassword();

    const data = {
        name: document.getElementById('stadiumName').value,
        category: 'stadium',
        city: document.getElementById('stadiumCity').value,
        loginId,
        password,
        createdAt: new Date().toISOString()
    };

    if(!data.name || !data.city){
        showToast("Fill required fields!", true);
        return;
    }

    await addDoc(collection(db, 'vendors'), data);
    showToast("Stadium Added!");

    loadAllData();
};

// ✅ FIX SWITCH PANEL
window.switchPanel = (panel, el) => {
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById(panel+'Panel').classList.add('active');
};

window.refreshAllData = () => loadAllData();

loadAllData();

</script>
