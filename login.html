<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 32px 24px;
        }

        .back-link {
            margin-bottom: 24px;
        }

        .back-link a {
            color: #ff6b35;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e0e0e0;
            background: white;
        }

        .social-btn.google:hover {
            background: #f8f8f8;
        }

        .social-btn.facebook {
            background: #1877f2;
            border-color: #1877f2;
            color: white;
        }

        .social-btn.facebook:hover {
            background: #166fe5;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 50px);
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: #fff;
            padding: 0 16px;
            color: #999;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .login-btn {
            width: 100%;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.error {
            background: #ffe5e5;
            color: #d32f2f;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="back-link">
        <a href="index.html">← Back</a>
    </div>
    
    <h2>Welcome back</h2>
    <div class="subtitle">Sign in to continue</div>
    
    <div id="message" class="message"></div>
    
    <div class="social-buttons">
        <button class="social-btn google" onclick="socialLogin('google')">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>
        <button class="social-btn facebook" onclick="socialLogin('facebook')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/>
            </svg>
            Continue with Facebook
        </button>
    </div>
    
    <div class="divider"><span>or</span></div>
    
    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="email" placeholder="Email address" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Sign in →</button>
    </form>
    
    <div class="register-link">
        New here? <a href="register.html">Create an account</a>
    </div>
</div>

<script>
    function socialLogin(provider) {
        // Demo - In real app, this would connect to Firebase/Google/Facebook API
        if(provider === 'google') {
            alert('Google Login - In production, this connects to real Google accounts');
        } else {
            alert('Facebook Login - In production, this connects to real Facebook accounts');
        }
        // After successful login, redirect to home page
        window.location.href = 'home.html';
    }
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if(email && password) {
            // Demo login - In real app, validate with backend
            window.location.href = 'home.html';
        } else {
            document.getElementById('message').innerText = 'Please enter email and password';
            document.getElementById('message').className = 'message error';
        }
    });
</script>

</body>
</html>
