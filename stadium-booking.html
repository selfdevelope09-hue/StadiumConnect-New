<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stadium Booking - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; }

        .header {
            background: rgba(0,0,0,0.95);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            font-size: 22px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #ff6b35); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .back-btn { 
            background: none; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            color: #ff6b35;
            transition: 0.2s;
        }
        .back-btn:hover { opacity: 0.8; transform: translateX(-3px); }
        
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-link:hover { color: #ff6b35; }
        .login-status {
            background: rgba(255,107,53,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
        }
        .logout-btn {
            background: rgba(255,107,53,0.3);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #ff6b35;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .logout-btn:hover { background: #ff6b35; color: white; }

        .container { max-width: 800px; margin: 0 auto; padding: 30px; }
        .booking-card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .stadium-name { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .stadium-location { color: #aaa; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; color: white; font-size: 15px; 
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff6b35; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .portion-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .portion-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 24px; border-radius: 30px; cursor: pointer; transition: 0.2s;
            font-weight: 600;
        }
        .portion-btn:hover { background: rgba(255,107,53,0.5); }
        .portion-btn.selected { background: #ff6b35; border-color: #ff6b35; box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
        .price-box { background: rgba(255,107,53,0.1); border-radius: 20px; padding: 20px; margin: 20px 0; text-align: center; border: 1px solid rgba(255,107,53,0.3); }
        .price-amount { font-size: 36px; font-weight: 800; color: #ff6b35; }
        .ai-suggestion { font-size: 12px; color: #ffaa66; margin-top: 10px; }
        .book-btn { 
            width: 100%; background: #ff6b35; color: white; border: none; padding: 18px; 
            border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; 
            margin-top: 20px; transition: 0.2s;
        }
        .book-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,107,53,0.4); }
        .book-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            background: #28a745;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .alert-error { background: #dc3545; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 600px) { 
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .portion-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="logo" onclick="goHome()">STADIUM<span>CONNECT</span></div>
    <div class="nav-links">
        <span class="nav-link" onclick="scrollToSection('booking')">Book Now</span>
        <div id="authSection">
            <span class="login-status" id="userDisplay">Loading...</span>
            <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logoutUser()">Logout</button>
        </div>
    </div>
</header>

<div class="container" id="booking">
    <div class="booking-card">
        <div class="stadium-name" id="stadiumName">Vidarbha Cricket Stadium</div>
        <div class="stadium-location"><i class="fas fa-map-marker-alt"></i> <span id="stadiumLocation">Nagpur</span></div>
        
        <div class="portion-buttons">
            <div class="portion-btn" data-percent="25" onclick="selectPortion(25)">25%</div>
            <div class="portion-btn" data-percent="50" onclick="selectPortion(50)">50%</div>
            <div class="portion-btn" data-percent="75" onclick="selectPortion(75)">75%</div>
            <div class="portion-btn" data-percent="100" onclick="selectPortion(100)">Full Stadium</div>
        </div>
        
        <div class="price-box">
            <div style="font-size: 14px; color:#aaa;">🤖 AI Calculated Price</div>
            <div class="price-amount" id="priceAmount">₹0</div>
            <div id="priceDetail" style="font-size: 12px;">0% selected</div>
            <div id="aiSuggestion" class="ai-suggestion"><i class="fas fa-robot"></i> Select portion to see AI suggestions</div>
        </div>
        
        <form id="bookingForm">
            <div class="form-row">
                <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" required placeholder="Enter your name"></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required placeholder="10 digit mobile"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email *</label><input type="email" id="email" required placeholder="Email address"></div>
                <div class="form-group"><label>City *</label><input type="text" id="city" required placeholder="Your city"></div>
            </div>
            <div class="form-group"><label>Event Location *</label><input type="text" id="eventLocation" required placeholder="Full address where event will be held"></div>
            <div class="form-row">
                <div class="form-group"><label>Event Date *</label><input type="date" id="eventDate" required></div>
                <div class="form-group"><label>Event Type *</label>
                    <select id="eventType" required>
                        <option>Wedding</option>
                        <option>Corporate Event</option>
                        <option>Concert</option>
                        <option>Sports Match</option>
                        <option>Birthday Party</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Expected Guests</label><input type="number" id="guestCount" placeholder="Number of guests (for capacity planning)"></div>
            <div class="form-group"><label>Special Requests</label><textarea id="specialRequests" rows="2" placeholder="Any special requirements..."></textarea></div>
        </form>
        
        <button class="book-btn" id="bookBtn" onclick="bookStadium()"><i class="fas fa-credit-card"></i> Confirm Booking →</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const stadiumId = urlParams.get('id');

    let stadium = { name: "Vidarbha Cricket Stadium", city: "Nagpur", basePrice: 50000, totalCapacity: 45000 };
    let selectedPercent = 50;
    let currentUser = null;

    // Global functions for inline onclick
    window.selectPortion = selectPortion;
    window.bookStadium = bookStadium;
    window.goBack = goBack;
    window.goHome = goHome;
    window.logoutUser = logoutUser;

    function showAlert(message, isError = false) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert ${isError ? 'alert-error' : ''}`;
        alertDiv.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    }

    function goBack() {
        // Go to stadium listing page - show all stadiums
        window.location.href = '#';
        // Instead of redirecting to missing page, we show stadium list
        showAlert('🏟️ Redirecting to Stadium List', false);
        setTimeout(() => {
            // Reload with stadium list view - you can modify this to show all stadiums
            window.location.reload();
        }, 500);
    }

    function goHome() {
        window.location.href = '#';
        showAlert('🏠 Welcome to StadiumConnect', false);
        setTimeout(() => window.location.reload(), 500);
    }

    async function logoutUser() {
        await signOut(auth);
        showAlert('👋 Logged out successfully!');
        setTimeout(() => window.location.reload(), 500);
    }

    async function loadStadium() {
        if (stadiumId) {
            try {
                const docSnap = await getDoc(doc(db, 'vendors', stadiumId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    stadium = { id: docSnap.id, ...data };
                    stadium.basePrice = parseInt(data.priceRange?.replace(/[^0-9]/g, '')) || data.basePrice || 50000;
                    stadium.totalCapacity = data.capacity || 45000;
                }
            } catch (error) {
                console.error('Error loading stadium:', error);
            }
        }
        document.getElementById('stadiumName').innerText = stadium.name;
        document.getElementById('stadiumLocation').innerText = stadium.city;
        updatePrice();
    }

    function selectPortion(percent) {
        selectedPercent = percent;
        document.querySelectorAll('.portion-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (parseInt(btn.getAttribute('data-percent')) === percent) {
                btn.classList.add('selected');
            }
        });
        updatePrice();
        
        // AI Suggestion based on guest count
        const guestCount = parseInt(document.getElementById('guestCount').value) || 0;
        const estimatedSeats = Math.floor(stadium.totalCapacity * (selectedPercent / 100));
        const aiMsg = document.getElementById('aiSuggestion');
        
        if (guestCount > 0) {
            if (guestCount > estimatedSeats) {
                aiMsg.innerHTML = `<i class="fas fa-robot"></i> ⚠️ AI Alert: ${guestCount} guests need ${Math.ceil((guestCount/stadium.totalCapacity)*100)}% area. Current ${selectedPercent}% may be insufficient!`;
                aiMsg.style.color = "#ffaa66";
            } else if (guestCount <= estimatedSeats * 0.6) {
                aiMsg.innerHTML = `<i class="fas fa-robot"></i> 💡 AI Suggestion: ${selectedPercent}% (${estimatedSeats} seats) is more than enough for ${guestCount} guests. You could save money by selecting smaller portion!`;
                aiMsg.style.color = "#28a745";
            } else {
                aiMsg.innerHTML = `<i class="fas fa-robot"></i> ✅ Perfect! ${selectedPercent}% area fits ${guestCount} guests comfortably. Estimated capacity: ${estimatedSeats} seats.`;
                aiMsg.style.color = "#ff6b35";
            }
        } else {
            aiMsg.innerHTML = `<i class="fas fa-robot"></i> 🤖 ${selectedPercent}% area can accommodate approximately ${estimatedSeats.toLocaleString()} guests. Enter guest count for personalized AI advice.`;
            aiMsg.style.color = "#ffaa66";
        }
    }

    function updatePrice() {
        let price = Math.floor(stadium.basePrice * (selectedPercent / 100));
        document.getElementById('priceAmount').innerHTML = `₹${price.toLocaleString()}`;
        document.getElementById('priceDetail').innerHTML = `${selectedPercent}% of stadium selected (approx ${Math.floor(stadium.totalCapacity * selectedPercent / 100).toLocaleString()} seats)`;
    }

    // Listen for guest count changes
    document.getElementById('guestCount')?.addEventListener('input', () => {
        updatePrice();
        selectPortion(selectedPercent);
    });

    async function bookStadium() {
        if (!currentUser) {
            showAlert('🔐 Please login to book stadium', true);
            // Create a simple login modal instead of redirecting to missing page
            const email = prompt('📧 Enter your email to login/register:');
            if (email && email.includes('@')) {
                showAlert('⚠️ Please use the login page. Creating demo account...', false);
                // Store in localStorage as demo
                localStorage.setItem('demoUser', JSON.stringify({ email, name: email.split('@')[0] }));
                showAlert('✅ Demo login successful! Please refresh and try again.', false);
                setTimeout(() => window.location.reload(), 1000);
            }
            return;
        }
        
        const fullName = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const city = document.getElementById('city').value;
        const eventLocation = document.getElementById('eventLocation').value;
        const eventDate = document.getElementById('eventDate').value;
        const eventType = document.getElementById('eventType').value;
        const guestCount = document.getElementById('guestCount').value;
        const specialRequests = document.getElementById('specialRequests').value;
        
        if (!fullName || !phone || !email || !city || !eventLocation || !eventDate) {
            showAlert('⚠️ Please fill all required fields (*)', true);
            return;
        }
        
        if (!/^\d{10}$/.test(phone)) {
            showAlert('📱 Please enter a valid 10-digit phone number', true);
            return;
        }
        
        const price = Math.floor(stadium.basePrice * (selectedPercent / 100));
        
        try {
            const booking = {
                vendorId: stadium.id,
                vendorName: stadium.name,
                vendorCity: stadium.city,
                category: 'stadium',
                userId: currentUser.uid || currentUser.email,
                userName: fullName,
                userPhone: phone,
                userEmail: email,
                userCity: city,
                eventLocation: eventLocation,
                eventDate: eventDate,
                eventType: eventType,
                guestCount: guestCount || 0,
                selectedPortion: `${selectedPercent}%`,
                estimatedSeats: Math.floor(stadium.totalCapacity * selectedPercent / 100),
                specialRequests: specialRequests,
                amount: price,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            await addDoc(collection(db, 'bookings'), booking);
            showAlert(`✅ Booking Confirmed!\n\n🏟️ ${stadium.name}\n📅 ${eventDate}\n🎟️ ${selectedPercent}% (${booking.estimatedSeats.toLocaleString()} seats)\n💰 ₹${price.toLocaleString()}\n\n📞 Agent will contact you soon!`);
            
            // Reset form after successful booking
            setTimeout(() => {
                if (confirm('Booking successful! Would you like to make another booking?')) {
                    document.getElementById('bookingForm').reset();
                    selectPortion(50);
                }
            }, 500);
            
        } catch (error) {
            console.error('Booking error:', error);
            showAlert('❌ Booking failed: ' + error.message, true);
        }
    }

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const userDisplay = document.getElementById('userDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // Also check demo user
        const demoUser = localStorage.getItem('demoUser');
        
        if (user) {
            userDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${user.email || user.displayName || 'User'}`;
            logoutBtn.style.display = 'inline-block';
            // Auto-fill email if available
            if (user.email && !document.getElementById('email').value) {
                document.getElementById('email').value = user.email;
            }
        } else if (demoUser) {
            const demo = JSON.parse(demoUser);
            userDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${demo.name || 'Demo User'}`;
            logoutBtn.style.display = 'inline-block';
            if (demo.email && !document.getElementById('email').value) {
                document.getElementById('email').value = demo.email;
            }
        } else {
            userDisplay.innerHTML = `<i class="fas fa-sign-in-alt"></i> Login Required`;
            logoutBtn.style.display = 'none';
            // Add click to login
            userDisplay.style.cursor = 'pointer';
            userDisplay.onclick = () => {
                const email = prompt('🔐 Quick Login\n\nEnter your email to continue:');
                if (email && email.includes('@')) {
                    localStorage.setItem('demoUser', JSON.stringify({ email, name: email.split('@')[0] }));
                    showAlert('✅ Logged in as ' + email.split('@')[0]);
                    window.location.reload();
                }
            };
        }
    });

    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('eventDate').min = today;
    
    loadStadium();
</script>

</body>
</html>
