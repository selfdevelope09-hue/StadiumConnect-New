<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium Owner Login - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #050517 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 48px 40px;
            border-radius: 48px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,107,53,0.3);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-icon {
            font-size: 60px;
            color: #ff6b35;
            margin-bottom: 20px;
        }
        h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            color: #ccc;
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 10px rgba(255,107,53,0.3);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6b35, #ff9068);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,107,53,0.4);
        }
        .error-msg {
            background: rgba(220,53,69,0.2);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }
        .help-text {
            margin-top: 25px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
        }
        .back-link a:hover {
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏟️ STADIUM<span>CONNECT</span></div>
        <div class="login-icon"><i class="fas fa-user-tie"></i></div>
        <h2>Stadium Owner Login</h2>
        
        <div class="form-group">
            <label><i class="fas fa-id-card"></i> Stadium ID</label>
            <input type="text" id="stadiumId" placeholder="Enter your Stadium ID (e.g., STAD001)">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <button class="login-btn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
        
        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-triangle"></i> Invalid Stadium ID or Password
        </div>
        
        <div class="help-text">
            <i class="fas fa-question-circle"></i> Contact admin if you don't have credentials
        </div>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.appspot.com",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.login = async () => {
            const stadiumId = document.getElementById('stadiumId').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if(!stadiumId || !password) {
                errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please enter both Stadium ID and Password';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            try {
                // Search for stadium with matching loginId and password
                const q = query(
                    collection(db, "vendors"), 
                    where("loginId", "==", stadiumId),
                    where("password", "==", password)
                );
                const snapshot = await getDocs(q);
                
                if(!snapshot.empty) {
                    const stadium = snapshot.docs[0];
                    const stadiumData = stadium.data();
                    
                    // Save login info
                    sessionStorage.setItem('ownerId', stadium.id);
                    sessionStorage.setItem('ownerLoginId', stadiumId);
                    sessionStorage.setItem('ownerName', stadiumData.name);
                    
                    // Redirect to dashboard
                    window.location.href = `owner-dashboard.html?id=${stadium.id}`;
                } else {
                    errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Invalid Stadium ID or Password. Please check and try again.';
                    errorMsg.style.display = 'block';
                    setTimeout(() => errorMsg.style.display = 'none', 3000);
                }
            } catch(error) {
                console.error("Login error:", error);
                errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Login failed. Please try again.';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        };
        
        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') login();
        });
    </script>
</body>
</html>
