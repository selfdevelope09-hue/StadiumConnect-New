<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - StadiumConnect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body { background: #f8f9fa; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #ff6b35; font-size: 24px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-number { font-size: 32px; font-weight: bold; color: #ff6b35; }
        .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: white; border: none; padding: 12px 28px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 15px; transition: 0.2s; }
        .tab.active { background: #ff6b35; color: white; }
        .tab-content { display: none; background: white; border-radius: 24px; padding: 24px; }
        .tab-content.active { display: block; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; font-weight: 600; }
        .btn-edit { background: #ffc107; color: #000; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; margin-right: 8px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 28px; border-radius: 28px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: #ff6b35; }
        .close { font-size: 28px; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .save-btn { background: #ff6b35; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .message { padding: 12px; border-radius: 12px; margin-bottom: 15px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 1px solid #eee; }
        .list-item span { font-size: 16px; }
        @media (max-width: 700px) { .form-row { flex-direction: column; gap: 0; } th, td { font-size: 13px; padding: 10px; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let vendors = [];
        let categories = [];
        let cities = [];
        let editingVendorId = null;
        let editingCategoryId = null;
        let editingCity = null;

        // ========== LOAD DATA ==========
        async function loadVendors() {
            const snap = await getDocs(collection(db, "vendors"));
            vendors = [];
            snap.forEach(doc => vendors.push({ id: doc.id, ...doc.data() }));
            renderVendorsTable();
            updateStats();
        }

        async function loadCategories() {
            const snap = await getDocs(collection(db, "categories"));
            categories = [];
            snap.forEach(doc => { if (!doc.data().deleted) categories.push({ id: doc.id, ...doc.data() }); });
            if (categories.length === 0) {
                categories = [
                    { id: 'decorator', name: 'Decorators', icon: '🎨' },
                    { id: 'photographer', name: 'Photographers', icon: '📸' },
                    { id: 'caterer', name: 'Caterers', icon: '🍽️' },
                    { id: 'bandbaja', name: 'Band Baja', icon: '🎵' },
                    { id: 'stadium', name: 'Stadiums', icon: '🏟️' }
                ];
            }
            renderCategoriesList();
            updateCategorySelect();
        }

        async function loadCities() {
            const docRef = doc(db, 'settings', 'cities');
            const docSnap = await getDoc(docRef);
            cities = docSnap.exists() ? docSnap.data().list : ['Nagpur', 'Mumbai', 'Pune', 'Delhi', 'Bangalore', 'Hyderabad'];
            renderCitiesList();
            updateCitySelect();
        }

        function updateStats() {
            document.getElementById('totalVendors').innerText = vendors.length;
            document.getElementById('totalDecorators').innerText = vendors.filter(v => v.category === 'decorator').length;
            document.getElementById('totalPhotographers').innerText = vendors.filter(v => v.category === 'photographer').length;
            document.getElementById('totalCaterers').innerText = vendors.filter(v => v.category === 'caterer').length;
            document.getElementById('totalBand').innerText = vendors.filter(v => v.category === 'bandbaja').length;
            document.getElementById('totalStadiums').innerText = vendors.filter(v => v.category === 'stadium').length;
        }

        function updateCategorySelect() {
            const select = document.getElementById('vendorCategory');
            if (select) {
                select.innerHTML = categories.map(c => `<option value="${c.id}">${c.icon || '🏷️'} ${c.name}</option>`).join('');
            }
        }

        function updateCitySelect() {
            const select = document.getElementById('vendorCity');
            if (select) {
                select.innerHTML = cities.map(c => `<option value="${c}">${c}</option>`).join('');
            }
        }

        // ========== VENDORS ==========
        function renderVendorsTable() {
            const tbody = document.getElementById('vendorTable');
            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name || '-'}</td>
                    <td>${v.category || '-'}</td>
                    <td>${v.city || '-'}</td>
                    <td>${v.priceRange || '-'}</td>
                    <td>${v.rating || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteVendor('${v.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        window.openAddVendor = () => {
            editingVendorId = null;
            document.getElementById('vendorModalTitle').innerText = 'Add Vendor';
            document.getElementById('vendorForm').reset();
            document.getElementById('capacityGroup').style.display = 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.editVendor = (id) => {
            const v = vendors.find(x => x.id === id);
            if (!v) return;
            editingVendorId = id;
            document.getElementById('vendorModalTitle').innerText = 'Edit Vendor';
            document.getElementById('vendorName').value = v.name || '';
            document.getElementById('vendorCategory').value = v.category || '';
            document.getElementById('vendorCity').value = v.city || '';
            document.getElementById('vendorLocation').value = v.location || '';
            document.getElementById('vendorPrice').value = v.priceRange || '';
            document.getElementById('vendorRating').value = v.rating || '';
            document.getElementById('vendorPhone').value = v.phone || '';
            document.getElementById('vendorDescription').value = v.description || '';
            document.getElementById('vendorCapacity').value = v.capacity || '';
            document.getElementById('vendorLat').value = v.lat || '';
            document.getElementById('vendorLng').value = v.lng || '';
            document.getElementById('capacityGroup').style.display = v.category === 'stadium' ? 'block' : 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.deleteVendor = async (id) => {
            if (confirm('Delete this vendor?')) {
                await deleteDoc(doc(db, 'vendors', id));
                await loadVendors();
                showMessage('Vendor deleted successfully!', 'success');
            }
        };

        window.saveVendor = async () => {
            const category = document.getElementById('vendorCategory').value;
            const data = {
                name: document.getElementById('vendorName').value,
                category: category,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value,
                priceRange: document.getElementById('vendorPrice').value,
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value,
                description: document.getElementById('vendorDescription').value,
                lat: parseFloat(document.getElementById('vendorLat').value) || null,
                lng: parseFloat(document.getElementById('vendorLng').value) || null,
                updatedAt: new Date().toISOString()
            };
            if (category === 'stadium') data.capacity = document.getElementById('vendorCapacity').value;

            if (editingVendorId) {
                await updateDoc(doc(db, 'vendors', editingVendorId), data);
                showMessage('Vendor updated successfully!', 'success');
            } else {
                data.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), data);
                showMessage('Vendor added successfully!', 'success');
            }
            closeModal('vendorModal');
            await loadVendors();
        };

        window.onCategoryChange = () => {
            const val = document.getElementById('vendorCategory').value;
            document.getElementById('capacityGroup').style.display = val === 'stadium' ? 'block' : 'none';
        };

        // ========== CATEGORIES ==========
        function renderCategoriesList() {
            const container = document.getElementById('categoriesList');
            container.innerHTML = categories.map(c => `
                <div class="list-item">
                    <span>${c.icon || '🏷️'} ${c.name}</span>
                    <div>
                        <button class="btn-edit" onclick="editCategory('${c.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteCategory('${c.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.openAddCategory = () => {
            editingCategoryId = null;
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryIcon').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        };

        window.editCategory = (id) => {
            const c = categories.find(x => x.id === id);
            if (!c) return;
            editingCategoryId = id;
            document.getElementById('categoryName').value = c.name;
            document.getElementById('categoryIcon').value = c.icon || '';
            document.getElementById('categoryModal').style.display = 'flex';
        };

        window.deleteCategory = async (id) => {
            if (confirm('Delete this category?')) {
                categories = categories.filter(c => c.id !== id);
                await setDoc(doc(db, 'categories', id), { deleted: true });
                renderCategoriesList();
                updateCategorySelect();
                showMessage('Category deleted successfully!', 'success');
            }
        };

        window.saveCategory = async () => {
            const name = document.getElementById('categoryName').value;
            const icon = document.getElementById('categoryIcon').value;
            if (!name) { showMessage('Please enter category name', 'error'); return; }
            const id = name.toLowerCase().replace(/ /g, '');
            const cat = { id, name, icon: icon || '🏷️' };
            
            if (editingCategoryId) {
                const index = categories.findIndex(c => c.id === editingCategoryId);
                if (index !== -1) categories[index] = cat;
                await setDoc(doc(db, 'categories', id), cat);
                showMessage('Category updated successfully!', 'success');
            } else {
                if (!categories.find(c => c.id === id)) categories.push(cat);
                await setDoc(doc(db, 'categories', id), cat);
                showMessage('Category added successfully!', 'success');
            }
            renderCategoriesList();
            updateCategorySelect();
            closeModal('categoryModal');
        };

        // ========== CITIES ==========
        function renderCitiesList() {
            const container = document.getElementById('citiesList');
            container.innerHTML = cities.map(c => `
                <div class="list-item">
                    <span>📍 ${c}</span>
                    <div>
                        <button class="btn-edit" onclick="editCity('${c}')">Edit</button>
                        <button class="btn-delete" onclick="deleteCity('${c}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.openAddCity = () => {
            editingCity = null;
            document.getElementById('cityName').value = '';
            document.getElementById('cityModal').style.display = 'flex';
        };

        window.editCity = (city) => {
            editingCity = city;
            document.getElementById('cityName').value = city;
            document.getElementById('cityModal').style.display = 'flex';
        };

        window.deleteCity = (city) => {
            if (confirm(`Delete ${city}?`)) {
                cities = cities.filter(c => c !== city);
                saveCities();
                renderCitiesList();
                updateCitySelect();
                showMessage('City deleted successfully!', 'success');
            }
        };

        window.saveCity = async () => {
            const name = document.getElementById('cityName').value;
            if (!name) { showMessage('Please enter city name', 'error'); return; }
            if (editingCity) {
                const index = cities.indexOf(editingCity);
                if (index !== -1) cities[index] = name;
                showMessage('City updated successfully!', 'success');
            } else {
                if (!cities.includes(name)) cities.push(name);
                showMessage('City added successfully!', 'success');
            }
            await saveCities();
            renderCitiesList();
            updateCitySelect();
            closeModal('cityModal');
        };

        async function saveCities() {
            await setDoc(doc(db, 'settings', 'cities'), { list: cities });
        }

        // ========== UTILITIES ==========
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = msg;
            setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
        }

        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            if (tab === 'vendors') loadVendors();
            if (tab === 'categories') loadCategories();
            if (tab === 'cities') loadCities();
        };

        window.logout = () => {
            localStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        };

        // Admin check
        if (localStorage.getItem('admin') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        // Initial load
        loadVendors();
        loadCategories();
        loadCities();
    </script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ StadiumConnect Admin</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="globalMessage" class="message"></div>

    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalVendors">0</div><div class="stat-label">Total Vendors</div></div>
        <div class="stat-card"><div class="stat-number" id="totalDecorators">0</div><div class="stat-label">🎨 Decorators</div></div>
        <div class="stat-card"><div class="stat-number" id="totalPhotographers">0</div><div class="stat-label">📸 Photographers</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCaterers">0</div><div class="stat-label">🍽️ Caterers</div></div>
        <div class="stat-card"><div class="stat-number" id="totalBand">0</div><div class="stat-label">🎵 Band Baja</div></div>
        <div class="stat-card"><div class="stat-number" id="totalStadiums">0</div><div class="stat-label">🏟️ Stadiums</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('vendors')">📦 Vendors</button>
        <button class="tab" onclick="switchTab('categories')">🏷️ Categories</button>
        <button class="tab" onclick="switchTab('cities')">📍 Cities</button>
    </div>

    <!-- Vendors Tab -->
    <div id="vendorsTab" class="tab-content active">
        <button class="btn-add" onclick="openAddVendor()">+ Add New Vendor</button>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Name</th><th>Category</th><th>City</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody id="vendorTable"><tr><td colspan="6">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- Categories Tab -->
    <div id="categoriesTab" class="tab-content">
        <button class="btn-add" onclick="openAddCategory()">+ Add New Category</button>
        <div id="categoriesList" style="margin-top: 20px;"></div>
    </div>

    <!-- Cities Tab -->
    <div id="citiesTab" class="tab-content">
        <button class="btn-add" onclick="openAddCity()">+ Add New City</button>
        <div id="citiesList" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Vendor Modal -->
<div id="vendorModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="vendorModalTitle">Add Vendor</h3><span class="close" onclick="closeModal('vendorModal')">&times;</span></div>
        <div id="vendorForm">
            <div class="form-group"><input type="text" id="vendorName" placeholder="Vendor Name *"></div>
            <div class="form-group"><select id="vendorCategory" onchange="onCategoryChange()"></select></div>
            <div class="form-group"><select id="vendorCity"></select></div>
            <div class="form-group"><input type="text" id="vendorLocation" placeholder="Location (Area)"></div>
            <div class="form-group"><input type="text" id="vendorPrice" placeholder="Price Range (e.g., ₹10,000 - ₹50,000)"></div>
            <div class="form-group"><input type="text" id="vendorRating" placeholder="Rating (1-5)"></div>
            <div class="form-group"><input type="text" id="vendorPhone" placeholder="Phone Number"></div>
            <div id="capacityGroup" class="form-group" style="display:none"><input type="text" id="vendorCapacity" placeholder="Capacity (seats)"></div>
            <div class="form-row">
                <div class="form-group"><input type="text" id="vendorLat" placeholder="Latitude (optional)"></div>
                <div class="form-group"><input type="text" id="vendorLng" placeholder="Longitude (optional)"></div>
            </div>
            <div class="form-group"><textarea id="vendorDescription" rows="2" placeholder="Description"></textarea></div>
            <button class="save-btn" onclick="saveVendor()">Save Vendor</button>
        </div>
    </div>
</div>

<!-- Category Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Add/Edit Category</h3><span class="close" onclick="closeModal('categoryModal')">&times;</span></div>
        <div class="form-group"><input type="text" id="categoryName" placeholder="Category Name (e.g., Mehndi Artist)"></div>
        <div class="form-group"><input type="text" id="categoryIcon" placeholder="Icon Emoji (e.g., 🎨)"></div>
        <button class="save-btn" onclick="saveCategory()">Save Category</button>
    </div>
</div>

<!-- City Modal -->
<div id="cityModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Add/Edit City</h3><span class="close" onclick="closeModal('cityModal')">&times;</span></div>
        <div class="form-group"><input type="text" id="cityName" placeholder="City Name (e.g., Jaipur)"></div>
        <button class="save-btn" onclick="saveCity()">Save City</button>
    </div>
</div>

</body>
</html>
