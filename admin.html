<!DOCTYPE html>
<html lang="en">
<head>

    <script type="module">
    // Check admin login
    const isAdmin = localStorage.getItem('adminLoggedIn');
    if (!isAdmin || isAdmin !== 'true') {
        window.location.href = 'admin-login.html';
    }
    
    // Rest of your admin code...
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
        }

        /* Header */
        .header {
            background: #fff;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
        }

        .logo span {
            color: #ff6b35;
        }

        .logout-btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: #ff6b35;
            color: white;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ff6b35;
        }

        /* Forms */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
        }

        .btn-primary {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-edit {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 8px;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #fafafa;
            font-weight: 600;
        }

        /* Photo Upload */
        .photo-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .photo-preview {
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-preview .remove-photo {
            position: absolute;
            top: 4px;
            right: 4px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .upload-btn {
            background: #f0f0f0;
            border: 1px dashed #ccc;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
        }
    </style>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let vendors = [];
        let tempPhotos = [];

        // Check admin
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            if (user.email !== 'atharvadarshanwar09@gmail.com') {
                alert('Access denied. Admin only.');
                window.location.href = 'home.html';
                return;
            }
            loadAllData();
        });

        async function loadAllData() {
            await loadVendors();
            updateStats();
            renderVendorsTable();
        }

        async function loadVendors() {
            const querySnapshot = await getDocs(collection(db, "vendors"));
            vendors = [];
            querySnapshot.forEach((doc) => {
                vendors.push({ id: doc.id, ...doc.data() });
            });
        }

        function updateStats() {
            const stats = {
                decorator: vendors.filter(v => v.category === 'decorator').length,
                photographer: vendors.filter(v => v.category === 'photographer').length,
                caterer: vendors.filter(v => v.category === 'caterer').length,
                bandbaja: vendors.filter(v => v.category === 'bandbaja').length,
                stadium: vendors.filter(v => v.category === 'stadium').length
            };
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${vendors.length}</div><div>Total Vendors</div></div>
                <div class="stat-card"><div class="stat-number">${stats.decorator}</div><div>Decorators</div></div>
                <div class="stat-card"><div class="stat-number">${stats.photographer}</div><div>Photographers</div></div>
                <div class="stat-card"><div class="stat-number">${stats.caterer}</div><div>Caterers</div></div>
                <div class="stat-card"><div class="stat-number">${stats.bandbaja}</div><div>Band Baja</div></div>
                <div class="stat-card"><div class="stat-number">${stats.stadium}</div><div>Stadiums</div></div>
            `;
        }

        function renderVendorsTable() {
            const tbody = document.getElementById('vendorsTableBody');
            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name || '-'}</td>
                    <td>${v.category || '-'}</td>
                    <td>${v.city || '-'}</td>
                    <td>${v.location || '-'}</td>
                    <td>${v.priceRange || '-'}</td>
                    <td>${v.rating || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteVendor('${v.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        window.openAddVendorModal = function() {
            tempPhotos = [];
            document.getElementById('vendorModalTitle').innerText = 'Add New Vendor';
            document.getElementById('vendorForm').reset();
            document.getElementById('vendorId').value = '';
            document.getElementById('photoPreview').innerHTML = '';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.editVendor = async function(id) {
            const vendor = vendors.find(v => v.id === id);
            if (!vendor) return;
            
            document.getElementById('vendorModalTitle').innerText = 'Edit Vendor';
            document.getElementById('vendorId').value = vendor.id;
            document.getElementById('vendorName').value = vendor.name || '';
            document.getElementById('vendorCategory').value = vendor.category || '';
            document.getElementById('vendorCity').value = vendor.city || '';
            document.getElementById('vendorLocation').value = vendor.location || '';
            document.getElementById('vendorPrice').value = vendor.priceRange || '';
            document.getElementById('vendorRating').value = vendor.rating || '';
            document.getElementById('vendorPhone').value = vendor.phone || '';
            document.getElementById('vendorDescription').value = vendor.description || '';
            
            tempPhotos = vendor.photos || [];
            renderPhotoPreview();
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.deleteVendor = async function(id) {
            if (confirm('Delete this vendor?')) {
                await deleteDoc(doc(db, 'vendors', id));
                await loadVendors();
                renderVendorsTable();
                updateStats();
                alert('Vendor deleted');
            }
        };

        function renderPhotoPreview() {
            const container = document.getElementById('photoPreview');
            if (tempPhotos.length === 0) {
                container.innerHTML = '<div class="upload-btn" onclick="uploadPhoto()">+ Add Photos</div>';
                return;
            }
            container.innerHTML = `
                <div class="photo-grid">
                    ${tempPhotos.map((photo, i) => `
                        <div class="photo-preview">
                            <img src="${photo}">
                            <button class="remove-photo" onclick="removePhoto(${i})">×</button>
                        </div>
                    `).join('')}
                    <div class="upload-btn" onclick="uploadPhoto()">+ Add More</div>
                </div>
            `;
        }

        window.uploadPhoto = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Convert to base64 for demo (in production, upload to cloud storage)
                const reader = new FileReader();
                reader.onload = (ev) => {
                    tempPhotos.push(ev.target.result);
                    renderPhotoPreview();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };

        window.removePhoto = function(index) {
            tempPhotos.splice(index, 1);
            renderPhotoPreview();
        };

        window.saveVendor = async function() {
            const id = document.getElementById('vendorId').value;
            const vendorData = {
                name: document.getElementById('vendorName').value,
                category: document.getElementById('vendorCategory').value,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value,
                priceRange: document.getElementById('vendorPrice').value,
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value,
                description: document.getElementById('vendorDescription').value,
                photos: tempPhotos,
                updatedAt: new Date().toISOString()
            };
            
            if (id) {
                await updateDoc(doc(db, 'vendors', id), vendorData);
                alert('Vendor updated!');
            } else {
                vendorData.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), vendorData);
                alert('Vendor added!');
            }
            
            closeModal('vendorModal');
            await loadVendors();
            renderVendorsTable();
            updateStats();
        };

        window.closeModal = function(modalId) {
            document.getElementById(modalId).style.display = 'none';
        };

        window.logout = async function() {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            document.getElementById(`${tab}Panel`).style.display = 'block';
            if (tab === 'vendors') renderVendorsTable();
        };
    </script>
</head>
<body>

<header class="header">
    <div class="logo">ADMIN<span>PANEL</span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <div class="stats-grid" id="stats"></div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('vendors')">Vendors</button>
        <button class="tab" onclick="switchTab('categories')">Categories</button>
        <button class="tab" onclick="switchTab('cities')">Cities</button>
    </div>

    <!-- Vendors Panel -->
    <div id="vendorsPanel" class="tab-panel">
        <div class="form-card">
            <div class="form-title">Manage Vendors</div>
            <button class="btn-primary" onclick="openAddVendorModal()">+ Add New Vendor</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Name</th><th>Category</th><th>City</th><th>Location</th><th>Price</th><th>Rating</th><th>Actions</th></tr>
                </thead>
                <tbody id="vendorsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Categories Panel -->
    <div id="categoriesPanel" class="tab-panel" style="display:none">
        <div class="form-card">
            <div class="form-title">Categories</div>
            <div class="category-list" id="categoryList">
                <div>🎨 Decorators</div>
                <div>📸 Photographers</div>
                <div>🍽️ Caterers</div>
                <div>🎵 Band Baja</div>
                <div>🏟️ Stadiums</div>
            </div>
        </div>
    </div>

    <!-- Cities Panel -->
    <div id="citiesPanel" class="tab-panel" style="display:none">
        <div class="form-card">
            <div class="form-title">Cities</div>
            <div class="city-list" id="cityList">
                <div>Nagpur</div>
                <div>Mumbai</div>
                <div>Pune</div>
                <div>Delhi</div>
                <div>Bangalore</div>
            </div>
        </div>
    </div>
</div>

<!-- Vendor Modal -->
<div id="vendorModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="vendorModalTitle">Add Vendor</h3>
            <span class="close-modal" onclick="closeModal('vendorModal')">&times;</span>
        </div>
        <form id="vendorForm">
            <input type="hidden" id="vendorId">
            <div class="form-grid">
                <div class="form-group"><label>Name *</label><input type="text" id="vendorName" required></div>
                <div class="form-group"><label>Category *</label>
                    <select id="vendorCategory" required>
                        <option value="decorator">Decorator</option>
                        <option value="photographer">Photographer</option>
                        <option value="caterer">Caterer</option>
                        <option value="bandbaja">Band Baja</option>
                        <option value="stadium">Stadium</option>
                    </select>
                </div>
                <div class="form-group"><label>City *</label><input type="text" id="vendorCity" placeholder="Nagpur"></div>
                <div class="form-group"><label>Location</label><input type="text" id="vendorLocation" placeholder="Area, City"></div>
                <div class="form-group"><label>Price Range</label><input type="text" id="vendorPrice" placeholder="₹10,000 - ₹50,000"></div>
                <div class="form-group"><label>Rating</label><input type="text" id="vendorRating" placeholder="4.5"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="vendorPhone" placeholder="9423281086"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="vendorDescription" rows="3"></textarea></div>
            <div class="form-group"><label>Photos</label><div id="photoPreview"></div></div>
            <button type="button" class="btn-primary" onclick="saveVendor()" style="width:100%; margin-top:16px;">Save Vendor</button>
        </form>
    </div>
</div>

</body>
</html>
