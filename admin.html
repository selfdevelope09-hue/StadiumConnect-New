<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f5f5f5; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { color: #ff6b35; margin-bottom: 20px; }
        button { background: #ff6b35; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-right: 10px; margin-bottom: 10px; }
        .btn-delete { background: #dc3545; }
        .btn-edit { background: #ffc107; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; width: 90%; max-width: 500px; }
        .close { float: right; font-size: 24px; cursor: pointer; }
        .message { padding: 12px; border-radius: 12px; margin-bottom: 15px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; }
        .tab.active { background: #ff6b35; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .popular-badge { background: #ff6b35; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 10px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let vendors = [];
        let categories = [];
        let cities = [];
        let editingId = null;

        // ========== TEST CONNECTION ==========
        async function testConnection() {
            try {
                const testRef = doc(db, "test", "connection");
                await setDoc(testRef, { status: "ok", time: new Date().toISOString() });
                console.log("✅ Firebase connected");
                showMessage("Firebase connected!", "success");
                return true;
            } catch (error) {
                console.error("Firebase error:", error);
                showMessage("❌ Firebase error: " + error.message, "error");
                return false;
            }
        }

        // ========== LOAD VENDORS ==========
        async function loadVendors() {
            try {
                const snapshot = await getDocs(collection(db, "vendors"));
                vendors = [];
                snapshot.forEach(doc => {
                    vendors.push({ id: doc.id, ...doc.data() });
                });
                console.log("Loaded", vendors.length, "vendors");
                renderVendors();
                updateStats();
            } catch (error) {
                showMessage("Error loading vendors: " + error.message, "error");
            }
        }

        // ========== ADD VENDOR ==========
        window.addVendor = async () => {
            const name = document.getElementById('vendorName').value;
            if (!name) {
                showMessage("Please enter vendor name", "error");
                return;
            }
            
            const vendorData = {
                name: name,
                category: document.getElementById('vendorCategory').value,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value || "",
                priceRange: document.getElementById('vendorPrice').value || "",
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value || "",
                description: document.getElementById('vendorDescription').value || "",
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            try {
                const docRef = await addDoc(collection(db, "vendors"), vendorData);
                console.log("Vendor added with ID:", docRef.id);
                showMessage("✅ Vendor added successfully!", "success");
                closeModal('vendorModal');
                document.getElementById('vendorForm').reset();
                await loadVendors();
            } catch (error) {
                console.error("Error adding vendor:", error);
                showMessage("❌ Error: " + error.message, "error");
            }
        };

        // ========== DELETE VENDOR ==========
        window.deleteVendor = async (id) => {
            if (confirm("Delete this vendor?")) {
                try {
                    await deleteDoc(doc(db, "vendors", id));
                    showMessage("Vendor deleted!", "success");
                    await loadVendors();
                } catch (error) {
                    showMessage("Error: " + error.message, "error");
                }
            }
        };

        // ========== EDIT VENDOR ==========
        window.editVendor = (id) => {
            const vendor = vendors.find(v => v.id === id);
            if (!vendor) return;
            
            editingId = id;
            document.getElementById('vendorModalTitle').innerText = "Edit Vendor";
            document.getElementById('vendorName').value = vendor.name || "";
            document.getElementById('vendorCategory').value = vendor.category || "";
            document.getElementById('vendorCity').value = vendor.city || "";
            document.getElementById('vendorLocation').value = vendor.location || "";
            document.getElementById('vendorPrice').value = vendor.priceRange || "";
            document.getElementById('vendorRating').value = vendor.rating || "";
            document.getElementById('vendorPhone').value = vendor.phone || "";
            document.getElementById('vendorDescription').value = vendor.description || "";
            document.getElementById('vendorModal').style.display = "flex";
        };

        window.updateVendor = async () => {
            const name = document.getElementById('vendorName').value;
            if (!name) {
                showMessage("Please enter vendor name", "error");
                return;
            }
            
            const vendorData = {
                name: name,
                category: document.getElementById('vendorCategory').value,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value || "",
                priceRange: document.getElementById('vendorPrice').value || "",
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value || "",
                description: document.getElementById('vendorDescription').value || "",
                updatedAt: new Date().toISOString()
            };
            
            try {
                await updateDoc(doc(db, "vendors", editingId), vendorData);
                showMessage("✅ Vendor updated!", "success");
                closeModal('vendorModal');
                await loadVendors();
            } catch (error) {
                showMessage("Error: " + error.message, "error");
            }
        };

        window.openAddVendorModal = () => {
            editingId = null;
            document.getElementById('vendorModalTitle').innerText = "Add Vendor";
            document.getElementById('vendorForm').reset();
            document.getElementById('vendorModal').style.display = "flex";
        };

        function renderVendors() {
            const tbody = document.getElementById('vendorTable');
            if (!tbody) return;
            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name || '-'}</td>
                    <td>${v.category || '-'}</td>
                    <td>${v.city || '-'}</td>
                    <td>${v.priceRange || '-'}</td>
                    <td>${v.rating || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteVendor('${v.id}')">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalVendors').innerText = vendors.length;
            document.getElementById('totalDecorators').innerText = vendors.filter(v => v.category === 'decorator').length;
            document.getElementById('totalPhotographers').innerText = vendors.filter(v => v.category === 'photographer').length;
            document.getElementById('totalCaterers').innerText = vendors.filter(v => v.category === 'caterer').length;
            document.getElementById('totalBand').innerText = vendors.filter(v => v.category === 'bandbaja').length;
            document.getElementById('totalStadiums').innerText = vendors.filter(v => v.category === 'stadium').length;
        }

        // ========== LOAD CITIES & CATEGORIES ==========
        async function loadCities() {
            try {
                const docRef = doc(db, 'settings', 'cities');
                const docSnap = await getDoc(docRef);
                cities = docSnap.exists() ? docSnap.data().list : [];
                if (cities.length === 0) {
                    cities = [
                        { name: 'Nagpur', popular: true },
                        { name: 'Mumbai', popular: true },
                        { name: 'Pune', popular: true },
                        { name: 'Delhi', popular: true },
                        { name: 'Bangalore', popular: true }
                    ];
                }
                renderCities();
                updateCitySelect();
            } catch (error) {
                console.error("Error loading cities:", error);
            }
        }

        async function loadCategories() {
            try {
                const snapshot = await getDocs(collection(db, "categories"));
                categories = [];
                snapshot.forEach(doc => { if (!doc.data().deleted) categories.push({ id: doc.id, ...doc.data() }); });
                if (categories.length === 0) {
                    categories = [
                        { id: 'decorator', name: 'Decorators', icon: '🎨' },
                        { id: 'photographer', name: 'Photographers', icon: '📸' },
                        { id: 'caterer', name: 'Caterers', icon: '🍽️' },
                        { id: 'bandbaja', name: 'Band Baja', icon: '🎵' },
                        { id: 'stadium', name: 'Stadiums', icon: '🏟️' }
                    ];
                }
                renderCategories();
                updateCategorySelect();
            } catch (error) {
                console.error("Error loading categories:", error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesList');
            if (!container) return;
            container.innerHTML = categories.map(c => `
                <div class="list-item">
                    <span>${c.icon || '🏷️'} ${c.name}</span>
                    <div>
                        <button class="btn-edit" onclick="editCategory('${c.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteCategory('${c.id}')">Del</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCities() {
            const container = document.getElementById('citiesList');
            if (!container) return;
            container.innerHTML = cities.map((c, index) => `
                <div class="list-item">
                    <span>📍 ${c.name} ${c.popular ? '<span class="popular-badge">Popular</span>' : ''}</span>
                    <div>
                        <button class="btn-edit" onclick="editCity(${index})">Edit</button>
                        <button class="btn-delete" onclick="deleteCity(${index})">Del</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCategorySelect() {
            const select = document.getElementById('vendorCategory');
            if (select) {
                select.innerHTML = categories.map(c => `<option value="${c.id}">${c.icon || '🏷️'} ${c.name}</option>`).join('');
            }
        }

        function updateCitySelect() {
            const select = document.getElementById('vendorCity');
            if (select) {
                select.innerHTML = cities.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
        }

        // ========== CITY FUNCTIONS ==========
        window.openAddCity = () => {
            document.getElementById('cityName').value = '';
            document.getElementById('cityPopular').checked = false;
            document.getElementById('cityModal').style.display = 'flex';
            window.editingCityIndex = null;
        };

        window.editCity = (index) => {
            const city = cities[index];
            if (!city) return;
            window.editingCityIndex = index;
            document.getElementById('cityName').value = city.name;
            document.getElementById('cityPopular').checked = city.popular || false;
            document.getElementById('cityModal').style.display = 'flex';
        };

        window.deleteCity = (index) => {
            if (confirm('Delete this city?')) {
                cities.splice(index, 1);
                saveCities();
                renderCities();
                updateCitySelect();
                showMessage('City deleted!', 'success');
            }
        };

        window.saveCity = async () => {
            const name = document.getElementById('cityName').value;
            const popular = document.getElementById('cityPopular').checked;
            if (!name) { showMessage('Enter city name', 'error'); return; }
            
            const cityData = { name: name, popular: popular };
            
            if (window.editingCityIndex !== null) {
                cities[window.editingCityIndex] = cityData;
                showMessage('City updated!', 'success');
            } else {
                if (cities.find(c => c.name === name)) {
                    showMessage('City already exists!', 'error');
                    return;
                }
                cities.push(cityData);
                showMessage('City added!', 'success');
            }
            await saveCities();
            renderCities();
            updateCitySelect();
            closeModal('cityModal');
            window.editingCityIndex = null;
        };

        async function saveCities() {
            await setDoc(doc(db, 'settings', 'cities'), { list: cities });
        }

        // ========== CATEGORY FUNCTIONS ==========
        window.openAddCategory = () => {
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryIcon').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
            window.editingCategoryId = null;
        };

        window.editCategory = (id) => {
            const c = categories.find(x => x.id === id);
            if (!c) return;
            window.editingCategoryId = id;
            document.getElementById('categoryName').value = c.name;
            document.getElementById('categoryIcon').value = c.icon || '';
            document.getElementById('categoryModal').style.display = 'flex';
        };

        window.deleteCategory = async (id) => {
            if (confirm('Delete this category?')) {
                categories = categories.filter(c => c.id !== id);
                await setDoc(doc(db, 'categories', id), { deleted: true });
                renderCategories();
                updateCategorySelect();
                showMessage('Category deleted!', 'success');
            }
        };

        window.saveCategory = async () => {
            const name = document.getElementById('categoryName').value;
            if (!name) { showMessage('Enter category name', 'error'); return; }
            const id = name.toLowerCase().replace(/ /g, '');
            const cat = { id, name, icon: document.getElementById('categoryIcon').value || '🏷️' };
            
            if (window.editingCategoryId) {
                const index = categories.findIndex(c => c.id === window.editingCategoryId);
                if (index !== -1) categories[index] = cat;
                await setDoc(doc(db, 'categories', id), cat);
                showMessage('Category updated!', 'success');
            } else {
                if (categories.find(c => c.id === id)) {
                    showMessage('Category already exists!', 'error');
                    return;
                }
                categories.push(cat);
                await setDoc(doc(db, 'categories', id), cat);
                showMessage('Category added!', 'success');
            }
            renderCategories();
            updateCategorySelect();
            closeModal('categoryModal');
            window.editingCategoryId = null;
        };

        // ========== UTILITIES ==========
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = msg;
            setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
        }

        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            if (tab === 'vendors') loadVendors();
            if (tab === 'categories') loadCategories();
            if (tab === 'cities') loadCities();
        };

        window.logout = () => {
            localStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        };

        if (localStorage.getItem('admin') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        testConnection().then(() => {
            loadVendors();
            loadCategories();
            loadCities();
        });
    </script>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>⚡ Admin Panel</h2>
        <button onclick="logout()" style="background:#dc3545;">Logout</button>
    </div>
    <div id="message" class="message"></div>
</div>

<div class="stats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 15px; margin-bottom: 20px;">
    <div class="card" style="text-align:center"><div class="stat-number" id="totalVendors" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>Total Vendors</div></div>
    <div class="card" style="text-align:center"><div class="stat-number" id="totalDecorators" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>🎨 Decorators</div></div>
    <div class="card" style="text-align:center"><div class="stat-number" id="totalPhotographers" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>📸 Photographers</div></div>
    <div class="card" style="text-align:center"><div class="stat-number" id="totalCaterers" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>🍽️ Caterers</div></div>
    <div class="card" style="text-align:center"><div class="stat-number" id="totalBand" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>🎵 Band Baja</div></div>
    <div class="card" style="text-align:center"><div class="stat-number" id="totalStadiums" style="font-size:32px; font-weight:bold; color:#ff6b35;">0</div><div>🏟️ Stadiums</div></div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('vendors')">📦 Vendors</button>
    <button class="tab" onclick="switchTab('categories')">🏷️ Categories</button>
    <button class="tab" onclick="switchTab('cities')">📍 Cities</button>
</div>

<!-- Vendors Tab -->
<div id="vendorsTab" class="tab-content active">
    <div class="card">
        <button onclick="openAddVendorModal()">+ Add Vendor</button>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Name</th><th>Category</th><th>City</th><th>Price</th><th>Rating</th><th>Actions</th> </thead>
                <tbody id="vendorTable">\(<td colspan="6">Loading...</td>\)</tbody>
            </table>
        </div>
    </div>
</div>

<!-- Categories Tab -->
<div id="categoriesTab" class="tab-content">
    <div class="card">
        <button onclick="openAddCategory()">+ Add Category</button>
        <div id="categoriesList" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Cities Tab -->
<div id="citiesTab" class="tab-content">
    <div class="card">
        <button onclick="openAddCity()">+ Add City</button>
        <div id="citiesList" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Vendor Modal -->
<div id="vendorModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('vendorModal')">&times;</span>
        <h3 id="vendorModalTitle">Add Vendor</h3>
        <input type="text" id="vendorName" placeholder="Vendor Name *">
        <select id="vendorCategory"></select>
        <select id="vendorCity"></select>
        <input type="text" id="vendorLocation" placeholder="Location">
        <input type="text" id="vendorPrice" placeholder="Price Range">
        <input type="text" id="vendorRating" placeholder="Rating (1-5)">
        <input type="text" id="vendorPhone" placeholder="Phone Number">
        <textarea id="vendorDescription" rows="2" placeholder="Description"></textarea>
        <button onclick="editingId ? updateVendor() : addVendor()" style="background:#28a745; width:100%; margin-top:10px;">Save Vendor</button>
    </div>
</div>

<!-- Category Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('categoryModal')">&times;</span>
        <h3>Add Category</h3>
        <input type="text" id="categoryName" placeholder="Category Name">
        <input type="text" id="categoryIcon" placeholder="Icon (emoji)">
        <button onclick="saveCategory()" style="background:#28a745; width:100%; margin-top:10px;">Save</button>
    </div>
</div>

<!-- City Modal -->
<div id="cityModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('cityModal')">&times;</span>
        <h3>Add City</h3>
        <input type="text" id="cityName" placeholder="City Name">
        <div class="checkbox-group">
            <input type="checkbox" id="cityPopular">
            <label>⭐ Show in Popular Cities</label>
        </div>
        <button onclick="saveCity()" style="background:#28a745; width:100%; margin-top:10px;">Save</button>
    </div>
</div>

</body>
</html>
