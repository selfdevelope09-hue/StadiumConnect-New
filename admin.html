<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1, h2 { color: #1a1a1a; margin-bottom: 16px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b35;
        }
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button.delete { background: #dc3545; }
        button.edit { background: #ffc107; color: #000; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f8f8f8; font-weight: 600; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 24px;
            background: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab.active {
            background: #ff6b35;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let vendors = [];
        let editingId = null;

        // Load vendors
        async function loadVendors() {
            const snapshot = await getDocs(collection(db, "vendors"));
            vendors = [];
            snapshot.forEach(doc => vendors.push({ id: doc.id, ...doc.data() }));
            renderTable();
            updateStats();
        }

        function renderTable() {
            const tbody = document.getElementById('vendorTable');
            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name || '-'}</td>
                    <td>${v.category || '-'}</td>
                    <td>${v.city || '-'}</td>
                    <td>${v.priceRange || '-'}</td>
                    <td>${v.rating || '-'}</td>
                    <td>
                        <button class="edit" onclick="editVendor('${v.id}')">Edit</button>
                        <button class="delete" onclick="deleteVendor('${v.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalVendors').innerText = vendors.length;
            document.getElementById('totalDecorators').innerText = vendors.filter(v => v.category === 'decorator').length;
            document.getElementById('totalPhotographers').innerText = vendors.filter(v => v.category === 'photographer').length;
            document.getElementById('totalCaterers').innerText = vendors.filter(v => v.category === 'caterer').length;
            document.getElementById('totalBand').innerText = vendors.filter(v => v.category === 'bandbaja').length;
            document.getElementById('totalStadiums').innerText = vendors.filter(v => v.category === 'stadium').length;
        }

        window.openAddModal = () => {
            editingId = null;
            document.getElementById('modalTitle').innerText = 'Add Vendor';
            document.getElementById('vendorForm').reset();
            document.getElementById('capacityGroup').style.display = 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.editVendor = (id) => {
            const v = vendors.find(x => x.id === id);
            if (!v) return;
            editingId = id;
            document.getElementById('modalTitle').innerText = 'Edit Vendor';
            document.getElementById('vendorName').value = v.name || '';
            document.getElementById('vendorCategory').value = v.category || '';
            document.getElementById('vendorCity').value = v.city || '';
            document.getElementById('vendorLocation').value = v.location || '';
            document.getElementById('vendorPrice').value = v.priceRange || '';
            document.getElementById('vendorRating').value = v.rating || '';
            document.getElementById('vendorPhone').value = v.phone || '';
            document.getElementById('vendorDescription').value = v.description || '';
            document.getElementById('vendorCapacity').value = v.capacity || '';
            document.getElementById('vendorLat').value = v.lat || '';
            document.getElementById('vendorLng').value = v.lng || '';
            document.getElementById('capacityGroup').style.display = v.category === 'stadium' ? 'block' : 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.deleteVendor = async (id) => {
            if (confirm('Delete this vendor?')) {
                await deleteDoc(doc(db, 'vendors', id));
                await loadVendors();
                alert('Deleted!');
            }
        };

        window.saveVendor = async () => {
            const category = document.getElementById('vendorCategory').value;
            const data = {
                name: document.getElementById('vendorName').value,
                category: category,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value,
                priceRange: document.getElementById('vendorPrice').value,
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value,
                description: document.getElementById('vendorDescription').value,
                lat: parseFloat(document.getElementById('vendorLat').value) || null,
                lng: parseFloat(document.getElementById('vendorLng').value) || null,
                updatedAt: new Date().toISOString()
            };
            if (category === 'stadium') data.capacity = document.getElementById('vendorCapacity').value;

            if (editingId) {
                await updateDoc(doc(db, 'vendors', editingId), data);
                alert('Updated!');
            } else {
                data.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), data);
                alert('Added!');
            }
            closeModal('vendorModal');
            await loadVendors();
        };

        window.onCategoryChange = () => {
            const val = document.getElementById('vendorCategory').value;
            document.getElementById('capacityGroup').style.display = val === 'stadium' ? 'block' : 'none';
        };

        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            if (tab === 'vendors') loadVendors();
        };

        window.logout = () => {
            localStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        };

        // Check admin login
        if (localStorage.getItem('admin') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        loadVendors();
    </script>
</head>
<body>

<div class="card" style="display: flex; justify-content: space-between; align-items: center;">
    <h1>⚡ Admin Panel</h1>
    <button onclick="logout()" style="background:#dc3545;">Logout</button>
</div>

<div class="stats">
    <div class="stat"><div class="stat-number" id="totalVendors">0</div><div>Total Vendors</div></div>
    <div class="stat"><div class="stat-number" id="totalDecorators">0</div><div>🎨 Decorators</div></div>
    <div class="stat"><div class="stat-number" id="totalPhotographers">0</div><div>📸 Photographers</div></div>
    <div class="stat"><div class="stat-number" id="totalCaterers">0</div><div>🍽️ Caterers</div></div>
    <div class="stat"><div class="stat-number" id="totalBand">0</div><div>🎵 Band Baja</div></div>
    <div class="stat"><div class="stat-number" id="totalStadiums">0</div><div>🏟️ Stadiums</div></div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('vendors')">📦 Vendors</button>
    <button class="tab" onclick="switchTab('categories')">🏷️ Categories</button>
    <button class="tab" onclick="switchTab('cities')">📍 Cities</button>
</div>

<div id="vendorsTab" class="tab-content active">
    <div class="card">
        <button onclick="openAddModal()">+ Add New Vendor</button>
        <div style="overflow-x: auto; margin-top: 20px;">
            <table>
                <thead><tr><th>Name</th><th>Category</th><th>City</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody id="vendorTable"><tr><td colspan="6">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<div id="categoriesTab" class="tab-content">
    <div class="card">
        <p>Categories will be shown here</p>
    </div>
</div>

<div id="citiesTab" class="tab-content">
    <div class="card">
        <p>Cities will be shown here</p>
    </div>
</div>

<!-- Vendor Modal -->
<div id="vendorModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('vendorModal')">&times;</span>
        <h3 id="modalTitle">Add Vendor</h3>
        <input type="text" id="vendorName" placeholder="Vendor Name *">
        <select id="vendorCategory" onchange="onCategoryChange()">
            <option value="decorator">Decorator</option>
            <option value="photographer">Photographer</option>
            <option value="caterer">Caterer</option>
            <option value="bandbaja">Band Baja</option>
            <option value="stadium">Stadium</option>
        </select>
        <input type="text" id="vendorCity" placeholder="City">
        <input type="text" id="vendorLocation" placeholder="Location (Area)">
        <input type="text" id="vendorPrice" placeholder="Price Range">
        <input type="text" id="vendorRating" placeholder="Rating (1-5)">
        <input type="text" id="vendorPhone" placeholder="Phone Number">
        <div id="capacityGroup" style="display:none"><input type="text" id="vendorCapacity" placeholder="Capacity (seats)"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="vendorLat" placeholder="Latitude (for location)">
            <input type="text" id="vendorLng" placeholder="Longitude (for location)">
        </div>
        <textarea id="vendorDescription" rows="2" placeholder="Description"></textarea>
        <button onclick="saveVendor()" style="background:#ff6b35; width:100%; margin-top:10px;">Save Vendor</button>
    </div>
</div>

</body>
</html>
