<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f5f5f5; padding: 20px; }
        .header { background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h2 { margin-bottom: 20px; color: #ff6b35; }
        .stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat { background: white; padding: 20px; border-radius: 15px; text-align: center; flex: 1; min-width: 100px; }
        .stat-num { font-size: 28px; font-weight: bold; color: #ff6b35; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; }
        button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-add { background: #28a745; color: white; margin-bottom: 15px; padding: 10px 20px; }
        .btn-edit { background: #ffc107; }
        .btn-delete { background: #dc3545; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .close { float: right; font-size: 24px; cursor: pointer; }
    </style>
    
    <!-- Admin Check -->
    <script>
        if (localStorage.getItem('admin') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let vendors = [];
        let editingId = null;

        async function loadVendors() {
            const snap = await getDocs(collection(db, "vendors"));
            vendors = [];
            snap.forEach(doc => vendors.push({ id: doc.id, ...doc.data() }));
            renderTable();
            updateStats();
        }

        function updateStats() {
            document.getElementById('total').innerText = vendors.length;
            document.getElementById('decoratorCount').innerText = vendors.filter(v => v.category === 'decorator').length;
            document.getElementById('photographerCount').innerText = vendors.filter(v => v.category === 'photographer').length;
            document.getElementById('catererCount').innerText = vendors.filter(v => v.category === 'caterer').length;
            document.getElementById('bandCount').innerText = vendors.filter(v => v.category === 'bandbaja').length;
            document.getElementById('stadiumCount').innerText = vendors.filter(v => v.category === 'stadium').length;
        }

        function renderTable() {
            const tbody = document.getElementById('vendorTable');
            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name || '-'}</td>
                    <td>${v.category || '-'}</td>
                    <td>${v.city || '-'}</td>
                    <td>${v.priceRange || '-'}</td>
                    <td>${v.rating || '-'}</td>
                    <td>
                        <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteVendor('${v.id}')">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        window.openAdd = () => {
            editingId = null;
            document.getElementById('modalTitle').innerText = 'Add Vendor';
            document.getElementById('vendorForm').reset();
            document.getElementById('capacityGroup').style.display = 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.editVendor = (id) => {
            const v = vendors.find(x => x.id === id);
            if (!v) return;
            editingId = id;
            document.getElementById('modalTitle').innerText = 'Edit Vendor';
            document.getElementById('vendorName').value = v.name || '';
            document.getElementById('vendorCategory').value = v.category || '';
            document.getElementById('vendorCity').value = v.city || '';
            document.getElementById('vendorLocation').value = v.location || '';
            document.getElementById('vendorPrice').value = v.priceRange || '';
            document.getElementById('vendorRating').value = v.rating || '';
            document.getElementById('vendorPhone').value = v.phone || '';
            document.getElementById('vendorDescription').value = v.description || '';
            document.getElementById('vendorCapacity').value = v.capacity || '';
            document.getElementById('capacityGroup').style.display = v.category === 'stadium' ? 'block' : 'none';
            document.getElementById('vendorModal').style.display = 'flex';
        };

        window.deleteVendor = async (id) => {
            if (confirm('Delete this vendor?')) {
                await deleteDoc(doc(db, 'vendors', id));
                await loadVendors();
            }
        };

        window.saveVendor = async () => {
            const data = {
                name: document.getElementById('vendorName').value,
                category: document.getElementById('vendorCategory').value,
                city: document.getElementById('vendorCity').value,
                location: document.getElementById('vendorLocation').value,
                priceRange: document.getElementById('vendorPrice').value,
                rating: parseFloat(document.getElementById('vendorRating').value) || 4.0,
                phone: document.getElementById('vendorPhone').value,
                description: document.getElementById('vendorDescription').value,
                updatedAt: new Date().toISOString()
            };
            if (data.category === 'stadium') data.capacity = document.getElementById('vendorCapacity').value;
            
            if (editingId) {
                await updateDoc(doc(db, 'vendors', editingId), data);
                alert('Updated!');
            } else {
                data.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), data);
                alert('Added!');
            }
            closeModal();
            await loadVendors();
        };

        window.onCategoryChange = () => {
            const val = document.getElementById('vendorCategory').value;
            document.getElementById('capacityGroup').style.display = val === 'stadium' ? 'block' : 'none';
        };

        window.closeModal = () => {
            document.getElementById('vendorModal').style.display = 'none';
        };

        window.logout = () => {
            localStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        };

        loadVendors();
    </script>
</head>
<body>

<div class="header">
    <h2>⚡ Admin Panel</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="stats">
    <div class="stat"><div class="stat-num" id="total">0</div><div>Total</div></div>
    <div class="stat"><div class="stat-num" id="decoratorCount">0</div><div>🎨 Decorators</div></div>
    <div class="stat"><div class="stat-num" id="photographerCount">0</div><div>📸 Photographers</div></div>
    <div class="stat"><div class="stat-num" id="catererCount">0</div><div>🍽️ Caterers</div></div>
    <div class="stat"><div class="stat-num" id="bandCount">0</div><div>🎵 Band Baja</div></div>
    <div class="stat"><div class="stat-num" id="stadiumCount">0</div><div>🏟️ Stadiums</div></div>
</div>

<div class="card">
    <button class="btn-add" onclick="openAdd()">+ Add Vendor</button>
    <div style="overflow-x: auto;">
        <table>
            <thead><tr><th>Name</th><th>Category</th><th>City</th><th>Price</th><th>Rating</th><th>Actions</th></thead>
            <tbody id="vendorTable"><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="vendorModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Add Vendor</h3>
        <input type="text" id="vendorName" placeholder="Name">
        <select id="vendorCategory" onchange="onCategoryChange()">
            <option value="decorator">Decorator</option>
            <option value="photographer">Photographer</option>
            <option value="caterer">Caterer</option>
            <option value="bandbaja">Band Baja</option>
            <option value="stadium">Stadium</option>
        </select>
        <input type="text" id="vendorCity" placeholder="City">
        <input type="text" id="vendorLocation" placeholder="Location">
        <input type="text" id="vendorPrice" placeholder="Price Range">
        <input type="text" id="vendorRating" placeholder="Rating">
        <input type="text" id="vendorPhone" placeholder="Phone">
        <div id="capacityGroup" style="display:none"><input type="text" id="vendorCapacity" placeholder="Capacity (seats)"></div>
        <textarea id="vendorDescription" rows="2" placeholder="Description"></textarea>
        <button onclick="saveVendor()" style="background:#ff6b35; color:white; padding:10px; width:100%; margin-top:10px;">Save</button>
    </div>
</div>

</body>
</html>
