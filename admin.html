<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect | Advance Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8f9fa; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #ff6b35; font-size: 24px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Advance Table Styling */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #ff6b35; color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; color: #444; }
        tr:hover { background: #fffcf9; }

        /* Status & Badges */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .time-text { color: #ff6b35; font-weight: 600; font-size: 12px; display: block; }
        .venue-text { color: #666; font-size: 12px; font-style: italic; }
        .payment-info { font-weight: bold; color: #28a745; }

        /* Tabs & UI */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; border: 1px solid #ddd; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: #ff6b35; color: white; border-color: #ff6b35; box-shadow: 0 4px 10px rgba(255,107,53,0.3); }
        
        button { background: #ff6b35; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .btn-action { background: #28a745; margin-right: 5px; }
        .btn-cancel { background: #dc3545; }

        .message { padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; position: fixed; top: 20px; right: 20px; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="message" class="message"></div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>⚡ StadiumConnect <span style="font-size: 14px; background: #eee; color: #333; padding: 4px 10px; border-radius: 10px;">PRO ADMIN</span></h2>
        <button onclick="logout()" style="background:#444;">Logout</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('bookings')">📋 Bookings & Timeline</div>
    <div class="tab" onclick="switchTab('vendors')">📦 Vendors</div>
    <div class="tab" onclick="switchTab('categories')">🏷️ Categories</div>
    <div class="tab" onclick="switchTab('cities')">📍 Cities</div>
</div>

<div id="bookingsTab" class="tab-content active">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Event Timeline & Bookings</h3>
            <input type="text" id="bookingSearch" placeholder="Search Customer/Vendor..." onkeyup="filterBookings()" style="padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Event Date & Time</th>
                        <th>Customer Details</th>
                        <th>Vendor & Venue</th>
                        <th>Payment Status</th>
                        <th>Current Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="7" style="text-align:center;">Fetching advance records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="vendorsTab" class="tab-content">
    <div class="card">
        <button onclick="openAddVendor()">+ Add New Vendor</button>
        <div class="table-container">
            <table>
                <thead><tr><th>Photo</th><th>Name</th><th>Category</th><th>City</th><th>Actions</th></tr></thead>
                <tbody id="vendorTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let bookings = [], vendors = [];

    // --- LIVE BOOKINGS SYNC (ADVANCE) ---
    onSnapshot(collection(db, "bookings"), (snap) => {
        bookings = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderBookings();
    });

    onSnapshot(collection(db, "vendors"), (snap) => {
        vendors = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderVendors();
    });

    function renderBookings() {
        const tbody = document.getElementById('bookingsTableBody');
        if(!bookings.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No bookings found.</td></tr>'; return; }

        // Sort: Newest First
        const sortedBookings = [...bookings].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        tbody.innerHTML = sortedBookings.map(b => {
            const eventDate = b.eventDate || 'N/A';
            const eventTime = b.eventTime || 'Slot Not Fixed';
            const totalAmt = b.amount || 0;
            const paidAmt = b.paidAmount || 0;
            const balance = totalAmt - paidAmt;

            return `
                <tr>
                    <td><small>#${b.id.slice(-6).toUpperCase()}</small></td>
                    <td>
                        <strong>${eventDate}</strong>
                        <span class="time-text">⏰ ${eventTime}</span>
                    </td>
                    <td>
                        <strong>${b.userName || 'Guest'}</strong><br>
                        <small>📞 ${b.userPhone || '-'}</small>
                    </td>
                    <td>
                        <strong>${b.vendorName || 'N/A'}</strong><br>
                        <span class="venue-text">📍 ${b.venueAddress || b.vendorCity || 'Nagpur'}</span>
                    </td>
                    <td>
                        <span class="payment-info">Paid: ₹${paidAmt}</span><br>
                        <small style="color:red;">Pending: ₹${balance}</small>
                    </td>
                    <td>
                        <span class="badge status-${b.status || 'pending'}">${b.status || 'Pending'}</span>
                    </td>
                    <td>
                        ${b.status !== 'confirmed' ? `<button class="btn-action" onclick="updateStatus('${b.id}', 'confirmed')">Confirm</button>` : ''}
                        ${b.status === 'confirmed' ? `<button style="background:#17a2b8;" onclick="updateStatus('${b.id}', 'completed')">Complete</button>` : ''}
                        <button class="btn-cancel" onclick="updateStatus('${b.id}', 'cancelled')">Cancel</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    window.updateStatus = async (id, newStatus) => {
        try {
            await updateDoc(doc(db, "bookings", id), { 
                status: newStatus,
                updatedAt: new Date().toISOString() 
            });
            showMsg(`Booking marked as ${newStatus}!`, "success");
        } catch (e) { showMsg(e.message, "error"); }
    };

    // --- OTHER UI UTILS ---
    window.switchTab = (t) => {
        document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(t + 'Tab').classList.add('active');
    };

    window.showMsg = (m, type) => {
        const el = document.getElementById('message');
        el.innerText = m;
        el.className = `message ${type === 'success' ? 'status-confirmed' : 'status-cancelled'}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    };

    window.filterBookings = () => {
        const val = document.getElementById('bookingSearch').value.toLowerCase();
        const rows = document.querySelectorAll('#bookingsTableBody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    };

    window.logout = () => { localStorage.clear(); window.location.href='admin-login.html'; };

    // Initial check
    if(localStorage.getItem('admin') !== 'true') window.location.href='admin-login.html';

    // Simple Vendor render (Add your full vendor logic here)
    function renderVendors() {
        document.getElementById('vendorTable').innerHTML = vendors.map(v => `
            <tr>
                <td><img src="${v.imageUrl}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;"></td>
                <td>${v.name}</td><td>${v.category}</td><td>${v.city}</td>
                <td><button onclick="deleteVendor('${v.id}')" style="background:red;">Del</button></td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
