<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let vendors = [];
    let categories = [];
    let cities = [];
    let editingVendorId = null;

    // ========== REAL-TIME LISTENERS (AUTO SYNC) ==========
    
    // 1. Categories Sync
    onSnapshot(collection(db, "categories"), (snapshot) => {
        categories = [];
        snapshot.forEach(doc => {
            if (!doc.data().deleted) categories.push({ id: doc.id, ...doc.data() });
        });
        renderCategories();
        updateCategorySelects(); // Yeh dropdown ko update karega
    });

    // 2. Cities Sync
    onSnapshot(doc(db, 'settings', 'cities'), (docSnap) => {
        if (docSnap.exists()) {
            cities = docSnap.data().list || [];
            renderCities();
            updateCitySelects(); // Yeh dropdown ko update karega
        }
    });

    // 3. Vendors Sync
    onSnapshot(collection(db, "vendors"), (snapshot) => {
        vendors = [];
        snapshot.forEach(doc => vendors.push({ id: doc.id, ...doc.data() }));
        renderVendors();
        updateStats();
    });

    // ========== RENDER FUNCTIONS ==========
    function renderVendors() {
        const tbody = document.getElementById('vendorTable');
        if (!tbody) return;
        tbody.innerHTML = vendors.map(v => `
            <tr>
                <td><strong>${v.name || 'Unnamed'}</strong></td>
                <td>${v.category || '-'}</td>
                <td>${v.city || '-'}</td>
                <td>${v.priceRange || '-'}</td>
                <td>⭐ ${v.rating || '0'}</td>
                <td>
                    <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                    <button class="btn-delete" onclick="deleteVendor('${v.id}')">Del</button>
                </td>
            </tr>
        `).join('');
    }

    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if (!container) return;
        container.innerHTML = categories.map(c => `
            <div class="list-item">
                <span>${c.icon || '🏷️'} ${c.name}</span>
                <div>
                    <button class="btn-edit" onclick="editCategory('${c.id}')">Edit</button>
                    <button class="btn-delete" onclick="deleteCategory('${c.id}')">Del</button>
                </div>
            </div>
        `).join('');
    }

    function renderCities() {
        const container = document.getElementById('citiesList');
        if (!container) return;
        container.innerHTML = cities.map((c, index) => `
            <div class="list-item">
                <span>📍 ${c.name} ${c.popular ? '<span class="popular-badge">Popular</span>' : ''}</span>
                <div>
                    <button class="btn-edit" onclick="editCity(${index})">Edit</button>
                    <button class="btn-delete" onclick="deleteCity(${index})">Del</button>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalVendors').innerText = vendors.length;
        const catKeys = ['decorator', 'photographer', 'caterer', 'bandbaja', 'stadium'];
        catKeys.forEach(cat => {
            const el = document.getElementById('total' + cat.charAt(0).toUpperCase() + cat.slice(1).replace('baja','Band'));
            if(el) el.innerText = vendors.filter(v => v.category === cat).length;
        });
    }

    // ========== DROPDOWN AUTO-FILL (CRITICAL FIX) ==========
    function updateCategorySelects() {
        const select = document.getElementById('vendorCategory');
        if (!select) return;
        const currentVal = select.value; // Purani value save rakho agar edit mode ho
        select.innerHTML = '<option value="">-- Choose Category --</option>' + 
            categories.map(c => `<option value="${c.id}">${c.icon || ''} ${c.name}</option>`).join('');
        if (currentVal) select.value = currentVal;
    }

    function updateCitySelects() {
        const select = document.getElementById('vendorCity');
        if (!select) return;
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- Choose City --</option>' + 
            cities.map(c => `<option value="${c.name.toLowerCase()}">${c.name}</option>`).join('');
        if (currentVal) select.value = currentVal;
    }

    // ========== CRUD ACTIONS ==========
    window.openAddVendor = () => {
        editingVendorId = null;
        document.getElementById('vendorModalTitle').innerText = 'Add New Vendor';
        document.getElementById('vendorForm').reset();
        document.getElementById('vendorModal').style.display = 'flex';
    };

    window.saveVendor = async () => {
        const name = document.getElementById('vendorName').value;
        const category = document.getElementById('vendorCategory').value;
        const city = document.getElementById('vendorCity').value;

        if (!name || !category || !city) {
            showMessage('Please select Name, Category and City!', 'error');
            return;
        }

        const vendorData = {
            name, category, city,
            location: document.getElementById('vendorLocation').value || '',
            priceRange: document.getElementById('vendorPrice').value || '',
            rating: document.getElementById('vendorRating').value || '4.0',
            phone: document.getElementById('vendorPhone').value || '',
            description: document.getElementById('vendorDescription').value || '',
            updatedAt: new Date().toISOString()
        };

        try {
            if (editingVendorId) {
                await updateDoc(doc(db, 'vendors', editingVendorId), vendorData);
                showMessage('Vendor updated!', 'success');
            } else {
                vendorData.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), vendorData);
                showMessage('Vendor added!', 'success');
            }
            closeModal('vendorModal');
        } catch (error) {
            showMessage('Error: ' + error.message, 'error');
        }
    };

    window.editVendor = (id) => {
        const v = vendors.find(x => x.id === id);
        if (!v) return;
        editingVendorId = id;
        document.getElementById('vendorModalTitle').innerText = 'Edit Vendor';
        document.getElementById('vendorName').value = v.name || '';
        document.getElementById('vendorCategory').value = v.category || '';
        document.getElementById('vendorCity').value = v.city || '';
        document.getElementById('vendorLocation').value = v.location || '';
        document.getElementById('vendorPrice').value = v.priceRange || '';
        document.getElementById('vendorRating').value = v.rating || '';
        document.getElementById('vendorPhone').value = v.phone || '';
        document.getElementById('vendorDescription').value = v.description || '';
        document.getElementById('vendorModal').style.display = 'flex';
    };

    window.deleteVendor = async (id) => {
        if (confirm('Delete this vendor?')) {
            await deleteDoc(doc(db, 'vendors', id));
            showMessage('Deleted!', 'success');
        }
    };

    window.saveCategory = async () => {
        const name = document.getElementById('categoryName').value;
        if (!name) return;
        const id = name.toLowerCase().replace(/\s+/g, '');
        const catData = { id, name, icon: document.getElementById('categoryIcon').value || '🏷️' };
        await setDoc(doc(db, 'categories', id), catData);
        closeModal('categoryModal');
        showMessage('Category Saved!', 'success');
    };

    window.saveCity = async () => {
        const name = document.getElementById('cityName').value;
        if (!name) return;
        const newCity = { name, popular: document.getElementById('cityPopular').checked };
        
        if(window.editingCityIndex !== null && window.editingCityIndex !== undefined) {
            cities[window.editingCityIndex] = newCity;
        } else {
            cities.push(newCity);
        }
        await setDoc(doc(db, 'settings', 'cities'), { list: cities });
        closeModal('cityModal');
        window.editingCityIndex = null;
        showMessage('City Saved!', 'success');
    };

    // Global Utils
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.showMessage = (msg, type) => {
        const m = document.getElementById('message');
        m.className = `message ${type}`;
        m.innerText = msg;
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3000);
    };
    window.switchTab = (t) => {
        document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(t + 'Tab').classList.add('active');
    };
    window.logout = () => { localStorage.removeItem('admin'); window.location.href = 'admin-login.html'; };

</script>
