<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let vendors = [];
    let categories = [];
    let cities = [];
    let editingVendorId = null;

    // ==========================================
    // REAL-TIME SYNC (Sab kuch auto-update hoga)
    // ==========================================

    // 1. Listen for Categories
    onSnapshot(collection(db, "categories"), (snapshot) => {
        categories = [];
        snapshot.forEach(doc => {
            if (!doc.data().deleted) categories.push({ id: doc.id, ...doc.data() });
        });
        renderCategories();
        updateCategoryDropdown(); // Vendor form update karega
    });

    // 2. Listen for Cities
    onSnapshot(doc(db, 'settings', 'cities'), (docSnap) => {
        if (docSnap.exists()) {
            cities = docSnap.data().list || [];
            renderCities();
            updateCityDropdown(); // Nayi city aate hi dropdown update hoga
        }
    });

    // 3. Listen for Vendors
    onSnapshot(collection(db, "vendors"), (snapshot) => {
        vendors = [];
        snapshot.forEach(doc => vendors.push({ id: doc.id, ...doc.data() }));
        renderVendors();
        updateStats();
    });

    // ==========================================
    // DROPDOWN UPDATERS (Sync Logic)
    // ==========================================

    function updateCategoryDropdown() {
        const select = document.getElementById('vendorCategory');
        if (!select) return;
        const currentSelection = select.value;
        select.innerHTML = '<option value="">-- Select Category --</option>' + 
            categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        if (currentSelection) select.value = currentSelection;
    }

    function updateCityDropdown() {
        const select = document.getElementById('vendorCity');
        if (!select) return;
        const currentSelection = select.value;
        // Cities ko alphabetical order mein dikhane ke liye sort kar sakte hain
        const sortedCities = [...cities].sort((a, b) => a.name.localeCompare(b.name));
        
        select.innerHTML = '<option value="">-- Select City --</option>' + 
            sortedCities.map(c => `<option value="${c.name.toLowerCase()}">${c.name}</option>`).join('');
        
        if (currentSelection) select.value = currentSelection;
    }

    // ==========================================
    // CRUD OPERATIONS
    // ==========================================

    window.saveVendor = async () => {
        const name = document.getElementById('vendorName').value;
        const category = document.getElementById('vendorCategory').value;
        const city = document.getElementById('vendorCity').value;

        if (!name || !category || !city) {
            window.showMessage('Name, Category aur City bharna zaroori hai!', 'error');
            return;
        }

        const data = {
            name, category, city,
            location: document.getElementById('vendorLocation').value || '',
            priceRange: document.getElementById('vendorPrice').value || '',
            rating: document.getElementById('vendorRating').value || '4.0',
            phone: document.getElementById('vendorPhone').value || '',
            description: document.getElementById('vendorDescription').value || '',
            updatedAt: new Date().toISOString()
        };

        try {
            if (editingVendorId) {
                await updateDoc(doc(db, 'vendors', editingVendorId), data);
                window.showMessage('Vendor Update Ho Gaya!', 'success');
            } else {
                data.createdAt = new Date().toISOString();
                await addDoc(collection(db, 'vendors'), data);
                window.showMessage('Naya Vendor Add Ho Gaya!', 'success');
            }
            window.closeModal('vendorModal');
        } catch (e) { window.showMessage(e.message, 'error'); }
    };

    window.saveCategory = async () => {
        const name = document.getElementById('categoryName').value;
        if (!name) return;
        const id = name.toLowerCase().replace(/\s+/g, '');
        await setDoc(doc(db, 'categories', id), { 
            id, name, icon: document.getElementById('categoryIcon').value || '🏷️' 
        });
        window.closeModal('categoryModal');
        window.showMessage('Category Add Ho Gayi!', 'success');
    };

    window.saveCity = async () => {
        const name = document.getElementById('cityName').value;
        if (!name) return;
        const popular = document.getElementById('cityPopular').checked;
        
        // Agar edit kar rahe hain toh purani replace hogi, warna nayi add hogi
        if (window.editingCityIndex !== null && window.editingCityIndex !== undefined) {
            cities[window.editingCityIndex] = { name, popular };
        } else {
            cities.push({ name, popular });
        }

        await setDoc(doc(db, 'settings', 'cities'), { list: cities });
        window.closeModal('cityModal');
        window.editingCityIndex = null;
        window.showMessage('City List Update Ho Gayi!', 'success');
    };

    // ==========================================
    // RENDER & UI UTILS
    // ==========================================

    function renderVendors() {
        const tbody = document.getElementById('vendorTable');
        tbody.innerHTML = vendors.map(v => `
            <tr>
                <td><strong>${v.name}</strong></td>
                <td>${v.category}</td>
                <td>${v.city}</td>
                <td>${v.priceRange}</td>
                <td>⭐ ${v.rating}</td>
                <td>
                    <button class="btn-edit" onclick="editVendor('${v.id}')">Edit</button>
                    <button class="btn-delete" onclick="deleteVendor('${v.id}')">Del</button>
                </td>
            </tr>
        `).join('');
    }

    function renderCategories() {
        document.getElementById('categoriesList').innerHTML = categories.map(c => `
            <div class="list-item">
                <span>${c.icon} ${c.name}</span>
                <button class="btn-delete" onclick="deleteCategory('${c.id}')">Delete</button>
            </div>
        `).join('');
    }

    function renderCities() {
        document.getElementById('citiesList').innerHTML = cities.map((c, i) => `
            <div class="list-item">
                <span>📍 ${c.name} ${c.popular ? '⭐' : ''}</span>
                <div>
                    <button class="btn-edit" onclick="editCity(${i})">Edit</button>
                    <button class="btn-delete" onclick="deleteCity(${i})">Del</button>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalVendors').innerText = vendors.length;
    }

    // Window Globals for HTML onclicks
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.switchTab = (t) => {
        document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(t + 'Tab').classList.add('active');
    };
    window.openAddVendor = () => {
        editingVendorId = null;
        document.getElementById('vendorForm').reset();
        document.getElementById('vendorModal').style.display = 'flex';
    };
    window.editVendor = (id) => {
        const v = vendors.find(x => x.id === id);
        if (!v) return;
        editingVendorId = id;
        document.getElementById('vendorName').value = v.name;
        document.getElementById('vendorCategory').value = v.category;
        document.getElementById('vendorCity').value = v.city;
        document.getElementById('vendorLocation').value = v.location;
        document.getElementById('vendorPrice').value = v.priceRange;
        document.getElementById('vendorRating').value = v.rating;
        document.getElementById('vendorPhone').value = v.phone;
        document.getElementById('vendorDescription').value = v.description;
        document.getElementById('vendorModal').style.display = 'flex';
    };
    window.deleteVendor = async (id) => { if(confirm('Delete?')) await deleteDoc(doc(db, 'vendors', id)); };
    window.editCity = (i) => {
        window.editingCityIndex = i;
        document.getElementById('cityName').value = cities[i].name;
        document.getElementById('cityPopular').checked = cities[i].popular;
        document.getElementById('cityModal').style.display = 'flex';
    };
    window.deleteCity = async (i) => {
        if(confirm('Delete city?')) {
            cities.splice(i, 1);
            await setDoc(doc(db, 'settings', 'cities'), { list: cities });
        }
    };
    window.showMessage = (msg, type) => {
        const m = document.getElementById('message');
        m.className = `message ${type}`;
        m.innerText = msg;
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3000);
    };
</script>
