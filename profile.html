<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #ffffff;
            --bg-card: #f5faff;
            --text-primary: #0e2a47;
            --text-secondary: #4f6f8d;
            --text-muted: #7391ac;
            --border-color: #cfe7ff;
            --accent: #ff7a1a;
            --accent-light: #fff1e2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e3a;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #7391ac;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-light: rgba(255, 107, 53, 0.1);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .animated-bg .gradient-1 {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,107,53,0.08) 0%, transparent 50%);
            animation: rotate1 25s linear infinite;
        }

        .animated-bg .gradient-2 {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 60%, rgba(139,92,246,0.05) 0%, transparent 50%);
            animation: rotate2 30s linear infinite reverse;
        }

        @keyframes rotate1 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate2 {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,107,53,0.3);
            border-radius: 50%;
            animation: floatParticle var(--duration, 15s) infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #ffb066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-3px);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            background: var(--accent);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Profile Header Premium */
        .profile-header {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,107,53,0.1), transparent);
            border-radius: 50%;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), #ffb066);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .profile-email {
            color: var(--text-secondary);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            text-align: center;
            padding: 12px 20px;
            background: var(--accent-light);
            border-radius: 60px;
            min-width: 100px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            animation: fadeInUp 0.5s ease 0.1s backwards;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--accent);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { width: 0; left: 50%; }
            to { width: 100%; left: 0; }
        }

        .tab-btn:hover {
            color: var(--accent);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Cards Premium */
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title i {
            color: var(--accent);
            font-size: 22px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ffb066);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,107,53,0.3);
        }

        .btn-secondary {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 60px;
            z-index: 2000;
            border-left: 4px solid var(--success);
            color: var(--text-primary);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .profile-header { padding: 24px; }
            .profile-avatar { width: 80px; height: 80px; font-size: 32px; }
            .profile-name { font-size: 22px; }
            .tab-btn { padding: 8px 16px; font-size: 14px; }
            .profile-stats { gap: 12px; }
            .stat-item { padding: 8px 16px; min-width: 70px; }
            .stat-number { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="animated-bg">
    <div class="gradient-1"></div>
    <div class="gradient-2"></div>
</div>
<div class="particles" id="particles"></div>

<header class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="logo" onclick="window.location.href='index.html'"><img src="web-logo.png" alt="StadiumConnect logo" style="width:34px;height:34px;border-radius:8px;object-fit:cover;vertical-align:middle;margin-right:8px;">Stadium<span>Connect</span></div>
    </div>
    <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
    </div>
</header>

<div class="container">
    <div class="profile-header">
        <div class="profile-avatar" id="userAvatar">👤</div>
        <div class="profile-name" id="userName">Loading...</div>
        <div class="profile-email" id="userEmail">Loading...</div>
        <div class="profile-stats" id="userStats"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="overview">📊 Overview</button>
        <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
    </div>

    <!-- Overview Tab -->
    <div id="overviewTab" class="tab-content active">
        <div class="info-card">
            <div class="card-title"><i class="fas fa-user-circle"></i> Personal Information</div>
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="infoName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email Address</span>
                <span class="info-value" id="infoEmail">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Phone Number</span>
                <span class="info-value" id="infoPhone">Not set</span>
            </div>
            <div class="info-row">
                <span class="info-label">Member Since</span>
                <span class="info-value" id="infoSince">-</span>
            </div>
        </div>

        <div class="info-card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Activity Summary</div>
            <div class="info-row">
                <span class="info-label">Total Bookings</span>
                <span class="info-value" id="totalBookings">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Completed Bookings</span>
                <span class="info-value" id="completedBookings">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Total Spent</span>
                <span class="info-value" id="totalSpent">₹0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Reviews Given</span>
                <span class="info-value" id="reviewsGiven">0</span>
            </div>
        </div>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab" class="tab-content">
        <div class="info-card">
            <div class="card-title"><i class="fas fa-edit"></i> Edit Profile</div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="editPhone" placeholder="Enter phone number">
            </div>
            <button class="btn-primary" onclick="updateProfile()"><i class="fas fa-save"></i> Save Changes</button>
        </div>

        <div class="info-card">
            <div class="card-title"><i class="fas fa-shield-alt"></i> Account Security</div>
            <div class="info-row">
                <span class="info-label">Email Verification</span>
                <span class="info-value" id="emailVerified">Not verified</span>
            </div>
            <button class="btn-secondary" onclick="changePassword()" style="margin-top: 16px;"><i class="fas fa-key"></i> Change Password</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, updateProfile, sendEmailVerification, updatePassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Create Particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.setProperty('--duration', (Math.random() * 20 + 10) + 's');
            particle.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(particle);
        }
    }

    // Tab Switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            const tabName = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
        };
    });

    // Initialize or get user document
    async function initUserDocument() {
        const userRef = doc(db, 'users', currentUser.uid);
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
            await setDoc(userRef, {
                name: currentUser.displayName || '',
                email: currentUser.email,
                phone: '',
                createdAt: new Date().toISOString()
            });
        }
    }

    async function loadUserData() {
        if (!currentUser) return;
        
        await initUserDocument();
        
        document.getElementById('userName').innerText = currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
        document.getElementById('userEmail').innerText = currentUser.email;
        document.getElementById('userAvatar').innerText = (currentUser.displayName?.charAt(0) || currentUser.email?.charAt(0) || 'U').toUpperCase();
        document.getElementById('infoName').innerText = currentUser.displayName || 'Not set';
        document.getElementById('infoEmail').innerText = currentUser.email;
        document.getElementById('editName').value = currentUser.displayName || '';
        
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        if (userDoc.exists()) {
            const userData = userDoc.data();
            const phoneNumber = userData.phone || '';
            document.getElementById('infoPhone').innerText = phoneNumber || 'Not set';
            document.getElementById('editPhone').value = phoneNumber;
            document.getElementById('infoSince').innerText = userData.createdAt ? new Date(userData.createdAt).toLocaleDateString() : new Date().toLocaleDateString();
        }
        
        if (currentUser.emailVerified) {
            document.getElementById('emailVerified').innerHTML = '<span style="color: var(--success);"><i class="fas fa-check-circle"></i> Verified</span>';
        } else {
            document.getElementById('emailVerified').innerHTML = '<span style="color: var(--warning);"><i class="fas fa-exclamation-triangle"></i> Not verified</span> <button class="btn-secondary" style="padding: 4px 12px; margin-left: 10px; font-size: 12px; width: auto;" onclick="verifyEmail()">Verify Now</button>';
        }
        
        await loadStats();
    }

    async function loadStats() {
        try {
            // Get bookings count
            const bookingsQuery = query(collection(db, "bookings"), where("userId", "==", currentUser.uid));
            const bookingsSnap = await getDocs(bookingsQuery);
            const bookings = bookingsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const total = bookings.length;
            const completed = bookings.filter(b => b.status === 'completed' || b.status === 'confirmed').length;
            const totalSpent = bookings.reduce((sum, b) => sum + (b.amount || 0), 0);
            
            // Get reviews count
            const reviewsQuery = query(collection(db, "reviews"), where("userId", "==", currentUser.uid));
            const reviewsSnap = await getDocs(reviewsQuery);
            const reviewsGiven = reviewsSnap.size;
            
            document.getElementById('totalBookings').innerText = total;
            document.getElementById('completedBookings').innerText = completed;
            document.getElementById('totalSpent').innerHTML = `₹${totalSpent.toLocaleString()}`;
            document.getElementById('reviewsGiven').innerText = reviewsGiven;
            
            document.getElementById('userStats').innerHTML = `
                <div class="stat-item"><div class="stat-number">${total}</div><div class="stat-label">Bookings</div></div>
                <div class="stat-item"><div class="stat-number">${completed}</div><div class="stat-label">Completed</div></div>
                <div class="stat-item"><div class="stat-number">₹${Math.floor(totalSpent / 1000)}k</div><div class="stat-label">Spent</div></div>
                <div class="stat-item"><div class="stat-number">${reviewsGiven}</div><div class="stat-label">Reviews</div></div>
            `;
        } catch (error) {
            console.error("Error loading stats:", error);
        }
    }

    window.updateProfile = async () => {
        const newName = document.getElementById('editName').value.trim();
        const newPhone = document.getElementById('editPhone').value.trim();
        
        if (!newName) {
            showToast("Please enter a name", true);
            return;
        }
        
        try {
            // Update Firebase Auth profile
            if (newName !== currentUser.displayName) {
                await updateProfile(currentUser, { displayName: newName });
            }
            
            // Update Firestore
            await updateDoc(doc(db, 'users', currentUser.uid), {
                name: newName,
                phone: newPhone,
                updatedAt: new Date().toISOString()
            });
            
            // Reload user data
            await loadUserData();
            showToast("Profile updated successfully!");
        } catch (error) {
            console.error("Error updating profile:", error);
            showToast("Error updating profile: " + error.message, true);
        }
    };

    window.verifyEmail = async () => {
        try {
            await sendEmailVerification(currentUser);
            showToast("Verification email sent! Check your inbox.");
        } catch (error) {
            showToast("Error sending verification email", true);
        }
    };

    window.changePassword = () => {
        const newPassword = prompt("Enter new password (min 6 characters):");
        if (newPassword && newPassword.length >= 6) {
            updatePassword(currentUser, newPassword)
                .then(() => showToast("Password updated successfully!"))
                .catch((error) => showToast(error.message, true));
        } else if (newPassword) {
            showToast("Password must be at least 6 characters", true);
        }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('dark');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    };

    window.logout = () => {
        auth.signOut();
        window.location.href = 'index.html';
    };

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        await loadUserData();
    });

    createParticles();
</script>
</body>
</html>
