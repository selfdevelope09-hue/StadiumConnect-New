<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect | Premium Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a2a;
            min-height: 100vh;
            position: relative;
        }

        /* Animated Gradient Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 50%, #2a1a3a 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,107,53,0.3);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Glass Header */
        .header {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ff9068, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 12px;
            background: rgba(255,107,53,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
            color: #ff9068;
        }

        .stadium-badge {
            background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,144,104,0.2));
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,107,53,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stadium-badge i {
            color: #ff6b35;
            font-size: 20px;
        }

        .stadium-badge span {
            color: white;
            font-weight: 600;
        }

        .live-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-glass:hover {
            background: rgba(255,107,53,0.3);
            border-color: #ff6b35;
            transform: translateY(-2px);
        }

        .btn-logout {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.3);
        }

        .btn-logout:hover {
            background: rgba(239,68,68,0.5);
            border-color: #ef4444;
        }

        /* Stats Grid Premium */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b35, #ff9068, #ffb347);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,107,53,0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }

        .stat-icon {
            font-size: 42px;
            margin-bottom: 16px;
        }

        .stat-value {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
        }

        .stat-sub {
            font-size: 12px;
            color: #10b981;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Premium Cards */
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 30px;
            transition: all 0.4s ease;
        }

        .card:hover {
            border-color: rgba(255,107,53,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .card h3 i {
            color: #ff6b35;
            font-size: 24px;
        }

        /* Calendar Premium */
        .calendar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .calendar-section {
                grid-template-columns: 1fr;
            }
        }

        .calendar-wrapper {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .flatpickr-calendar {
            background: rgba(10,10,42,0.95) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255,107,53,0.3) !important;
            border-radius: 20px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
        }

        .flatpickr-day.selected {
            background: #ff6b35 !important;
            border-color: #ff6b35 !important;
        }

        .flatpickr-day.disabled {
            color: rgba(255,255,255,0.3) !important;
            text-decoration: line-through;
        }

        .blocked-dates-list {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .blocked-date-item {
            background: rgba(245,158,11,0.1);
            border-left: 4px solid #f59e0b;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .blocked-date-item:hover {
            transform: translateX(5px);
            background: rgba(245,158,11,0.2);
        }

        .remove-date {
            background: rgba(239,68,68,0.8);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-date:hover {
            transform: scale(1.1);
            background: #ef4444;
        }

        /* Form Styles Premium */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 14px;
            color: white;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff9068);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,107,53,0.4);
        }

        /* Table Premium */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: rgba(255,255,255,0.9);
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .status-badge {
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-confirmed, .status-completed {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .status-pending {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.3);
        }

        .status-cancelled {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* Photo Grid */
        .photo-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .photo-item {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .photo-item:hover {
            transform: scale(1.05);
            border-color: #ff6b35;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-item .remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(239,68,68,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        /* Toast Premium */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            border-left: 4px solid #10b981;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.6);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,107,53,0.3);
            border-top: 3px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .last-updated {
            text-align: right;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 15px;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1>STADIUM<span>CONNECT</span> <span>PREMIUM</span></h1>
        </div>
        <div class="stadium-badge">
            <i class="fas fa-stadium"></i>
            <span id="stadiumNameText">Loading...</span>
        </div>
        <div class="action-buttons">
            <span class="live-badge"><i class="fas fa-circle" style="font-size: 8px;"></i> LIVE SYNC</span>
            <button class="btn-glass" onclick="refreshData()"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-glass btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Analytics Charts -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 30px;">
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> Revenue Analytics</h3>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3><i class="fas fa-chart-pie"></i> Booking Insights</h3>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Blocked Dates with Calendar -->
    <div class="card">
        <h3><i class="fas fa-calendar-alt"></i> Date Management</h3>
        <div class="calendar-section">
            <div class="calendar-wrapper">
                <label style="color: white; margin-bottom: 12px; display: block; font-weight: 600;">📅 Select Dates to Block</label>
                <input type="text" id="dateCalendar" placeholder="Select dates..." style="width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white;">
                <button class="btn-primary" onclick="addSelectedDates()" style="margin-top: 15px; width: 100%;">
                    <i class="fas fa-ban"></i> Block Selected Dates
                </button>
            </div>
            <div class="blocked-dates-list">
                <label style="color: white; margin-bottom: 12px; display: block; font-weight: 600;">🚫 Blocked Dates</label>
                <div id="blockedDatesList">
                    <div class="loading-spinner"><div class="spinner"></div>Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stadium Details -->
    <div class="card">
        <h3><i class="fas fa-sliders-h"></i> Stadium Configuration</h3>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-building"></i> Stadium Name</label>
                <input type="text" id="stadiumName" placeholder="Enter stadium name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-city"></i> City</label>
                <input type="text" id="stadiumCity" placeholder="City">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-users"></i> Capacity</label>
                <input type="number" id="stadiumCapacityInput" placeholder="Total seats">
            </div>
            <div class="form-group">
                <label><i class="fas fa-rupee-sign"></i> Base Price (per day)</label>
                <input type="number" id="stadiumPrice" placeholder="₹">
            </div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Location</label>
            <input type="text" id="stadiumLocation" placeholder="Full address">
        </div>
        <div class="form-group">
            <label><i class="fas fa-align-left"></i> Description</label>
            <textarea id="stadiumDescription" rows="3" placeholder="Describe your stadium..."></textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-wifi"></i> Amenities</label>
            <input type="text" id="stadiumAmenities" placeholder="Floodlights, Parking, WiFi, CCTV">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-image"></i> Logo</label>
                <input type="file" id="stadiumLogo" accept="image/*">
                <div id="logoPreview" style="margin-top: 10px;"></div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-photo-video"></i> Gallery</label>
                <input type="file" id="stadiumPhotos" accept="image/*" multiple>
            </div>
        </div>
        <div id="photosPreview" class="photo-grid"></div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button class="btn-primary" onclick="updateStadium()"><i class="fas fa-save"></i> Save Changes</button>
            <button class="btn-primary" onclick="resetForm()" style="background: rgba(100,100,100,0.5);"><i class="fas fa-undo"></i> Reset</button>
        </div>
    </div>

    <!-- Bookings Table -->
    <div class="card">
        <h3><i class="fas fa-ticket-alt"></i> Live Bookings & Transactions</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Your Share (85%)</th>
                        <th>Agent (15%)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr>
                        <td colspan="8" class="loading-spinner"><div class="spinner"></div> Fetching live data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="last-updated" id="lastUpdated"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.appspot.com",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const urlParams = new URLSearchParams(window.location.search);
    const stadiumId = urlParams.get('id');
    
    let stadium = null;
    let allBookings = [];
    let revenueChart = null;
    let statusChart = null;
    let unsubscribeBookings = null;
    let flatpickrInstance = null;

    function calculateOwnerShare(amount) {
        return Math.floor((Number(amount) || 0) * 0.85);
    }
    
    function calculateAgentShare(amount) {
        return Math.floor((Number(amount) || 0) * 0.15);
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 15 + 10 + 's';
            container.appendChild(particle);
        }
    }

    async function loadStadium() {
        if (!stadiumId) {
            showToast('Invalid access! Redirecting...', true);
            setTimeout(() => window.location.href = 'owner-login.html', 1500);
            return;
        }
        
        try {
            const docSnap = await getDoc(doc(db, 'vendors', stadiumId));
            if (docSnap.exists()) {
                stadium = { id: docSnap.id, ...docSnap.data() };
                
                document.getElementById('stadiumNameText').innerText = stadium.name || 'My Stadium';
                document.getElementById('stadiumName').value = stadium.name || '';
                document.getElementById('stadiumCity').value = stadium.city || '';
                document.getElementById('stadiumCapacityInput').value = stadium.capacity || '';
                document.getElementById('stadiumPrice').value = stadium.basePrice || '';
                document.getElementById('stadiumLocation').value = stadium.location || '';
                document.getElementById('stadiumDescription').value = stadium.description || '';
                document.getElementById('stadiumAmenities').value = (stadium.amenities || []).join(', ');
                
                if (stadium.imageUrl) {
                    document.getElementById('logoPreview').innerHTML = `<img src="${stadium.imageUrl}" style="width:80px;height:80px;border-radius:16px; object-fit:cover;">`;
                }
                
                if (stadium.gallery && stadium.gallery.length) {
                    document.getElementById('photosPreview').innerHTML = stadium.gallery.map((url, i) => `
                        <div class="photo-item">
                            <img src="${url}">
                            <button class="remove" onclick="removeGalleryPhoto(${i})">×</button>
                        </div>
                    `).join('');
                }
                
                updateBlockedDatesList();
                setupBookingsListener();
                setupCalendar();
            } else {
                showToast('Stadium not found!', true);
            }
        } catch(error) {
            console.error(error);
            showToast('Error loading data: ' + error.message, true);
        }
    }
    
    function updateBlockedDatesList() {
        const container = document.getElementById('blockedDatesList');
        const blockedDates = stadium?.blockedDates || [];
        
        if (blockedDates.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 30px; color: rgba(255,255,255,0.5);">No blocked dates</div>';
            return;
        }
        
        container.innerHTML = blockedDates.map(date => `
            <div class="blocked-date-item">
                <span><i class="fas fa-calendar-times" style="color: #f59e0b;"></i> ${date}</span>
                <button class="remove-date" onclick="removeBlockedDate('${date}')">×</button>
            </div>
        `).join('');
    }
    
    function setupCalendar() {
        flatpickrInstance = flatpickr("#dateCalendar", {
            mode: "multiple",
            dateFormat: "Y-m-d",
            minDate: "today",
            disable: stadium?.blockedDates || [],
            placeholder: "Select dates to block..."
        });
    }
    
    window.addSelectedDates = async () => {
        if (!flatpickrInstance) return;
        const selectedDates = flatpickrInstance.selectedDates.map(d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        if (selectedDates.length === 0) {
            showToast('Please select dates first', true);
            return;
        }
        const currentBlocked = stadium?.blockedDates || [];
        const newBlocked = [...new Set([...currentBlocked, ...selectedDates])];
        await updateDoc(doc(db, 'vendors', stadiumId), { blockedDates: newBlocked });
        stadium.blockedDates = newBlocked;
        updateBlockedDatesList();
        flatpickrInstance.set('disable', newBlocked);
        flatpickrInstance.clear();
        showToast(`✅ ${selectedDates.length} date(s) blocked`);
    };
    
    window.removeBlockedDate = async (date) => {
        const newBlocked = (stadium?.blockedDates || []).filter(d => d !== date);
        await updateDoc(doc(db, 'vendors', stadiumId), { blockedDates: newBlocked });
        stadium.blockedDates = newBlocked;
        updateBlockedDatesList();
        flatpickrInstance.set('disable', newBlocked);
        showToast(`Removed ${date}`);
    };
    
    function setupBookingsListener() {
        if (unsubscribeBookings) unsubscribeBookings();
        
        const bookingsRef = collection(db, "bookings");
        // Primary filter: vendorId OR stadiumId OR assignedTo
        const vendorFilters = ['vendorId', 'stadiumId', 'vendor_id', 'assignedTo'];
        
        // Try to create a query that matches any of these fields to current stadiumId
        // Since Firestore doesn't support OR queries directly, we'll use a single known field based on our data structure
        // Most likely 'vendorId' is used in bookings collection. We'll create a query with where('vendorId', '==', stadiumId)
        // and fallback to manual filtering if needed.
        const q = query(bookingsRef, where("vendorId", "==", stadiumId), orderBy("createdAt", "desc"));
        
        // Real-time listener for bookings belonging to this vendor
        unsubscribeBookings = onSnapshot(q, 
            (snapshot) => {
                const bookings = snapshot.docs.map(d => ({ id: d.id, ...d.data(), amount: Number(d.data().amount) || 0 }));
                allBookings = bookings;
                updateUI();
                updateLastUpdated();
            },
            (error) => {
                console.warn("Primary query failed, trying fallback:", error);
                // Fallback: fetch all and filter client-side (for demo compatibility)
                const fallbackQuery = query(bookingsRef, orderBy("createdAt", "desc"));
                onSnapshot(fallbackQuery, (snap) => {
                    let all = snap.docs.map(d => ({ id: d.id, ...d.data(), amount: Number(d.data().amount) || 0 }));
                    // Filter by any possible vendor id field
                    all = all.filter(b => b.vendorId === stadiumId || b.stadiumId === stadiumId || b.vendor_id === stadiumId || b.assignedTo === stadiumId);
                    allBookings = all;
                    updateUI();
                    updateLastUpdated();
                });
            }
        );
    }
    
    function updateUI() {
        updateStats();
        updateBookingsTable();
        renderCharts();
    }
    
    function updateLastUpdated() {
        document.getElementById('lastUpdated').innerHTML = `⏱️ Last sync: ${new Date().toLocaleString()}`;
    }
    
    function updateStats() {
        const confirmedBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        const totalRevenue = confirmedBookings.reduce((sum, b) => sum + (b.amount || 0), 0);
        const ownerEarnings = calculateOwnerShare(totalRevenue);
        const agentCommission = calculateAgentShare(totalRevenue);
        const pendingAmount = allBookings.filter(b => b.status === 'pending').reduce((sum, b) => sum + (b.amount || 0), 0);
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-value">${allBookings.length}</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-value">${confirmedBookings.length}</div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-value">₹${totalRevenue.toLocaleString()}</div>
                <div class="stat-label">Gross Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-building"></i></div>
                <div class="stat-value">₹${ownerEarnings.toLocaleString()}</div>
                <div class="stat-label">Your Earnings (85%)</div>
                <div class="stat-sub"><i class="fas fa-chart-line"></i> Net Profit</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-value">₹${agentCommission.toLocaleString()}</div>
                <div class="stat-label">Agent Commission (15%)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-value">₹${pendingAmount.toLocaleString()}</div>
                <div class="stat-label">Pending Settlement</div>
            </div>
        `;
    }
    
    function updateBookingsTable() {
        const tableBody = document.getElementById('bookingsTableBody');
        if (allBookings.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;"><i class="fas fa-inbox"></i> No bookings found</td></tr>';
            return;
        }
        
        tableBody.innerHTML = allBookings.map(b => {
            const ownerShare = calculateOwnerShare(b.amount);
            const agentShare = calculateAgentShare(b.amount);
            const eventDateDisplay = b.eventDate || b.date || b.bookingDate || '-';
            const customerName = b.userName || b.customerName || b.name || 'Guest';
            const customerPhone = b.userPhone || b.phone || b.mobile || '-';
            return `
                <tr>
                    <td><code>${b.id.slice(-8)}</code></td>
                    <td><strong>${escapeHtml(customerName)}</strong></td>
                    <td>${escapeHtml(customerPhone)}</td>
                    <td>${eventDateDisplay}</td>
                    <td><strong>₹${(b.amount || 0).toLocaleString()}</strong></td>
                    <td style="color: #10b981;">₹${ownerShare.toLocaleString()}</td>
                    <td style="color: #f59e0b;">₹${agentShare.toLocaleString()}</td>
                    <td><span class="status-badge status-${b.status || 'pending'}">${b.status || 'pending'}</span></td>
                </tr>
            `;
        }).join('');
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderCharts() {
        const confirmed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        const monthly = {};
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const last6Months = [];
        const today = new Date();
        for (let i = 5; i >= 0; i--) {
            const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
            last6Months.push(months[d.getMonth()]);
        }
        
        confirmed.forEach(b => {
            if (b.createdAt) {
                let date;
                if (b.createdAt.toDate) date = b.createdAt.toDate();
                else if (b.createdAt?.seconds) date = new Date(b.createdAt.seconds * 1000);
                else date = new Date(b.createdAt);
                if (!isNaN(date.getTime())) {
                    const monthName = months[date.getMonth()];
                    if (last6Months.includes(monthName)) {
                        monthly[monthName] = (monthly[monthName] || 0) + (b.amount || 0);
                    }
                }
            }
        });
        
        const revenueData = last6Months.map(m => monthly[m] || 0);
        
        if (revenueChart) revenueChart.destroy();
        const revenueCtx = document.getElementById('revenueChart').getContext('2d');
        revenueChart = new Chart(revenueCtx, {
            type: 'line',
            data: {
                labels: last6Months,
                datasets: [{
                    label: 'Revenue (₹)',
                    data: revenueData,
                    borderColor: '#ff6b35',
                    backgroundColor: 'rgba(255,107,53,0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#ff6b35',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });
        
        const statusCount = {
            confirmed: allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length,
            pending: allBookings.filter(b => b.status === 'pending').length,
            cancelled: allBookings.filter(b => b.status === 'cancelled').length
        };
        
        if (statusChart) statusChart.destroy();
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        statusChart = new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['Confirmed', 'Pending', 'Cancelled'],
                datasets: [{
                    data: [statusCount.confirmed, statusCount.pending, statusCount.cancelled],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });
    }
    
    async function uploadImage(file, path) {
        if(!file) return null;
        try {
            const storageRef = ref(storage, `${path}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        } catch(e) {
            return null;
        }
    }
    
    window.updateStadium = async () => {
        const data = {
            name: document.getElementById('stadiumName').value,
            city: document.getElementById('stadiumCity').value,
            capacity: parseInt(document.getElementById('stadiumCapacityInput').value) || 0,
            basePrice: parseInt(document.getElementById('stadiumPrice').value) || 50000,
            location: document.getElementById('stadiumLocation').value,
            description: document.getElementById('stadiumDescription').value,
            amenities: document.getElementById('stadiumAmenities').value.split(',').map(a => a.trim()).filter(a => a),
            updatedAt: new Date().toISOString()
        };
        
        const logoFile = document.getElementById('stadiumLogo').files[0];
        if(logoFile) {
            const logoUrl = await uploadImage(logoFile, 'stadiums/logos');
            if(logoUrl) data.imageUrl = logoUrl;
        }
        
        const photoFiles = document.getElementById('stadiumPhotos').files;
        if(photoFiles.length > 0) {
            const existingPhotos = stadium.gallery || [];
            for(let file of photoFiles) {
                const url = await uploadImage(file, 'stadiums/gallery');
                if(url) existingPhotos.push(url);
            }
            data.gallery = existingPhotos;
        }
        
        await updateDoc(doc(db, 'vendors', stadiumId), data);
        showToast('✅ Stadium updated successfully');
        loadStadium();
    };
    
    window.removeGalleryPhoto = async (index) => {
        const newGallery = [...(stadium.gallery || [])];
        newGallery.splice(index, 1);
        await updateDoc(doc(db, 'vendors', stadiumId), { gallery: newGallery });
        showToast('Photo removed');
        loadStadium();
    };
    
    window.resetForm = () => {
        if (stadium) {
            document.getElementById('stadiumName').value = stadium.name || '';
            document.getElementById('stadiumCity').value = stadium.city || '';
            document.getElementById('stadiumCapacityInput').value = stadium.capacity || '';
            document.getElementById('stadiumPrice').value = stadium.basePrice || '';
            document.getElementById('stadiumLocation').value = stadium.location || '';
            document.getElementById('stadiumDescription').value = stadium.description || '';
            document.getElementById('stadiumAmenities').value = (stadium.amenities || []).join(', ');
            showToast('Form reset');
        }
    };
    
    window.refreshData = () => {
        loadStadium();
        showToast('🔄 Refreshing data...');
    };
    
    window.logout = () => {
        if (unsubscribeBookings) unsubscribeBookings();
        localStorage.removeItem('stadiumOwner');
        sessionStorage.clear();
        window.location.href = 'owner-login.html';
    };
    
    createParticles();
    loadStadium();
</script>
