<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Pro | StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff6b35; --dark: #0f172a; --success: #10b981; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 2rem; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .nav-link { padding: 12px 15px; border-radius: 10px; color: #94a3b8; text-decoration: none; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { background: rgba(255,107,53,0.1); color: var(--primary); }

        /* Main Content */
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 2rem; }
        
        /* Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); }
        .status-toggle { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 8px 15px; border-radius: 30px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 1rem; opacity: 0.2; }
        .stat-card h2 { font-size: 2rem; font-weight: 800; color: var(--dark); }

        /* Table & Cards */
        .glass-card { background: white; border-radius: 24px; padding: 2rem; border: 1px solid var(--border); margin-bottom: 2rem; }
        .btn-update { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 1rem; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .badge { padding: 5px 12px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-confirmed { background: #dcfce7; color: #166534; }

        .action-icon { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; color: white; margin-right: 5px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
        }

        /* Toast Message */
        #toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: white; font-weight: 600; display: none; z-index: 9999; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color: var(--primary); margin-bottom: 2rem;">STADIUMCONNECT</h2>
    <nav>
        <a href="#" class="nav-link active"><i class="fas fa-th-large"></i> Overview</a>
        <a href="#bookingsSection" class="nav-link"><i class="fas fa-calendar-check"></i> Bookings</a>
        <a href="#detailsSection" class="nav-link"><i class="fas fa-edit"></i> Edit Stadium</a>
        <a href="#" class="nav-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div id="toast"></div>

    <header class="top-bar">
        <div>
            <h1 id="stadiumTitle">Welcome Back!</h1>
            <p id="stadiumLoc" style="color: #64748b;"></p>
        </div>
        <div class="status-toggle">
            <span style="font-size: 0.8rem; font-weight: 700;">STADIUM STATUS:</span>
            <select id="isLiveToggle" onchange="toggleStadiumStatus()" style="border:none; background:none; font-weight:800; color:var(--success); outline:none;">
                <option value="true">🟢 LIVE</option>
                <option value="false">🔴 OFFLINE</option>
            </select>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-ticket-alt"></i>
            <h2 id="statBookings">0</h2>
            <p style="color:#64748b">Total Bookings</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-rupee-sign"></i>
            <h2 id="statRevenue">₹0</h2>
            <p style="color:#64748b">Total Revenue</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h2 id="statCapacity">0</h2>
            <p style="color:#64748b">Stadium Capacity</p>
        </div>
    </div>

    <div class="glass-card">
        <h3><i class="fas fa-chart-area"></i> Revenue Analytics</h3>
        <canvas id="revChart" style="max-height: 300px;"></canvas>
    </div>

    <div class="glass-card" id="bookingsSection">
        <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
            <h3><i class="fas fa-list"></i> Live Bookings</h3>
            <button onclick="loadStadium()" class="nav-link" style="border:none; cursor:pointer;"><i class="fas fa-sync"></i> Refresh Data</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Customer</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsBody">
                    <tr><td colspan="6" style="text-align:center;">Checking for new bookings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="glass-card" id="detailsSection">
        <h3><i class="fas fa-info-circle"></i> Stadium Management</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 1rem;">
            <div>
                <label style="font-size: 0.8rem; font-weight: 700; color: #64748b;">STADIUM NAME</label>
                <input type="text" id="editName" class="btn-update" style="background: #f1f5f9; color: black; text-align: left;">
            </div>
            <div>
                <label style="font-size: 0.8rem; font-weight: 700; color: #64748b;">PRICE PER DAY (₹)</label>
                <input type="number" id="editPrice" class="btn-update" style="background: #f1f5f9; color: black; text-align: left;">
            </div>
        </div>
        <div style="margin-top: 20px;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #64748b;">BLOCKED DATES (YYYY-MM-DD)</label>
            <textarea id="editBlocked" rows="2" class="btn-update" style="background: #f1f5f9; color: black; text-align: left;" placeholder="Comma separated dates..."></textarea>
        </div>
        <button class="btn-update" onclick="saveDetails()">SAVE ALL CHANGES</button>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.appspot.com",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const stadiumId = urlParams.get('id');

    let currentStadium = null;
    let chartInstance = null;

    function notify(text, color = "#10b981") {
        const t = document.getElementById('toast');
        t.style.display = "block";
        t.style.background = color;
        t.innerText = text;
        setTimeout(() => t.style.display = "none", 3000);
    }

    async function loadStadium() {
        if(!stadiumId) { window.location.href = 'owner-login.html'; return; }

        const docSnap = await getDoc(doc(db, 'vendors', stadiumId));
        if(docSnap.exists()){
            currentStadium = docSnap.data();
            document.getElementById('stadiumTitle').innerText = currentStadium.name;
            document.getElementById('stadiumLoc').innerText = `📍 ${currentStadium.city}, ${currentStadium.location}`;
            document.getElementById('statCapacity').innerText = currentStadium.capacity || 0;
            document.getElementById('editName').value = currentStadium.name;
            document.getElementById('editPrice').value = currentStadium.basePrice;
            document.getElementById('editBlocked').value = (currentStadium.blockedDates || []).join(', ');
            document.getElementById('isLiveToggle').value = String(currentStadium.isLive || true);

            fetchBookings();
        }
    }

    async function fetchBookings() {
        // Query logic updated to match 'vendorId'
        const q = query(collection(db, "bookings"), where("vendorId", "==", stadiumId), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        const bookings = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
        
        renderBookings(bookings);
        renderStats(bookings);
    }

    function renderBookings(list) {
        const tbody = document.getElementById('bookingsBody');
        if(list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No bookings found yet.</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(b => `
            <tr>
                <td><strong>#${b.id.slice(-6).toUpperCase()}</strong></td>
                <td>${b.userName || 'Guest'}<br><small style="color:#64748b">${b.userPhone || '-'}</small></td>
                <td>${b.eventDate}</td>
                <td style="font-weight:700">₹${parseInt(String(b.amount).replace(/[^0-9]/g, '')).toLocaleString()}</td>
                <td><span class="badge bg-${b.status || 'pending'}">${(b.status || 'pending').toUpperCase()}</span></td>
                <td>
                    <button class="action-icon" style="background:#25D366" onclick="window.open('https://wa.me/91${b.userPhone}')"><i class="fab fa-whatsapp"></i></button>
                    <button class="action-icon" style="background:#ef4444" onclick="updateStatus('${b.id}', 'cancelled')"><i class="fas fa-times"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function renderStats(list) {
        const confirmed = list.filter(b => b.status === 'confirmed');
        const revenue = confirmed.reduce((acc, curr) => acc + parseInt(String(curr.amount).replace(/[^0-9]/g, '')), 0);
        
        document.getElementById('statBookings').innerText = list.length;
        document.getElementById('statRevenue').innerText = `₹${revenue.toLocaleString()}`;

        // Simple Monthly Chart Logic
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthlyData = new Array(12).fill(0);
        
        confirmed.forEach(b => {
            const date = new Date(b.eventDate);
            monthlyData[date.getMonth()] += parseInt(String(b.amount).replace(/[^0-9]/g, ''));
        });

        const ctx = document.getElementById('revChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [{
                    label: 'Revenue 2026 (₹)',
                    data: monthlyData,
                    borderColor: '#ff6b35',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255,107,53,0.05)'
                }]
            }
        });
    }

    window.saveDetails = async () => {
        const blocked = document.getElementById('editBlocked').value.split(',').map(d => d.trim()).filter(d => d);
        await updateDoc(doc(db, 'vendors', stadiumId), {
            name: document.getElementById('editName').value,
            basePrice: parseInt(document.getElementById('editPrice').value),
            blockedDates: blocked
        });
        notify("Stadium Details Updated Successfully!");
        loadStadium();
    }

    window.toggleStadiumStatus = async () => {
        const val = document.getElementById('isLiveToggle').value === "true";
        await updateDoc(doc(db, 'vendors', stadiumId), { isLive: val });
        notify(val ? "Stadium is now LIVE" : "Stadium is now OFFLINE", val ? "#10b981" : "#ef4444");
    }

    window.updateStatus = async (bid, status) => {
        if(confirm("Are you sure you want to cancel this booking?")){
            await updateDoc(doc(db, 'bookings', bid), { status: status });
            notify("Booking Updated!");
            fetchBookings();
        }
    }

    window.logout = () => { sessionStorage.clear(); window.location.href = 'owner-login.html'; }

    // Init
    loadStadium();
</script>
</body>
</html>
