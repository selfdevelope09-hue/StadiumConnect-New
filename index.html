<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1a1a1a;
        }

        .logo span {
            color: #ff6b35;
        }

        .tagline {
            text-align: center;
            font-size: 16px;
            color: #ff6b35;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .description {
            text-align: center;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 48px;
            padding: 0 20px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: block;
        }

        .btn-login {
            background: white;
            border: 1.5px solid #ff6b35;
            color: #ff6b35;
        }

        .btn-login:hover {
            background: #fff5f0;
        }

        .btn-register {
            background: #ff6b35;
            border: none;
            color: white;
        }

        .btn-register:hover {
            background: #e55a2b;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>STADIUM<span>CONNECT</span></h1>
    </div>
    <div class="tagline">your need, our network</div>
    <div class="description">
        India's premier event platform. Book stadiums, decorators, caterers, photographers & bands for your dream event.
    </div>
    <div class="buttons">
        <a href="login.html" class="btn btn-login">Login</a>
        <a href="register.html" class="btn btn-register">Create an account</a>
    </div>
    <footer>© 2025 StadiumConnect</footer>
</div>

</body>
</html>
