<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect - Royal Event Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="nav-buttons" id="navButtons"></div>
</header>

<section class="hero">
    <h1>Where Dreams<br>Become Events</h1>
    <p style="margin-top: 20px; color: #7a5a44;">India's most prestigious event platform</p>
</section>

<section class="categories">
    <div class="section-title">Our Royal Services</div>
    <div class="category-grid">
        <div class="category-card" onclick="window.location.href='vendors.html?category=decorator'">
            <div class="category-icon">🎨</div>
            <h3>Decorators</h3>
        </div>
        <div class="category-card" onclick="window.location.href='vendors.html?category=photographer'">
            <div class="category-icon">📸</div>
            <h3>Photographers</h3>
        </div>
        <div class="category-card" onclick="window.location.href='vendors.html?category=caterer'">
            <div class="category-icon">🍽️</div>
            <h3>Caterers</h3>
        </div>
        <div class="category-card" onclick="window.location.href='vendors.html?category=bandbaja'">
            <div class="category-icon">🎵</div>
            <h3>Band Baja</h3>
        </div>
        <div class="category-card" onclick="window.location.href='stadium-booking.html'">
            <div class="category-icon">🏟️</div>
            <h3>Stadiums</h3>
        </div>
    </div>
</section>

<footer>© 2025 STADIUMCONNECT | Royal Event Infrastructure</footer>

<script>
    auth.onAuthStateChanged((user) => {
        const nav = document.getElementById('navButtons');
        if (user) {
            nav.innerHTML = `
                <span style="color:#b87c4f;">👑 ${user.displayName || user.email.split('@')[0]}</span>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" onclick="logout()">Logout</a>
            `;
        } else {
            nav.innerHTML = `<a href="login.html">Sign In</a><a href="register.html">Join Royal Club</a>`;
        }
    });
</script>

</body>
</html>
