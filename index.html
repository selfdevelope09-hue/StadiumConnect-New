<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 40px;
        }

        .logo span {
            color: #ff6b35;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 36px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login {
            background: transparent;
            border: 1.5px solid #ff6b35;
            color: #ff6b35;
        }

        .btn-login:hover {
            background: #ff6b35;
            color: white;
        }

        .btn-register {
            background: #ff6b35;
            border: none;
            color: white;
        }

        .btn-register:hover {
            background: #e55a2b;
        }

        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        STADIUM<span>CONNECT</span>
    </div>
    <div class="buttons">
        <a href="login.html" class="btn btn-login">Login</a>
        <a href="register.html" class="btn btn-register">Register</a>
    </div>
    <footer>© 2025 StadiumConnect</footer>
</div>

</body>
</html>
