<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { text-align: center; width: 100%; max-width: 400px; }
        .logo { font-size: 36px; font-weight: 800; margin-bottom: 30px; color: #333; }
        .logo span { color: #ff6b35; }
        
        /* Input & Buttons */
        .auth-card { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 1px solid #eee; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 10px; outline: none; }
        input:focus { border-color: #ff6b35; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: #ff6b35; color: white; }
        .btn-google { background: white; border: 1.5px solid #ddd; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.98); }

        #recaptcha-container { margin: 10px 0; }
        .hidden { display: none; }
        .divider { margin: 20px 0; color: #999; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">STADIUM<span>CONNECT</span></div>

        <div class="auth-card">
            <div id="phone-ui">
                <input type="tel" id="phoneNumber" placeholder="+91 9876543210">
                <div id="recaptcha-container"></div>
                <button class="btn btn-primary" onclick="handlePhoneAuth()">Get OTP</button>
            </div>

            <div id="otp-ui" class="hidden">
                <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
                <button class="btn btn-primary" onclick="handleVerifyOTP()">Verify OTP</button>
            </div>

            <div class="divider">OR</div>

            <button class="btn btn-google" onclick="handleGoogleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        // 1. APNI FIREBASE CONFIG YAHAN REPLACE KAREIN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // --- GOOGLE LOGIN ---
        function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Web ke liye Popup best hai, APK ke liye SHA-1 zaruri hai
            auth.signInWithPopup(provider)
                .then((result) => {
                    console.log("Success:", result.user);
                    window.location.href = "dashboard.html"; // Success page URL
                })
                .catch((error) => {
                    console.error("Error:", error);
                    alert("Google Error: " + error.message);
                });
        }

        // --- PHONE AUTH ---
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        function handlePhoneAuth() {
            const phone = document.getElementById('phoneNumber').value;
            if(!phone) return alert("Please enter phone number!");

            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('phone-ui').classList.add('hidden');
                    document.getElementById('otp-ui').classList.remove('hidden');
                })
                .catch((error) => {
                    alert("SMS Error: " + error.message);
                });
        }

        function handleVerifyOTP() {
            const code = document.getElementById('otpCode').value;
            window.confirmationResult.confirm(code)
                .then((result) => {
                    alert("Login Success!");
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Wrong OTP!");
                });
        }
    </script>
</body>
</html>
