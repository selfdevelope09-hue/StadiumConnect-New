<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect - Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f9f9f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .logo span { color: #ff6b35; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px 15px; border: 1.5px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff6b35; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 10px; transition: 0.3s; }
        .btn-primary { background: #ff6b35; color: white; }
        .btn-google { background: white; border: 1.5px solid #eee; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.98); }

        #recaptcha-container { margin-bottom: 15px; }
        .hidden { display: none; }
        .divider { margin: 20px 0; color: #aaa; font-size: 12px; position: relative; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">STADIUM<span>CONNECT</span></div>

        <div id="phone-section">
            <div class="input-group">
                <input type="tel" id="phoneNumber" placeholder="+91 9876543210">
            </div>
            <div id="recaptcha-container"></div>
            <button class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otp-section" class="hidden">
            <div class="input-group">
                <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
            </div>
            <button class="btn btn-primary" onclick="verifyOTP()">Verify & Login</button>
        </div>

        <div class="divider">OR</div>

        <button class="btn btn-google" onclick="googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continue with Google
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>

    <script>
        // 1. APNA FIREBASE CONFIG YAHAN DAALO
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "stadiumconnect-xxxx.firebaseapp.com",
            projectId: "stadiumconnect-xxxx",
            storageBucket: "stadiumconnect-xxxx.appspot.com",
            messagingSenderId: "xxxx",
            appId: "xxxx"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();

        // Google Login Fix for APK (Redirect use karein)
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // signInWithPopup APK mein block ho jata hai, isliye redirect use karein
            auth.signInWithRedirect(provider);
        }

        // Phone OTP Logic
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        function sendOTP() {
            const number = document.getElementById('phoneNumber').value;
            auth.signInWithPhoneNumber(number, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('phone-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                    alert("OTP Sent!");
                }).catch((error) => {
                    alert(error.message);
                });
        }

        function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            confirmationResult.confirm(code).then((result) => {
                alert("Login Successful!");
                window.location.href = "dashboard.html"; // Success page
            }).catch((error) => {
                alert("Invalid OTP");
            });
        }
    </script>
</body>
</html>
