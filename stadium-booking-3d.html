<script>
/* ------------------ FIREBASE INIT ------------------ */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ------------------ GLOBAL STATE ------------------ */
let stadiumData = { name: "Default Stadium", basePrice: 150000, city: "Nagpur" };
let currentPercent = 0;
let selectedDate = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let agentInfo = null;

/* ------------------ SAFE PARSE ------------------ */
function safePrice(val) {
    if (!val) return 150000;
    return parseInt(val.toString().replace(/[^0-9]/g, '')) || 150000;
}

/* ------------------ ADMIN SYNC ------------------ */
function syncFromAdmin() {
    const stId = new URLSearchParams(window.location.search).get('id') || 'stadium_1';

    db.collection("vendors").doc(stId).onSnapshot((doc) => {
        if (!doc.exists) return;

        stadiumData = doc.data();
        stadiumData.basePrice = safePrice(stadiumData.priceRange);

        document.getElementById('stName').innerText = stadiumData.name || "Unknown Stadium";
        document.getElementById('stLoc').innerText = stadiumData.city || "Unknown City";

        updatePricingLogic();
    });

    db.collection("agents").onSnapshot((snap) => {
        let found = false;

        snap.forEach(d => {
            const data = d.data();
            if (!found && data.city?.toLowerCase() === stadiumData.city?.toLowerCase()) {
                agentInfo = { ...data, id: d.id };
                document.getElementById('agName').innerText = data.name;
                found = true;
            }
        });

        if (!found) {
            document.getElementById('agName').innerText = "No Agent Available";
        }
    });
}

/* ------------------ CANVAS ENGINE ------------------ */
const canvas = document.getElementById('stadiumCanvas');
const ctx = canvas.getContext('2d');

function renderCanvas() {
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;

    canvas.width = w;
    canvas.height = h;

    ctx.clearRect(0, 0, w, h);

    ctx.fillStyle = '#081c08';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let i = 0; i < w; i += 25) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
    }

    ctx.strokeStyle = '#ff6b35';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(w/2, h/2, w*0.4, h*0.35, 0, 0, Math.PI*2);
    ctx.stroke();

    if (currentPercent > 0) {
        const angle = (currentPercent / 100) * (Math.PI * 2);

        ctx.fillStyle = 'rgba(255,107,53,0.4)';
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.arc(w/2, h/2, w*0.4, 0, angle);
        ctx.fill();
    }
}

/* ------------------ PORTION SELECT ------------------ */
function selectPortion(p, el) {
    currentPercent = p;

    document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');

    renderCanvas();
    updatePricingLogic();
}

/* FIX CLICK */
document.querySelectorAll('.p-btn').forEach(btn => {
    btn.onclick = function() {
        selectPortion(parseInt(this.innerText), this);
    };
});

/* ------------------ CALENDAR ------------------ */
function renderCalendar() {
    const grid = document.getElementById('calendar');
    grid.innerHTML = '';

    const days = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 1; i <= days; i++) {
        const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

        const day = document.createElement('div');
        day.className = 'cal-day';
        day.innerText = i;

        if (selectedDate === dateStr) day.classList.add('selected');

        day.onclick = () => {
            selectedDate = dateStr;
            renderCalendar();
            updatePricingLogic();
        };

        grid.appendChild(day);
    }
}

/* ------------------ PRICING ------------------ */
function updatePricingLogic() {
    let multiplier = 1;

    if (selectedDate) {
        const d = new Date(selectedDate);
        if ([0,6].includes(d.getDay())) multiplier = 1.2;
    }

    const base = stadiumData.basePrice * (currentPercent / 100);
    const final = Math.floor(base * multiplier + 2500);

    document.getElementById('pBase').innerText = '₹' + Math.floor(base).toLocaleString();
    document.getElementById('pTotal').innerText = '₹' + final.toLocaleString();
    document.getElementById('displayPercent').innerText = currentPercent + '%';
    document.getElementById('displaySurge').innerText = multiplier + 'x';
}

/* ------------------ VALIDATION ------------------ */
function isValid() {
    const name = custName.value.trim();
    const phone = custPhone.value.trim();

    return name.length > 2 && phone.length >= 10 && selectedDate && currentPercent > 0;
}

/* ------------------ BOOKING ------------------ */
async function processFinalBooking() {
    if (!isValid()) {
        alert("Complete details first!");
        return;
    }

    const btn = document.querySelector('.btn-book');
    btn.innerText = "Processing...";
    btn.disabled = true;

    try {
        await db.collection("bookings").add({
            customerName: custName.value,
            customerPhone: custPhone.value,
            customerEmail: custEmail.value,
            stadiumId: stadiumData.name,
            portion: currentPercent,
            eventDate: selectedDate,
            amount: document.getElementById('pTotal').innerText,
            agentId: agentInfo?.id || null,
            createdAt: new Date()
        });

        alert("🔥 Booking Confirmed!");
    } catch (e) {
        alert("Error: " + e.message);
    }

    btn.innerText = "CONFIRM BOOKING";
    btn.disabled = false;
}

/* ------------------ INIT ------------------ */
window.onload = () => {
    syncFromAdmin();
    renderCanvas();
    renderCalendar();

    setInterval(() => {
        viewerCount.innerText = Math.floor(Math.random()*10)+10;
    }, 3000);
};

window.onresize = renderCanvas;
</script>
