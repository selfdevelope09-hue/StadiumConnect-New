<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumConnect | AI Pro Booking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #ff6b35; --bg: #050505; --card: #111118; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        .header { padding: 15px 30px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; color: #fff; }
        .logo span { color: var(--primary); }

        .wrapper { max-width: 1500px; margin: 0 auto; padding: 30px; display: grid; grid-template-columns: 1fr 450px; gap: 30px; }

        /* Left Visualizer */
        .viz-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 100px; }
        .canvas-area { width: 100%; height: 400px; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 1px solid var(--border); }
        #stadiumCanvas { width: 100%; height: 100%; }

        /* Right Panel */
        .booking-card { background: rgba(255,255,255,0.03); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
        h3 { margin-bottom: 20px; color: var(--primary); font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* Form Fields */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; color: #fff; outline: none; margin-bottom: 10px; }
        .input-box:focus { border-color: var(--primary); }

        /* Portion Selection */
        .portion-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .p-btn { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .p-btn.active { background: var(--primary); border-color: var(--primary); }

        /* Drag & Drop Planner */
        .planner { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--border); }
        .items { display: flex; gap: 10px; margin-bottom: 15px; }
        .chip { background: var(--primary); padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: grab; }
        .drop-zone { height: 120px; background: rgba(255,255,255,0.02); border-radius: 12px; position: relative; border: 1px solid var(--border); }
        .placed { position: absolute; background: #fff; color: #000; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: move; }

        /* Calendar */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 10px; background: #000; border-radius: 8px; text-align: center; cursor: pointer; font-size: 11px; border: 1px solid var(--border); }
        .day.selected { background: var(--primary); color: #fff; }
        .day.booked { opacity: 0.2; cursor: not-allowed; }

        /* Pricing & Action */
        .price-box { background: linear-gradient(135deg, #1a1a2e, #000); padding: 20px; border-radius: 20px; border: 1px solid var(--primary); margin-top: 20px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; opacity: 0.8; }
        .final-amt { font-size: 32px; font-weight: 800; color: var(--primary); margin-top: 5px; }

        .btn-main { width: 100%; padding: 18px; border-radius: 40px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 20px rgba(255,107,53,0.3); }

        @media (max-width: 1000px) { .wrapper { grid-template-columns: 1fr; } .viz-card { position: relative; top: 0; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">STADIUM<span>CONNECT</span></div>
    <div id="liveView" style="font-size: 12px; color: #666;">🔵 12 Experts Online</div>
</header>

<div class="wrapper">
    <div class="viz-card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <h3>AI Space Blueprint</h3>
            <span id="areaTag" style="color: var(--primary); font-weight: 800;">0% Selected</span>
        </div>
        <div class="canvas-area">
            <canvas id="stadiumCanvas"></canvas>
        </div>
        <div style="margin-top: 15px; display: flex; justify-content: space-between; font-size: 12px; color: #888;">
            <span><i class="fas fa-info-circle"></i> Drag items to plan layout</span>
            <span id="capacityTag">Capacity: 0 guests</span>
        </div>
    </div>

    <div class="booking-card">
        <h3>Customer Details</h3>
        <div class="form-grid">
            <input type="text" id="custName" class="input-box" placeholder="Full Name">
            <input type="tel" id="custPhone" class="input-box" placeholder="Phone Number">
        </div>
        <input type="email" id="custEmail" class="input-box" placeholder="Email Address">
        <input type="text" id="custLoc" class="input-box" placeholder="Event Venue / Address">

        <h3>Select Portion</h3>
        <div class="portion-grid">
            <div class="p-btn" onclick="updateArea(25)">25%</div>
            <div class="p-btn" onclick="updateArea(50)">50%</div>
            <div class="p-btn" onclick="updateArea(75)">75%</div>
            <div class="p-btn" onclick="updateArea(100)">FULL</div>
        </div>

        <h3>Layout Planner</h3>
        <div class="planner">
            <div class="items">
                <div class="chip" draggable="true" ondragstart="drag(event)" id="stage">Stage</div>
                <div class="chip" draggable="true" ondragstart="drag(event)" id="food">Food</div>
                <div class="chip" draggable="true" ondragstart="drag(event)" id="vip">VIP</div>
            </div>
            <div class="drop-zone" id="dropZone" ondrop="drop(event)" ondragover="allowDrop(event)">
                <p id="dropHint" style="text-align:center; padding-top:50px; font-size:10px; opacity:0.3;">Drop items here</p>
            </div>
        </div>

        <h3>Event Date</h3>
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:#fff; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
            <strong id="monthYear">March 2025</strong>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:#fff; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calendar"></div>

        <div class="price-box">
            <div class="price-row"><span>Portion Rent</span><span id="basePrice">₹0</span></div>
            <div class="price-row"><span>AI Surge (Dynamic)</span><span id="surgePrice">1.0x</span></div>
            <div class="final-amt" id="totalPrice">₹0</div>
        </div>

        <button class="btn-main" onclick="confirmBooking()">CONFIRM BOOKING →</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- STATE ---
    let currentArea = 0;
    let selectedDate = null;
    let stadiumBasePrice = 150000;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    // --- CANVAS ---
    const canvas = document.getElementById('stadiumCanvas');
    const ctx = canvas.getContext('2d');

    function drawStadium() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0,0,w,h);

        // Ground
        ctx.fillStyle = '#0a1a0a';
        ctx.fillRect(0,0,w,h);

        // Oval
        ctx.strokeStyle = 'rgba(255,107,53,0.4)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(w/2, h/2, w*0.4, h*0.35, 0, 0, Math.PI*2);
        ctx.stroke();

        if(currentArea > 0) {
            ctx.fillStyle = 'rgba(255,107,53,0.3)';
            const angle = (currentArea / 100) * (Math.PI * 2);
            ctx.beginPath();
            ctx.moveTo(w/2, h/2);
            ctx.arc(w/2, h/2, w*0.4, 0, angle);
            ctx.closePath();
            ctx.fill();
        }
    }

    // --- AREA LOGIC ---
    function updateArea(val) {
        currentArea = val;
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('areaTag').innerText = val + '% Selected';
        document.getElementById('capacityTag').innerText = 'Capacity: ' + (val * 500) + ' guests';
        
        const price = (stadiumBasePrice * (val/100));
        document.getElementById('basePrice').innerText = '₹' + price.toLocaleString();
        document.getElementById('totalPrice').innerText = '₹' + price.toLocaleString();
        drawStadium();
    }

    // --- CALENDAR LOGIC ---
    function changeMonth(dir) {
        currentMonth += dir;
        if(currentMonth < 0) { currentMonth = 11; currentYear--; }
        if(currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    }

    function renderCalendar() {
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('monthYear').innerText = months[currentMonth] + " " + currentYear;
        
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        for(let i=1; i<=daysInMonth; i++) {
            const day = document.createElement('div');
            day.className = 'day';
            day.innerText = i;
            const dateStr = `${currentYear}-${currentMonth+1}-${i}`;
            
            if(selectedDate === dateStr) day.classList.add('selected');
            
            day.onclick = () => {
                selectedDate = dateStr;
                renderCalendar();
            };
            grid.appendChild(day);
        }
    }

    // --- DRAG & DROP FIX ---
    function allowDrop(ev) { ev.preventDefault(); }
    
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

    function drop(ev) {
        ev.preventDefault();
        const data = ev.dataTransfer.getData("text");
        const dropZone = document.getElementById('dropZone');
        const rect = dropZone.getBoundingClientRect();
        
        // Remove hint
        document.getElementById('dropHint').style.display = 'none';

        const newItem = document.createElement('div');
        newItem.className = 'placed';
        newItem.innerText = data.toUpperCase();
        
        // Calculate relative position inside the box
        const x = ev.clientX - rect.left - 20; 
        const y = ev.clientY - rect.top - 10;
        
        newItem.style.left = x + 'px';
        newItem.style.top = y + 'px';
        
        newItem.onclick = function() { this.remove(); };
        dropZone.appendChild(newItem);
    }

    // --- SUBMISSION ---
    async function confirmBooking() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const loc = document.getElementById('custLoc').value;

        if(!name || !phone || !selectedDate || currentArea === 0) {
            alert("Bhai, saari details bhariye!");
            return;
        }

        const data = {
            customerName: name,
            customerPhone: phone,
            venue: loc,
            date: selectedDate,
            portion: currentArea + '%',
            amount: document.getElementById('totalPrice').innerText,
            status: 'pending',
            createdAt: new Date().toISOString()
        };

        try {
            await db.collection("bookings").add(data);
            alert("✅ Booking Success! Agent will call you.");
            window.location.href = "dashboard.html";
        } catch(e) {
            alert("Error: " + e.message);
        }
    }

    // --- INITIALIZE ---
    window.onload = () => {
        drawStadium();
        renderCalendar();
        // Simulation Viewer Count
        setInterval(() => {
            const count = Math.floor(Math.random() * 10) + 5;
            document.getElementById('liveView').innerText = `🔵 ${count} Experts Online`;
        }, 5000);
    };
</script>

</body>
</html>
