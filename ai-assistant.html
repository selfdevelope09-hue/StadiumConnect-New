<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectAI | StadiumConnect</title>
  <link rel="icon" type="image/png" href="web-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #ffffff; color: #0e2a47; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: linear-gradient(135deg, #2a8cff, #0e2a47);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header a { color: #fff; text-decoration: underline; font-size: 14px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 34px; height: 34px; border-radius: 8px; object-fit: cover; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
    #log { flex: 1; overflow-y: auto; padding: 16px; max-width: 560px; margin: 0 auto; width: 100%; }
    .bubble { margin: 10px 0; padding: 12px 14px; border-radius: 14px; max-width: 92%; line-height: 1.45; font-size: 14px; }
    .ai { background: #eef6ff; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: #ff7a1a; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 16px; }
    .chip {
      background: #eef6ff;
      border: 1px solid #2a8cff;
      color: #1f6fd1;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .chip:hover { opacity: 0.9; }
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .book { background: #ff7a1a; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; width: 100%; }
    footer {
      border-top: 1px solid #eee;
      padding: 12px;
      display: flex;
      gap: 8px;
      background: #fff;
      align-items: center;
    }
    footer input { flex: 1; padding: 10px 14px; border-radius: 22px; border: 1px solid #ddd; font-size: 14px; }
    footer button {
      background: #ff7a1a;
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .typing { color: #888; font-style: italic; margin: 8px 0; }
    h1 { font-size: 18px; font-weight: 800; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="web-logo.png" alt="StadiumConnect logo" />
      <div>
      <h1>ConnectAI</h1>
      <div style="opacity:0.9;font-size:12px;margin-top:4px">StadiumConnect — sirf vendors, events, city &amp; budget</div>
      </div>
    </div>
    <a href="home.html">← Home</a>
  </header>
  <div id="log"></div>
  <footer>
    <input type="text" id="freeText" placeholder="Vendors / city / budget poochho…" />
    <button type="button" id="sendBtn" title="Send">➤</button>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
      authDomain: "stadiumconnect-8fecb.firebaseapp.com",
      projectId: "stadiumconnect-8fecb",
      storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
      messagingSenderId: "458108198578",
      appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    /* Vercel: full app URL jahan /api deploy hai. Same Vercel pe ai-assistant host ho to "" rehne do. GitHub Pages / alag host pe: "https://tumhara-proj.vercel.app" */
    const VERCEL_CONNECTAI_ORIGIN = "";
    const CONNECTAI_URL = VERCEL_CONNECTAI_ORIGIN
      ? `${VERCEL_CONNECTAI_ORIGIN.replace(/\/$/, "")}/api/connect-ai`
      : new URL("/api/connect-ai", window.location.origin).href;
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logEl = document.getElementById("log");
    const freeText = document.getElementById("freeText");
    const sendBtn = document.getElementById("sendBtn");

    let prefs = { category: "", city: "", guestCount: "", budget: "", eventType: "", specialReq: "" };
    let vendors = [];
    let step = "category";
    const STEP_CITY = "Aapka city?";

    const STEP_CHIPS = {
      category: ["🎨 Decorator", "📸 Photographer", "🍽️ Caterer", "🎵 Band Baja", "🏛️ Venue", "✨ Full Package"],
      city: ["📍 Nagpur", "📍 Mumbai", "📍 Pune", "📍 Delhi", "📍 Other"],
      guests: ["👥 50", "👥 100", "👥 200", "👥 500", "👥 1000+"],
      budget: ["💰 Under ₹50K", "💰 ₹50K - ₹2L", "💰 ₹2L - ₹5L", "💰 ₹5L - ₹10L", "💰 ₹10L+"],
      eventType: ["💍 Wedding", "🎂 Birthday", "🏢 Corporate", "🎉 Anniversary"],
      extras: ["⭐ Top Rated Only", "✅ Skip - Show Results"],
    };

    async function callConnectAPI(prompt, generationConfig = {}) {
      const r = await fetch(CONNECTAI_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, generationConfig }),
      });
      let data = {};
      try {
        data = await r.json();
      } catch (_) {}
      if (r.status === 503 || data.error === "connectAI_not_configured") {
        throw new Error(
          "Abhi ConnectAI server pe setup pending hai — thodi der baad try karo ya support se contact karo."
        );
      }
      if (r.status === 429 || data.error === "quota_exceeded") {
        throw new Error(
          data.message || "ConnectAI abhi busy hai (quota limit). 20-30 sec baad retry karo."
        );
      }
      if (!r.ok) {
        throw new Error(
          data.message || data.error || "ConnectAI abhi respond nahi kar paaya — dubara try karo."
        );
      }
      if (typeof data.text !== "string") {
        throw new Error("Unexpected response — dubara try karo.");
      }
      return data.text;
    }

    function addBubble(text, who) {
      const d = document.createElement("div");
      d.className = "bubble " + (who === "ai" ? "ai" : "user");
      d.textContent = text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function addChips(items, handler) {
      const row = document.createElement("div");
      row.className = "chips";
      items.forEach((t) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip";
        b.textContent = t;
        b.onclick = () => handler(t);
        row.appendChild(b);
      });
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function toCategory(raw) {
      const s = String(raw || "").toLowerCase().replace(/\s+/g, "_");
      if (s.includes("cater")) return "caterer";
      if (s.includes("decor")) return "decorator";
      if (s.includes("photo")) return "photographer";
      if (s.includes("venue")) return "venue";
      if (s.includes("band")) return "band_baja";
      return s;
    }

    function parseGuestCount(text) {
      const n = Number(String(text || "").replace(/[^\d]/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function computeRequiredCategories(p) {
      const set = new Set();
      const selected = toCategory(p.category || "");
      if (selected && selected !== "full_package") set.add(selected);
      const guests = parseGuestCount(p.guestCount);
      if (selected === "full_package" || guests >= 150) {
        set.add("caterer");
        set.add("decorator");
      }
      const event = String(p.eventType || "").toLowerCase();
      if (event.includes("wedding")) {
        set.add("caterer");
        set.add("decorator");
        set.add("photographer");
      }
      if (event.includes("corporate")) {
        set.add("caterer");
        set.add("venue");
      }
      if (String(p.specialReq || "").toLowerCase().includes("mandap")) {
        set.add("decorator");
      }
      if (!set.size) set.add("caterer");
      return [...set];
    }

    function normalizeVendor(v) {
      return {
        id: v.id,
        name: v.name || "Unknown vendor",
        rating: Number(v.rating || 0),
        category: toCategory(v.category || ""),
        city: v.city || v.area || "N/A",
        area: v.area || v.city || "N/A",
        priceRange: v.priceRange || (v.minPrice != null && v.maxPrice != null ? `₹${v.minPrice} - ₹${v.maxPrice}` : "On request"),
      };
    }

    async function fetchVendors(p) {
      const ref = collection(db, "vendors");
      const attempts = [
        () => query(ref, where("isAvailable", "==", true), orderBy("rating", "desc"), limit(80)),
        () => query(ref, where("isActive", "==", true), orderBy("rating", "desc"), limit(80)),
        () => query(ref, limit(120)),
      ];
      const reqCats = computeRequiredCategories(p);
      const cityFilter = String(p.city || "").toLowerCase();
      for (const build of attempts) {
        try {
          const snap = await getDocs(build());
          if (!snap.empty) {
            const rows = snap.docs.map((d) => normalizeVendor({ id: d.id, ...d.data() }));
            const cityRows = cityFilter ? rows.filter((v) => String(v.city || "").toLowerCase().includes(cityFilter) || String(v.area || "").toLowerCase().includes(cityFilter)) : rows;
            const scoped = cityRows.filter((v) => reqCats.includes(v.category));
            const finalRows = (scoped.length ? scoped : cityRows).sort((a, b) => (b.rating || 0) - (a.rating || 0));
            if (finalRows.length) return finalRows.slice(0, 60);
          }
        } catch (_) { /* try next */ }
      }
      const snap = await getDocs(query(ref, limit(120)));
      return snap.docs.map((d) => normalizeVendor({ id: d.id, ...d.data() })).slice(0, 40);
    }

    async function runConnectAI(p, vlist) {
      const requiredCategories = computeRequiredCategories(p);
      const vendorCatalog = vlist.slice(0, 50).map((x) => ({
        id: x.id,
        name: x.name,
        rating: x.rating,
        category: x.category,
        city: x.city || x.area,
        priceRange: x.priceRange,
      }));
      const prompt = `You are ConnectAI (StadiumConnect India), a professional package consultant in Hinglish.
User needs:
${JSON.stringify(p, null, 2)}
Required categories for package:
${JSON.stringify(requiredCategories)}

Use ONLY these vendors from app data:
${JSON.stringify(vendorCatalog, null, 2)}

Task:
1) Build 5 or 6 package options.
2) Packages must combine multiple vendors where needed (for example catering + decorator for bigger events).
3) Mention estimated total price and simple breakup.
4) Keep package names professional and practical.
5) If user gave guestCount, include per-guest hint whenever possible.
6) Do NOT invent vendors outside the list.

Return ONLY valid JSON:
{
  "message": "1-2 line intro",
  "packages": [
    {
      "rank": 1,
      "packageName": "Premium Wedding Smart Pack",
      "idealFor": "Who this package suits",
      "estimatedTotal": "₹4.2L - ₹4.8L",
      "perGuestEstimate": "₹850 - ₹950",
      "vendors": [
        {
          "vendorId": "",
          "vendorName": "",
          "category": "",
          "city": "",
          "priceRange": "",
          "rating": 4.5,
          "whyIncluded": ""
        }
      ],
      "costBreakup": [
        { "category": "caterer", "estimate": "₹2.8L", "note": "500 guests meal plan" }
      ],
      "highlights": ["", ""],
      "tradeOff": "One realistic limitation",
      "bookingTip": "One practical booking tip"
    }
  ],
  "myPick": {
    "packageName": "",
    "reason": "",
    "totalEstimate": "",
    "nextStep": ""
  },
  "followUpQuestion": ""
}`;
      const raw = await callConnectAPI(prompt, { temperature: 0.25, maxOutputTokens: 1800 });
      const text = raw.replace(/```json|```/g, "").trim();
      const i = text.indexOf("{");
      const j = text.lastIndexOf("}");
      return JSON.parse(text.slice(i, j + 1));
    }

    function renderResults(data) {
      const wrap = document.createElement("div");
      const packages = Array.isArray(data.packages) ? data.packages.slice(0, 6) : [];
      packages.forEach((pkg, idx) => {
        const c = document.createElement("div");
        c.className = "card";
        const pkgVendors = Array.isArray(pkg.vendors) ? pkg.vendors.slice(0, 5) : [];
        const vendorsHtml = (pkg.vendors || []).slice(0, 5).map((v) => {
          return `• ${v.vendorName || "Vendor"} (${v.category || "service"}) · ${v.priceRange || "On request"} · ⭐${v.rating || "-"}`;
        }).join("<br/>");
        const breakupHtml = (pkg.costBreakup || []).slice(0, 5).map((x) => {
          return `• ${x.category || "service"}: ${x.estimate || "—"}${x.note ? ` (${x.note})` : ""}`;
        }).join("<br/>");
        const highlights = (pkg.highlights || []).slice(0, 3).join(" | ");
        c.innerHTML = `
          <strong>#${pkg.rank || idx + 1} ${pkg.packageName || "Custom package"}</strong><br/>
          <small>${pkg.idealFor || "Customized for your requirement"}</small><br/>
          💰 <strong>${pkg.estimatedTotal || "Estimate on request"}</strong>${pkg.perGuestEstimate ? ` <br/>👤 Per guest: ${pkg.perGuestEstimate}` : ""}<br/><br/>
          <strong>Included vendors:</strong><br/>${vendorsHtml || "Vendor list finalizing..."}<br/><br/>
          <strong>Cost breakup:</strong><br/>${breakupHtml || "Custom breakup on confirmation"}<br/><br/>
          ${highlights ? `✨ ${highlights}<br/>` : ""}
          ${pkg.tradeOff ? `<em>Trade-off: ${pkg.tradeOff}</em><br/>` : ""}
          ${pkg.bookingTip ? `<em>💡 Tip: ${pkg.bookingTip}</em>` : ""}
        `;
        const btn = document.createElement("button");
        btn.className = "book";
        btn.textContent = "Book this package →";
        btn.onclick = () => (location.href = "vendors.html");
        c.appendChild(btn);

        if (pkgVendors.length) {
          const vendorActions = document.createElement("div");
          vendorActions.className = "chips";
          vendorActions.style.marginTop = "10px";
          pkgVendors.forEach((v) => {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "chip";
            b.textContent = `${v.vendorName || "Vendor"} profile`;
            b.onclick = () => {
              const id = String(v.vendorId || "").trim();
              if (id) {
                location.href = `vendor-detail.html?id=${encodeURIComponent(id)}`;
              } else {
                location.href = "vendors.html";
              }
            };
            vendorActions.appendChild(b);
          });
          c.appendChild(vendorActions);
        }
        wrap.appendChild(c);
      });
      if (data.myPick && typeof data.myPick === "object") {
        const pick = document.createElement("div");
        pick.className = "card";
      pick.style.border = "2px solid #ff7a1a";
      pick.innerHTML = `<div style="color:#ff7a1a;font-weight:800">⭐ AI recommended package</div><strong>${data.myPick.packageName || "Best match package"}</strong><p>${data.myPick.reason || ""}</p><p>💰 ${data.myPick.totalEstimate || ""}</p><p>💡 ${data.myPick.nextStep || ""}</p>`;
        const b2 = document.createElement("button");
        b2.className = "book";
        b2.textContent = "Open vendors";
        b2.onclick = () => (location.href = "vendors.html");
        pick.appendChild(b2);
        wrap.appendChild(pick);
      }
      logEl.appendChild(wrap);
      addBubble(data.followUpQuestion || "Aur kuch?", "ai");
      addChips(["🔄 Naya Search", "📋 Vendors", "💬 Poochho", "🎯 Better budget package"], onChip);
    }

    async function onChip(chip) {
      addBubble(chip, "user");
      const clean = (s) => s.replace(/^[^\s]+\s+/, "").trim();

      if (chip === "🔄 Naya Search") {
        prefs = { category: "", city: "", guestCount: "", budget: "", eventType: "", specialReq: "" };
        step = "category";
        addBubble("Kaunsi primary service chahiye?", "ai");
        addChips(STEP_CHIPS.category, onChip);
        return;
      }
      if (chip.includes("Vendors")) { location.href = "vendors.html"; return; }
      if (chip.includes("Poochho")) { step = "free"; addBubble("Bolo! 😊", "ai"); return; }

      if (step === "category") {
        prefs.category = clean(chip).toLowerCase().replace(/\s+/g, "_");
        step = "city";
        addBubble(STEP_CITY, "ai");
        addChips(STEP_CHIPS.city, onChip);
        return;
      }
      if (step === "city") {
        prefs.city = clean(chip).replace(/^📍\s*/, "");
        step = "guests";
        addBubble("Kitne guests expected hain?", "ai");
        addChips(STEP_CHIPS.guests, onChip);
        return;
      }
      if (step === "guests") {
        prefs.guestCount = clean(chip).replace(/^👥\s*/, "");
        step = "budget";
        addBubble("Total budget range kya rakhna hai?", "ai");
        addChips(STEP_CHIPS.budget, onChip);
        return;
      }
      if (step === "budget") {
        prefs.budget = chip;
        step = "eventType";
        addBubble("Event type?", "ai");
        addChips(STEP_CHIPS.eventType, onChip);
        return;
      }
      if (step === "eventType") {
        prefs.eventType = clean(chip);
        step = "extras";
        addBubble("Koi special need? (mandap/theme/top-rated)", "ai");
        addChips(STEP_CHIPS.extras, onChip);
        return;
      }
      if (step === "extras") {
        prefs.specialReq = chip.includes("Skip") ? "" : clean(chip);
        const ty = document.createElement("p");
        ty.className = "typing";
        ty.textContent = "…soch raha hoon (ConnectAI)";
        logEl.appendChild(ty);
        try {
          vendors = await fetchVendors(prefs);
          if (!vendors.length) {
            ty.remove();
            addBubble("Is city ya requirement par abhi enough vendor data nahi mila — vendors page check karo.", "ai");
            return;
          }
          const ai = await runConnectAI(prefs, vendors);
          ty.remove();
          addBubble(ai.message, "ai");
          renderResults(ai);
        } catch (e) {
          ty.remove();
          addBubble("Error: " + (e.message || e), "ai");
        }
      }
    }

    function boot() {
      addBubble("Namaste! 🙏 Main aapke liye professional vendor packages banaunga. Pehle primary service chuno:", "ai");
      addChips(STEP_CHIPS.category, onChip);
    }
    boot();

    async function freeChatSend() {
      const t = freeText.value.trim();
      if (!t) return;
      addBubble(t, "user");
      freeText.value = "";
      const prompt = `You are ConnectAI (StadiumConnect). Hinglish. Context: ${JSON.stringify(prefs)} Vendors: ${JSON.stringify(vendors.slice(0,8))} User: ${t}  Reply short. [CHIP: a] [CHIP: b] end with max 2 chips.`;
      try {
        const text = await callConnectAPI(prompt, { maxOutputTokens: 400, temperature: 0.5 });
        const chips = [];
        for (const m of text.matchAll(/\[CHIP:([^\]]+)\]/g)) chips.push(m[1]);
        const reply = text.replace(/\[CHIP:[^\]]+\]/g, "").trim();
        addBubble(reply || "Arre, kuch clear nahi aaya — dubara short mein poochho.", "ai");
        if (chips.length) addChips(chips, (c) => addBubble("Selected: " + c, "user"));
      } catch (e) {
        addBubble(e.message || "Kuch garbar ho gayi — dubara try karo.", "ai");
      }
    }
    sendBtn.addEventListener("click", freeChatSend);
    freeText.addEventListener("keydown", (e) => { if (e.key === "Enter") freeChatSend(); });
  </script>
</body>
</html>
