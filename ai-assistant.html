<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectAI | StadiumConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #fafafa; color: #222; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header a { color: #fff; text-decoration: underline; font-size: 14px; }
    #log { flex: 1; overflow-y: auto; padding: 16px; max-width: 560px; margin: 0 auto; width: 100%; }
    .bubble { margin: 10px 0; padding: 12px 14px; border-radius: 14px; max-width: 92%; line-height: 1.45; font-size: 14px; }
    .ai { background: #fff0ea; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: #ff6b35; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 16px; }
    .chip {
      background: #fff0ea;
      border: 1px solid #ff6b35;
      color: #ff6b35;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .chip:hover { opacity: 0.9; }
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .book { background: #ff6b35; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; width: 100%; }
    footer {
      border-top: 1px solid #eee;
      padding: 12px;
      display: flex;
      gap: 8px;
      background: #fff;
      align-items: center;
    }
    footer input { flex: 1; padding: 10px 14px; border-radius: 22px; border: 1px solid #ddd; font-size: 14px; }
    footer button {
      background: #ff6b35;
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .typing { color: #888; font-style: italic; margin: 8px 0; }
    h1 { font-size: 18px; font-weight: 800; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ConnectAI</h1>
      <div style="opacity:0.9;font-size:12px;margin-top:4px">StadiumConnect — sirf vendors, events, city &amp; budget</div>
    </div>
    <a href="home.html">← Home</a>
  </header>
  <div id="log"></div>
  <footer>
    <input type="text" id="freeText" placeholder="Vendors / city / budget poochho…" />
    <button type="button" id="sendBtn" title="Send">➤</button>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
      authDomain: "stadiumconnect-8fecb.firebaseapp.com",
      projectId: "stadiumconnect-8fecb",
      storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
      messagingSenderId: "458108198578",
      appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };

    /* Vercel: full app URL jahan /api deploy hai. Same Vercel pe ai-assistant host ho to "" rehne do. GitHub Pages / alag host pe: "https://tumhara-proj.vercel.app" */
    const VERCEL_CONNECTAI_ORIGIN = "";
    const CONNECTAI_URL = VERCEL_CONNECTAI_ORIGIN
      ? `${VERCEL_CONNECTAI_ORIGIN.replace(/\/$/, "")}/api/connect-ai`
      : new URL("/api/connect-ai", window.location.origin).href;
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logEl = document.getElementById("log");
    const freeText = document.getElementById("freeText");
    const sendBtn = document.getElementById("sendBtn");

    let prefs = { category: "", city: "", budget: "", eventType: "", specialReq: "" };
    let vendors = [];
    let step = "category";
    const STEP_CITY = "Aapka city?";

    const STEP_CHIPS = {
      category: ["🎨 Decorator", "📸 Photographer", "🍽️ Caterer", "🎵 Band Baja", "🏛️ Venue", "✨ Full Package"],
      city: ["📍 Nagpur", "📍 Mumbai", "📍 Pune", "📍 Delhi", "📍 Other"],
      budget: ["💰 Under ₹10,000", "💰 ₹10K - ₹50K", "💰 ₹50K - ₹1L", "💰 ₹1L - ₹5L", "💰 ₹5L+"],
      eventType: ["💍 Wedding", "🎂 Birthday", "🏢 Corporate", "🎉 Anniversary"],
      extras: ["⭐ Top Rated Only", "✅ Skip - Show Results"],
    };

    async function callConnectAPI(prompt, generationConfig = {}) {
      const r = await fetch(CONNECTAI_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, generationConfig }),
      });
      let data = {};
      try {
        data = await r.json();
      } catch (_) {}
      if (r.status === 503 || data.error === "connectAI_not_configured") {
        throw new Error(
          "Abhi ConnectAI server pe setup pending hai — thodi der baad try karo ya support se contact karo."
        );
      }
      if (!r.ok) {
        throw new Error(
          data.message || data.error || "ConnectAI abhi respond nahi kar paaya — dubara try karo."
        );
      }
      if (typeof data.text !== "string") {
        throw new Error("Unexpected response — dubara try karo.");
      }
      return data.text;
    }

    function addBubble(text, who) {
      const d = document.createElement("div");
      d.className = "bubble " + (who === "ai" ? "ai" : "user");
      d.textContent = text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function addChips(items, handler) {
      const row = document.createElement("div");
      row.className = "chips";
      items.forEach((t) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip";
        b.textContent = t;
        b.onclick = () => handler(t);
        row.appendChild(b);
      });
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function fetchVendors(p) {
      const cat = (p.category || "caterer").trim();
      const ref = collection(db, "vendors");
      const attempts = [
        () => query(ref, where("category", "==", cat), where("isActive", "==", true), orderBy("rating", "desc"), limit(15)),
        () => query(ref, where("category", "==", cat), where("isAvailable", "==", true), limit(25)),
        () => query(ref, where("isAvailable", "==", true), limit(30)),
      ];
      for (const build of attempts) {
        try {
          const snap = await getDocs(build());
          if (!snap.empty) {
            return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          }
        } catch (_) { /* try next */ }
      }
      const snap = await getDocs(query(ref, limit(30)));
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    }

    async function runConnectAI(p, vlist) {
      const prompt = `You are ConnectAI, StadiumConnect's assistant in India. Hinglish. USER: ${JSON.stringify(p)} VENDORS: ${JSON.stringify(vlist.slice(0, 12).map(x => ({ id: x.id, name: x.name, rating: x.rating, category: x.category, city: x.city || x.area, priceRange: x.priceRange })))}
Return ONLY valid JSON:
{"message":"...","top3":[{"vendorId":"","vendorName":"","rank":1,"whyPicked":"","matchScore":90,"priceRange":"","rating":4.5,"city":"","category":""}],"myPick":{"vendorId":"","vendorName":"","reason":"","tip":""},"followUpQuestion":"..."}`;
      const raw = await callConnectAPI(prompt, { temperature: 0.3, maxOutputTokens: 1200 });
      const text = raw.replace(/```json|```/g, "").trim();
      const i = text.indexOf("{");
      const j = text.lastIndexOf("}");
      return JSON.parse(text.slice(i, j + 1));
    }

    function renderResults(data) {
      const wrap = document.createElement("div");
      (data.top3 || []).forEach((v) => {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `<strong>#${v.rank} ${v.vendorName}</strong><br/><small>${v.category} · ⭐${v.rating}</small><br/>📍 ${v.city}<br/>💰 ${v.priceRange}<br/><em>💡 ${v.whyPicked}</em>`;
        const btn = document.createElement("button");
        btn.className = "book";
        btn.textContent = "View vendors page →";
        btn.onclick = () => (location.href = "vendors.html");
        c.appendChild(btn);
        wrap.appendChild(c);
      });
      const pick = document.createElement("div");
      pick.className = "card";
      pick.style.border = "2px solid #ff6b35";
      pick.innerHTML = `<div style="color:#ff6b35;font-weight:800">⭐ AI pick</div><strong>${data.myPick.vendorName}</strong><p>${data.myPick.reason}</p><p>💡 ${data.myPick.tip}</p>`;
      const b2 = document.createElement("button");
      b2.className = "book";
      b2.textContent = "Open vendors";
      b2.onclick = () => (location.href = "vendors.html");
      pick.appendChild(b2);
      wrap.appendChild(pick);
      logEl.appendChild(wrap);
      addBubble(data.followUpQuestion || "Aur kuch?", "ai");
      addChips(["🔄 Naya Search", "📋 Vendors", "💬 Poochho"], onChip);
    }

    async function onChip(chip) {
      addBubble(chip, "user");
      const clean = (s) => s.replace(/^[^\s]+\s+/, "").trim();

      if (chip === "🔄 Naya Search") {
        prefs = { category: "", city: "", budget: "", eventType: "", specialReq: "" };
        step = "category";
        addBubble("Kaunsi service?", "ai");
        addChips(STEP_CHIPS.category, onChip);
        return;
      }
      if (chip.includes("Vendors")) { location.href = "vendors.html"; return; }
      if (chip.includes("Poochho")) { step = "free"; addBubble("Bolo! 😊", "ai"); return; }

      if (step === "category") {
        prefs.category = clean(chip).toLowerCase().replace(/\s+/g, "_");
        step = "city";
        addBubble(STEP_CITY, "ai");
        addChips(STEP_CHIPS.city, onChip);
        return;
      }
      if (step === "city") {
        prefs.city = clean(chip).replace(/^📍\s*/, "");
        step = "budget";
        addBubble("Budget?", "ai");
        addChips(STEP_CHIPS.budget, onChip);
        return;
      }
      if (step === "budget") {
        prefs.budget = chip;
        step = "eventType";
        addBubble("Event type?", "ai");
        addChips(STEP_CHIPS.eventType, onChip);
        return;
      }
      if (step === "eventType") {
        prefs.eventType = clean(chip);
        step = "extras";
        addBubble("Extra filter?", "ai");
        addChips(STEP_CHIPS.extras, onChip);
        return;
      }
      if (step === "extras") {
        prefs.specialReq = chip.includes("Skip") ? "" : clean(chip);
        const ty = document.createElement("p");
        ty.className = "typing";
        ty.textContent = "…soch raha hoon (ConnectAI)";
        logEl.appendChild(ty);
        try {
          vendors = await fetchVendors(prefs);
          if (!vendors.length) {
            ty.remove();
            addBubble("Is category/city par abhi data kam hai — vendors.html dekho.", "ai");
            return;
          }
          const ai = await runConnectAI(prefs, vendors);
          ty.remove();
          addBubble(ai.message, "ai");
          renderResults(ai);
        } catch (e) {
          ty.remove();
          addBubble("Error: " + (e.message || e), "ai");
        }
      }
    }

    function boot() {
      addBubble("Namaste! 🙏 Service chuno:", "ai");
      addChips(STEP_CHIPS.category, onChip);
    }
    boot();

    async function freeChatSend() {
      const t = freeText.value.trim();
      if (!t) return;
      addBubble(t, "user");
      freeText.value = "";
      const prompt = `You are ConnectAI (StadiumConnect). Hinglish. Context: ${JSON.stringify(prefs)} Vendors: ${JSON.stringify(vendors.slice(0,8))} User: ${t}  Reply short. [CHIP: a] [CHIP: b] end with max 2 chips.`;
      try {
        const text = await callConnectAPI(prompt, { maxOutputTokens: 400, temperature: 0.5 });
        const chips = [];
        for (const m of text.matchAll(/\[CHIP:([^\]]+)\]/g)) chips.push(m[1]);
        const reply = text.replace(/\[CHIP:[^\]]+\]/g, "").trim();
        addBubble(reply || "Arre, kuch clear nahi aaya — dubara short mein poochho.", "ai");
        if (chips.length) addChips(chips, (c) => addBubble("Selected: " + c, "user"));
      } catch (e) {
        addBubble(e.message || "Kuch garbar ho gayi — dubara try karo.", "ai");
      }
    }
    sendBtn.addEventListener("click", freeChatSend);
    freeText.addEventListener("keydown", (e) => { if (e.key === "Enter") freeChatSend(); });
  </script>
</body>
</html>
