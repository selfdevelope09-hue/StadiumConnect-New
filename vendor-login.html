<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #ff6b35, #ff9068); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .logo span { color: #ff6b35; }
        .badge { background: #ff6b35; color: white; font-size: 12px; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-left: 8px; }
        h2 { margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 16px; font-size: 15px; }
        button { width: 100%; background: #ff6b35; color: white; border: none; padding: 14px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error { color: red; margin-top: 15px; display: none; }
        .back-link { margin-top: 20px; }
        .back-link a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">STADIUM<span>CONNECT</span><span class="badge">Vendor</span></div>
        <h2>Vendor Login</h2>
        <div class="subtitle">Enter your credentials</div>
        <div id="error" class="error"></div>
        <input type="text" id="vendorId" placeholder="Vendor ID (e.g., VEN00001)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login →</button>
        <div class="back-link"><a href="index.html">← Back to Home</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function login() {
            const vendorId = document.getElementById('vendorId').value.trim();
            const password = document.getElementById('password').value;
            
            if (!vendorId || !password) {
                showError('Please enter Vendor ID and Password');
                return;
            }
            
            const q = query(collection(db, "vendors"), where("vendorId", "==", vendorId));
            const snapshot = await getDocs(q);
            
            let vendor = null;
            snapshot.forEach(doc => { vendor = { id: doc.id, ...doc.data() }; });
            
            if (vendor && vendor.password === password) {
                localStorage.setItem('vendorId', vendor.vendorId);
                localStorage.setItem('vendorDocId', vendor.id);
                window.location.href = `vendor-dashboard.html?id=${vendor.id}`;
            } else {
                showError('Invalid Vendor ID or Password');
            }
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
