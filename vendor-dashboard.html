<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; }
        
        .header {
            background: white;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #ff6b35, #ff9068); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .vendor-badge { background: #fff5f0; padding: 8px 20px; border-radius: 40px; color: #ff6b35; font-weight: 600; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .refresh-btn { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-right: 10px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; }
        .stat-label { color: #666; margin-top: 8px; }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card h3 { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-primary { background: #ff6b35; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 600; font-size: 13px; background: #fafafa; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .logo-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; margin-top: 10px; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">🏟️ STADIUM<span>CONNECT</span></div>
    <div>
        <span class="vendor-badge" id="vendorNameDisplay">Loading...</span>
        <button class="refresh-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<div class="container">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="totalBookings">0</div><div class="stat-label">Total Bookings</div></div>
        <div class="stat-card"><div class="stat-value" id="confirmedBookings">0</div><div class="stat-label">Confirmed</div></div>
        <div class="stat-card"><div class="stat-value" id="totalRevenue">₹0</div><div class="stat-label">Total Revenue</div></div>
        <div class="stat-card"><div class="stat-value" id="totalCommission">₹0</div><div class="stat-label">Your Commission (2.5%)</div></div>
    </div>

    <!-- Earnings Chart -->
    <div class="card">
        <h3><i class="fas fa-chart-line"></i> Earnings Overview</h3>
        <canvas id="earningsChart" style="max-height: 300px;"></canvas>
    </div>

    <!-- Edit Vendor Details -->
    <div class="card">
        <h3><i class="fas fa-edit"></i> Edit Your Profile</h3>
        <div class="form-row">
            <div class="form-group"><label>Business Name</label><input type="text" id="vendorName"></div>
            <div class="form-group"><label>Category</label><input type="text" id="vendorCategory" readonly style="background:#f5f5f5;"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" id="vendorCity"></div>
            <div class="form-group"><label>Price Range</label><input type="text" id="vendorPrice" placeholder="₹50,000 - ₹2,00,000"></div>
        </div>
        <div class="form-group"><label>Location / Address</label><input type="text" id="vendorLocation"></div>
        <div class="form-group"><label>Description</label><textarea id="vendorDescription" rows="3"></textarea></div>
        <div class="form-row">
            <div class="form-group"><label>Contact Phone</label><input type="tel" id="vendorPhone"></div>
            <div class="form-group"><label>Email</label><input type="email" id="vendorEmail"></div>
        </div>
        <div class="form-group">
            <label>Logo / Profile Photo</label>
            <input type="file" id="vendorLogo" accept="image/*">
            <div id="logoPreview" class="logo-img"></div>
        </div>
        <button class="btn-primary" onclick="updateVendor()"><i class="fas fa-save"></i> Update Profile</button>
    </div>

    <!-- Recent Bookings -->
    <div class="card">
        <h3><i class="fas fa-bookings"></i> Recent Bookings</h3>
        <div style="overflow-x:auto;">
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Customer Name</th>
                        <th>Phone</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Your Commission</th>
                        <th>Status</th>
                    </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="7" style="text-align:center;">Loading bookings...</td></tr>
                </tbody>
             </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.appspot.com",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const urlParams = new URLSearchParams(window.location.search);
    const vendorId = urlParams.get('id');
    
    let vendor = null;
    let allBookings = [];
    let earningsChart = null;

    function calculateCommission(amount) {
        const price = parseInt(String(amount).replace(/[₹,]/g, '')) || 0;
        return Math.floor(price * 0.025);
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#dc3545' : '#28a745';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadVendor() {
        if (!vendorId) {
            showToast('Invalid access. Please login again.', true);
            setTimeout(() => window.location.href = 'vendor-login.html', 1500);
            return;
        }
        
        try {
            const docSnap = await getDoc(doc(db, 'vendors', vendorId));
            if (docSnap.exists()) {
                vendor = { id: docSnap.id, ...docSnap.data() };
                
                // Update header
                const categoryNames = {
                    decorator: '🎨 Decorator',
                    photographer: '📸 Photographer',
                    caterer: '🍽️ Caterer',
                    bandbaja: '🎵 Band Baja'
                };
                document.getElementById('vendorNameDisplay').innerHTML = `<i class="fas fa-store"></i> ${vendor.name || 'Vendor'} (${categoryNames[vendor.category] || vendor.category})`;
                
                // Fill form fields
                document.getElementById('vendorName').value = vendor.name || '';
                document.getElementById('vendorCategory').value = categoryNames[vendor.category] || vendor.category;
                document.getElementById('vendorCity').value = vendor.city || '';
                document.getElementById('vendorPrice').value = vendor.priceRange || '';
                document.getElementById('vendorLocation').value = vendor.location || '';
                document.getElementById('vendorDescription').value = vendor.description || '';
                document.getElementById('vendorPhone').value = vendor.phone || '';
                document.getElementById('vendorEmail').value = vendor.email || '';
                
                // Show logo preview
                if (vendor.imageUrl) {
                    document.getElementById('logoPreview').innerHTML = `<img src="${vendor.imageUrl}" style="width:80px;height:80px;border-radius:12px;object-fit:cover;">`;
                }
                
                await loadBookings();
                updateStats();
                renderChart();
            } else {
                showToast('Vendor not found!', true);
                setTimeout(() => window.location.href = 'vendor-login.html', 1500);
            }
        } catch(error) {
            console.error("Error loading vendor:", error);
            showToast('Error loading data', true);
        }
    }
    
    async function loadBookings() {
        try {
            const q = query(
                collection(db, "bookings"),
                where("vendorId", "==", vendorId),
                orderBy("createdAt", "desc")
            );
            const snapshot = await getDocs(q);
            allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const tableBody = document.getElementById('bookingsTableBody');
            if (allBookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No bookings yet</td></tr>';
                return;
            }
            
            tableBody.innerHTML = allBookings.map(b => `
                <tr>
                    <td>${b.id.slice(-8)}</td>
                    <td><strong>${b.userName || '-'}</strong></td>
                    <td>${b.userPhone || '-'}</td>
                    <td>${b.eventDate || '-'}</td>
                    <td>₹${(parseInt(String(b.amount).replace(/[₹,]/g,''))||0).toLocaleString()}</td>
                    <td class="revenue-cell">₹${calculateCommission(b.amount).toLocaleString()}</td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                </tr>
            `).join('');
        } catch(error) {
            console.error("Error loading bookings:", error);
        }
    }
    
    function updateStats() {
        const confirmedBookings = allBookings.filter(b => b.status === 'confirmed');
        const totalRevenue = confirmedBookings.reduce((sum, b) => sum + (parseInt(String(b.amount).replace(/[₹,]/g,''))||0), 0);
        const totalCommission = calculateCommission(totalRevenue);
        
        document.getElementById('totalBookings').innerHTML = allBookings.length;
        document.getElementById('confirmedBookings').innerHTML = confirmedBookings.length;
        document.getElementById('totalRevenue').innerHTML = `₹${totalRevenue.toLocaleString()}`;
        document.getElementById('totalCommission').innerHTML = `₹${totalCommission.toLocaleString()}`;
    }
    
    function renderChart() {
        const confirmed = allBookings.filter(b => b.status === 'confirmed');
        const monthly = {};
        confirmed.forEach(b => {
            if(b.createdAt) {
                let m = new Date(b.createdAt).toLocaleString('default', {month:'short'});
                monthly[m] = (monthly[m]||0) + (parseInt(String(b.amount).replace(/[₹,]/g,''))||0);
            }
        });
        
        if(earningsChart) earningsChart.destroy();
        const ctx = document.getElementById('earningsChart').getContext('2d');
        earningsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Object.keys(monthly),
                datasets: [{
                    label: 'Revenue (₹)',
                    data: Object.values(monthly),
                    borderColor: '#ff6b35',
                    backgroundColor: 'rgba(255,107,53,0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }
    
    async function uploadImage(file, path) {
        if(!file) return null;
        try {
            const storageRef = ref(storage, `${path}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        } catch(e) { return null; }
    }
    
    window.updateVendor = async () => {
        const data = {
            name: document.getElementById('vendorName').value,
            city: document.getElementById('vendorCity').value,
            priceRange: document.getElementById('vendorPrice').value,
            location: document.getElementById('vendorLocation').value,
            description: document.getElementById('vendorDescription').value,
            phone: document.getElementById('vendorPhone').value,
            email: document.getElementById('vendorEmail').value,
            updatedAt: new Date().toISOString()
        };
        
        // Upload logo if selected
        const logoFile = document.getElementById('vendorLogo').files[0];
        if(logoFile) {
            const logoUrl = await uploadImage(logoFile, 'vendors/logos');
            if(logoUrl) data.imageUrl = logoUrl;
        }
        
        await updateDoc(doc(db, 'vendors', vendorId), data);
        showToast('Profile updated successfully! Changes will reflect immediately.');
        loadVendor();
    };
    
    window.refreshData = () => {
        loadVendor();
        showToast('Data refreshed!');
    };
    
    window.logout = () => {
        sessionStorage.clear();
        window.location.href = 'vendor-login.html';
    };
    
    // Initialize
    loadVendor();
</script>
</body>
</html>
