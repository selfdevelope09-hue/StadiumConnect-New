<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vendor Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        
        .header {
            background: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .vendor-info { background: #fff5f0; padding: 8px 20px; border-radius: 40px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .vendor-id { font-weight: 700; color: #ff6b35; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 20px; padding: 24px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .tab { background: none; border: none; padding: 8px 20px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 30px; }
        .tab.active { background: #ff6b35; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .btn-accept { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 16px; }
        .photo-grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
        .photo-item { width: 100px; height: 100px; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #eee; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { background: #f0f0f0; border: 1px dashed #ccc; padding: 12px 20px; border-radius: 12px; cursor: pointer; text-align: center; }
        .earnings-card { background: linear-gradient(135deg, #ff6b35, #ff9068); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .earnings-amount { font-size: 36px; font-weight: 800; }
        
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const vendorDocId = urlParams.get('id') || localStorage.getItem('vendorDocId');
        
        if (!vendorDocId) window.location.href = 'vendor-login.html';

        let currentVendor = null;
        let bookings = [];
        let workPhotos = [];

        async function loadVendor() {
            const vendorDoc = await getDoc(doc(db, 'vendors', vendorDocId));
            if (vendorDoc.exists()) {
                currentVendor = { id: vendorDoc.id, ...vendorDoc.data() };
                workPhotos = currentVendor.photos || [];
                document.getElementById('vendorId').innerText = currentVendor.vendorId || currentVendor.id;
                document.getElementById('vendorName').innerText = currentVendor.name || 'Vendor';
                renderProfile();
                loadBookings();
                loadStats();
            }
        }

        async function loadBookings() {
            const q = query(collection(db, "bookings"), where("vendorId", "==", currentVendor.id));
            const snapshot = await getDocs(q);
            bookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderBookings();
        }

        function renderBookings() {
            const tbody = document.getElementById('bookingsTableBody');
            if (!bookings.length) { tbody.innerHTML = '.<td colspan="5">No bookings.<'; return; }
            tbody.innerHTML = bookings.map(b => `
                <tr>
                    <td>${b.id?.slice(-6)}</td><td>${b.eventDate || '-'}</td><td>${b.eventType || '-'}</td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                    <td>${b.status === 'pending' ? `<button class="btn-accept" onclick="updateStatus('${b.id}','confirmed')">Accept</button><button class="btn-reject" onclick="updateStatus('${b.id}','cancelled')">Reject</button>` : '-'}</td>
                 </td>
            `).join('');
        }

        window.updateStatus = async (id, status) => {
            await updateDoc(doc(db, 'bookings', id), { status });
            alert(`Booking ${status}!`);
            loadBookings();
            loadStats();
        };

        function loadStats() {
            const confirmed = bookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
            const totalRevenue = confirmed.reduce((s, b) => s + (parseInt(String(b.amount).replace(/[₹,]/g, '')) || 0), 0);
            document.getElementById('totalBookings').innerText = bookings.length;
            document.getElementById('confirmedBookings').innerText = confirmed.length;
            document.getElementById('totalEarnings').innerHTML = `₹${totalRevenue.toLocaleString()}`;
            document.getElementById('pendingPayout').innerHTML = `₹${Math.floor(totalRevenue * 0.1).toLocaleString()}`;
        }

        function renderProfile() {
            document.getElementById('profileName').value = currentVendor.name || '';
            document.getElementById('profileCategory').value = currentVendor.category || '';
            document.getElementById('profileCity').value = currentVendor.city || '';
            document.getElementById('profileLocation').value = currentVendor.location || '';
            document.getElementById('profilePrice').value = currentVendor.priceRange || '';
            document.getElementById('profilePhone').value = currentVendor.phone || '';
            document.getElementById('profileDescription').value = currentVendor.description || '';
            document.getElementById('profileLogo').src = currentVendor.imageUrl || 'https://via.placeholder.com/80';
            renderWorkPhotos();
        }

        function renderWorkPhotos() {
            const container = document.getElementById('workPhotosPreview');
            container.innerHTML = workPhotos.map((p, i) => `<div class="photo-item"><img src="${p}"><button class="remove" onclick="removePhoto(${i})" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:22px;">×</button></div>`).join('');
        }

        window.removePhoto = (i) => { workPhotos.splice(i,1); renderWorkPhotos(); };
        
        window.saveProfile = async () => {
            const data = {
                name: document.getElementById('profileName').value,
                category: document.getElementById('profileCategory').value,
                city: document.getElementById('profileCity').value,
                location: document.getElementById('profileLocation').value,
                priceRange: document.getElementById('profilePrice').value,
                phone: document.getElementById('profilePhone').value,
                description: document.getElementById('profileDescription').value,
                photos: workPhotos,
                updatedAt: new Date().toISOString()
            };
            await updateDoc(doc(db, 'vendors', vendorDocId), data);
            alert('Profile updated!');
        };

        window.requestPayout = () => alert('Payout request sent!');

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        };
        
        window.logout = () => { localStorage.clear(); window.location.href = 'vendor-login.html'; };
        
        loadVendor();
        onSnapshot(query(collection(db, "bookings"), where("vendorId", "==", vendorDocId)), () => { loadBookings(); loadStats(); });
    </script>
</head>
<body>
    <header class="header">
        <div class="logo">STADIUM<span>CONNECT</span></div>
        <div class="vendor-info"><i class="fas fa-store"></i><span class="vendor-id" id="vendorId">VEN00001</span><span id="vendorName">Vendor</span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalBookings">0</div><div>Total Bookings</div></div>
            <div class="stat-card"><div class="stat-value" id="confirmedBookings">0</div><div>Confirmed</div></div>
            <div class="stat-card"><div class="stat-value" id="totalEarnings">₹0</div><div>Total Earnings</div></div>
            <div class="stat-card"><div class="stat-value" id="pendingPayout">₹0</div><div>Pending Payout</div></div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('bookings')">📋 Bookings</button>
            <button class="tab" onclick="switchTab('earnings')">💰 Earnings</button>
            <button class="tab" onclick="switchTab('profile')">📝 Profile</button>
        </div>
        <div id="bookingsTab" class="tab-content active"><div class="card"><div class="card-title">📋 Booking Requests</div><div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Date</th><th>Type</th><th>Status</th><th>Action</th></tr></thead><tbody id="bookingsTableBody"></tbody></table></div></div></div>
        <div id="earningsTab" class="tab-content"><div class="earnings-card"><div>Total Earnings</div><div class="earnings-amount" id="totalEarningsLarge">₹0</div><button class="payout-btn" onclick="requestPayout()" style="background:white; color:#ff6b35; border:none; padding:10px 20px; border-radius:30px; margin-top:10px;">Request Payout</button></div></div>
        <div id="profileTab" class="tab-content"><div class="card"><div class="card-title">📝 Business Profile</div>
            <div class="form-group"><label>Business Name</label><input type="text" id="profileName"></div>
            <div class="form-group"><label>Category</label><input type="text" id="profileCategory"></div>
            <div class="form-group"><label>City</label><input type="text" id="profileCity"></div>
            <div class="form-group"><label>Location</label><input type="text" id="profileLocation"></div>
            <div class="form-group"><label>Price Range</label><input type="text" id="profilePrice"></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="profilePhone"></div>
            <div class="form-group"><label>Description</label><textarea id="profileDescription" rows="3"></textarea></div>
            <div class="form-group"><label>Logo</label><img id="profileLogo" style="width:80px; height:80px; border-radius:12px;"><input type="file" id="logoUpload"></div>
            <div class="form-group"><label>Work Photos</label><div id="workPhotosPreview" class="photo-grid"></div><div class="upload-btn" onclick="alert('ImgBB upload will be added')">+ Add Photos</div></div>
            <button onclick="saveProfile()" style="background:#ff6b35; color:white; border:none; padding:12px 24px; border-radius:30px;">Save Profile</button>
        </div></div>
    </div>
</body>
</html>
