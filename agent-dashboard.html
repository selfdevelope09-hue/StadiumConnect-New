<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agent Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        .header { background: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .agent-info { background: #fff5f0; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 24px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-value { font-size: 36px; font-weight: 800; color: #ff6b35; }
        .stat-label { color: #666; margin-top: 8px; }
        
        .section-card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 500; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #d4edda; color: #155724; }
        
        .progress-bar { background: #e0e0e0; border-radius: 20px; height: 10px; margin: 10px 0; }
        .progress-fill { background: #ff6b35; border-radius: 20px; height: 100%; width: 0%; }
        .target-amount { font-size: 24px; font-weight: 800; color: #ff6b35; }
        
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
            authDomain: "stadiumconnect-8fecb.firebaseapp.com",
            projectId: "stadiumconnect-8fecb",
            storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
            messagingSenderId: "458108198578",
            appId: "1:458108198578:web:83d83646f0e24e718b73ab"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const agentData = JSON.parse(localStorage.getItem('agent'));
        if (!agentData) window.location.href = 'agent-login.html';

        let allBookings = [];
        let allVendors = [];

        async function loadData() {
            const bookingsSnap = await getDocs(collection(db, 'bookings'));
            allBookings = bookingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const vendorsSnap = await getDocs(collection(db, 'vendors'));
            allVendors = vendorsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Filter bookings by agent ID
            const agentBookings = allBookings.filter(b => b.agentId === agentData.id);
            
            renderStats(agentBookings);
            renderBookings(agentBookings);
            renderTarget();
        }

        function renderStats(bookings) {
            const totalBookings = bookings.length;
            const confirmed = bookings.filter(b => b.status === 'confirmed').length;
            const completed = bookings.filter(b => b.status === 'completed').length;
            const totalRevenue = bookings.reduce((sum, b) => sum + (parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0), 0);
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${totalBookings}</div><div class="stat-label">Total Bookings</div></div>
                <div class="stat-card"><div class="stat-value">${confirmed}</div><div class="stat-label">Confirmed</div></div>
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>
                <div class="stat-card"><div class="stat-value">₹${totalRevenue.toLocaleString()}</div><div class="stat-label">Total Revenue</div></div>
            `;
        }

        function renderBookings(bookings) {
            const tbody = document.getElementById('bookingsTable');
            if (bookings.length === 0) { tbody.innerHTML = '<tr><td colspan="6">No bookings yet</td></tr>'; return; }
            tbody.innerHTML = bookings.map(b => `
                <tr>
                    <td>${b.id?.slice(-6)}</td>
                    <td><strong>${b.userName || '-'}</strong><br><small>${b.userPhone || '-'}</small></td>
                    <td>${b.vendorName || '-'}</td>
                    <td>${b.eventDate || '-'}<br><small>${b.eventType || '-'}</small></td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                    <td>₹${(parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function renderTarget() {
            const targetMonthly = 50000;
            const bookings = allBookings.filter(b => b.agentId === agentData.id);
            const earned = bookings.reduce((sum, b) => sum + (parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0), 0);
            const commission = Math.floor(earned * 0.1);
            const percent = Math.min(100, (earned / targetMonthly) * 100);
            
            document.getElementById('targetInfo').innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>🎯 Monthly Target: ₹${targetMonthly.toLocaleString()}</span>
                    <span>Achieved: ₹${earned.toLocaleString()} (${Math.floor(percent)}%)</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                <div style="margin-top: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                    <div><strong>💰 Your Commission (10%)</strong><br><span class="target-amount">₹${commission.toLocaleString()}</span></div>
                    <div><strong>📊 Next Target</strong><br>₹${(targetMonthly - earned).toLocaleString()} more to reach target</div>
                </div>
            `;
        }

        window.logout = () => {
            localStorage.removeItem('agent');
            window.location.href = 'agent-login.html';
        };

        document.getElementById('agentName').innerText = agentData.name || agentData.id;
        document.getElementById('agentIdDisplay').innerText = agentData.id;
        loadData();
    </script>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
        <div class="agent-info"><i class="fas fa-user-tie"></i> <span id="agentName"></span> | ID: <span id="agentIdDisplay"></span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="container">
        <div class="stats-grid" id="stats"></div>

        <div class="section-card">
            <div class="section-title"><i class="fas fa-bullseye"></i> My Performance</div>
            <div id="targetInfo"></div>
        </div>

        <div class="section-card">
            <div class="section-title"><i class="fas fa-calendar-check"></i> My Bookings</div>
            <div style="overflow-x: auto;">
                <table>
                    <thead> <tr><th>Booking ID</th><th>Customer</th><th>Vendor</th><th>Event Date</th><th>Status</th><th>Amount</th></tr> </thead>
                    <tbody id="bookingsTable"><tr><td colspan="6">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
