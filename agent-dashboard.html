<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agent Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        
        /* Header */
        .header {
            background: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .agent-info {
            background: #fff5f0;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .agent-name { font-weight: 700; color: #ff6b35; }
        .agent-id { background: #ff6b35; color: white; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        
        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; margin-bottom: 8px; }
        .stat-label { color: #666; font-size: 14px; }
        
        /* Target Card */
        .target-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .target-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 20px;
            height: 12px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #ff6b35;
            border-radius: 20px;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
        .target-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            flex-wrap: wrap;
            gap: 10px;
        }
        .remaining { color: #ff6b35; font-weight: 600; }
        
        /* Chart Card */
        .chart-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container { height: 250px; }
        
        /* Bookings Card */
        .bookings-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 500; font-size: 13px; text-transform: uppercase; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            th, td { font-size: 12px; padding: 8px; }
            .stats-grid { grid-template-columns: 1fr; }
            .agent-info { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="agent-info">
        <i class="fas fa-user-circle"></i>
        <span class="agent-name" id="agentName">Agent Name</span>
        <span class="agent-id" id="agentIdDisplay">AG00000</span>
        <span><i class="fas fa-map-marker-alt"></i> <span id="agentCity">-</span></span>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</header>

<div class="container">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Target Card -->
    <div class="target-card">
        <div class="target-title">
            <span><i class="fas fa-bullseye"></i> Monthly Target</span>
            <span id="targetAmount">₹0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="target-stats">
            <span>Achieved: <strong id="achievedAmount">₹0</strong></span>
            <span class="remaining" id="remainingAmount">Remaining: ₹0</span>
            <span id="percentageText">0% Completed</span>
        </div>
    </div>

    <!-- Earnings Chart -->
    <div class="chart-card">
        <div class="chart-title"><i class="fas fa-chart-line"></i> Your Earnings Trend (Monthly)</div>
        <div class="chart-container">
            <canvas id="earningsChart"></canvas>
        </div>
    </div>

    <!-- Bookings List -->
    <div class="bookings-card">
        <div class="section-title"><i class="fas fa-calendar-check"></i> My Bookings</div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Booking ID</th><th>Customer</th><th>Vendor</th><th>Event Date</th><th>Amount</th><th>Commission (2.5%)</th><th>Status</th>
                </thead>
                <tbody id="bookingsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get agent data from localStorage
    const agentData = JSON.parse(localStorage.getItem('agent'));
    if (!agentData) {
        window.location.href = 'agent-login.html';
    }

    let allBookings = [];
    let monthlyEarnings = {};
    let earningsChart = null;

    // Display agent info
    document.getElementById('agentName').innerText = agentData.name || agentData.id;
    document.getElementById('agentIdDisplay').innerText = agentData.id;
    document.getElementById('agentCity').innerText = agentData.city || 'Not Set';

    async function loadData() {
        try {
            // Get bookings for this agent only
            const q = query(collection(db, "bookings"), where("agentId", "==", agentData.id));
            const snapshot = await getDocs(q);
            allBookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            calculateStats();
            renderStats();
            renderBookings();
            renderChart();
        } catch (error) {
            console.error("Error loading data:", error);
            document.getElementById('bookingsTable').innerHTML = '<tr><td colspan="7" class="empty-state">Error loading bookings</td></tr>';
        }
    }

    function calculateStats() {
        // Only confirmed and completed bookings count for earnings
        const confirmedBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        
        const totalBookings = allBookings.length;
        const confirmedCount = confirmedBookings.length;
        const totalAmount = confirmedBookings.reduce((sum, b) => {
            const amount = parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0;
            return sum + amount;
        }, 0);
        const totalCommission = Math.floor(totalAmount * 0.025); // 2.5% commission
        
        // Calculate monthly earnings for chart
        monthlyEarnings = {};
        confirmedBookings.forEach(b => {
            if (b.createdAt) {
                const date = new Date(b.createdAt);
                const month = date.toLocaleString('default', { month: 'short' });
                const amount = parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0;
                const commission = Math.floor(amount * 0.025);
                monthlyEarnings[month] = (monthlyEarnings[month] || 0) + commission;
            }
        });
        
        return { totalBookings, confirmedCount, totalAmount, totalCommission };
    }

    function renderStats() {
        const stats = calculateStats();
        const target = agentData.target || 50000;
        const achieved = stats.totalAmount;
        const percent = Math.min(100, (achieved / target) * 100);
        const remaining = Math.max(0, target - achieved);
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value">${stats.totalBookings}</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value">${stats.confirmedCount}</div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value">₹${stats.totalAmount.toLocaleString()}</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value">₹${stats.totalCommission.toLocaleString()}</div>
                <div class="stat-label">Your Earnings (2.5%)</div>
            </div>
        `;
        
        document.getElementById('targetAmount').innerHTML = `🎯 ₹${target.toLocaleString()}`;
        document.getElementById('achievedAmount').innerHTML = `₹${achieved.toLocaleString()}`;
        document.getElementById('remainingAmount').innerHTML = `Remaining: ₹${remaining.toLocaleString()}`;
        document.getElementById('percentageText').innerHTML = `${Math.floor(percent)}% Completed`;
        document.getElementById('progressFill').style.width = `${percent}%`;
    }

    function renderBookings() {
        const tbody = document.getElementById('bookingsTable');
        
        if (allBookings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No bookings yet. Start referring vendors!</td></tr>';
            return;
        }
        
        tbody.innerHTML = allBookings.map(b => {
            const amount = parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0;
            const commission = Math.floor(amount * 0.025);
            return `
                <tr>
                    <td>${b.id?.slice(-6) || '-'}</td>
                    <td><strong>${b.userName || '-'}</strong><br><small>${b.userPhone || '-'}</small></td>
                    <td>${b.vendorName || '-'}</td>
                    <td>${b.eventDate || '-'}</td>
                    <td>₹${amount.toLocaleString()}</td>
                    <td><span style="color:#ff6b35; font-weight:600;">₹${commission.toLocaleString()}</span></td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                </tr>
            `;
        }).join('');
    }

    function renderChart() {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const data = months.map(m => monthlyEarnings[m] || 0);
        
        const ctx = document.getElementById('earningsChart').getContext('2d');
        
        if (earningsChart) {
            earningsChart.destroy();
        }
        
        earningsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months,
                datasets: [{
                    label: 'Commission Earned (₹)',
                    data: data,
                    backgroundColor: '#ff6b35',
                    borderRadius: 8,
                    barPercentage: 0.7
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: { callbacks: { label: (ctx) => `₹${ctx.raw.toLocaleString()}` } }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { callback: (val) => `₹${val}` } }
                }
            }
        });
    }

    window.logout = () => {
        localStorage.removeItem('agent');
        window.location.href = 'agent-login.html';
    };

    // Load data
    loadData();
</script>
</body>
</html>
