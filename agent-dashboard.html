<div class="table-card" style="margin-top: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3><i class="fas fa-users"></i> Detailed Customer Bookings</h3>
        <button onclick="location.reload()" style="background:#eee; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>
    <div style="overflow-x: auto;">
        <table id="agentBookingsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Booking ID</th>
                    <th>Customer Name</th>
                    <th>Contact Info</th>
                    <th>Venue / Address</th>
                    <th>Amount</th>
                    <th>Earned</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="bookingsTableBody">
                <tr><td colspan="8" style="text-align:center; padding:30px;">Fetching detailed data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    // ... (Firebase Initialization same rahegi) ...

    function updateUI(data) {
        const tbody = document.getElementById('bookingsTableBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">No bookings found.</td></tr>';
            return;
        }

        // Sorting: Latest bookings first
        data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        tbody.innerHTML = data.map(b => {
            const amount = Number(b.amount || 0);
            const commission = Math.floor(amount * 0.025);
            
            // Date formatting
            let displayDate = "N/A";
            if(b.createdAt) {
                const d = b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
                displayDate = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
            }

            return `
                <tr>
                    <td><strong>${displayDate}</strong></td>
                    <td><small>#${b.id.slice(-6).toUpperCase()}</small></td>
                    <td><strong>${b.userName || b.customerName || 'Guest'}</strong></td>
                    <td>
                        <i class="fas fa-phone" style="font-size:10px; color:#666;"></i> ${b.userPhone || b.phone || 'N/A'}<br>
                        <i class="fas fa-envelope" style="font-size:10px; color:#666;"></i> <small>${b.userEmail || b.email || '-'}</small>
                    </td>
                    <td>
                        <span style="font-size:12px;">${b.vendorName || 'General Venue'}</span><br>
                        <small style="color:#888;">${b.address || b.location || 'No address provided'}</small>
                    </td>
                    <td>₹${amount.toLocaleString()}</td>
                    <td style="color:#28a745; font-weight:700;">₹${commission.toLocaleString()}</td>
                    <td>
                        <span class="status-badge ${getStatusClass(b.status)}">
                            ${(b.status || 'pending').toUpperCase()}
                        </span>
                    </td>
                </tr>
            `;
        }).join('');

        // Update top stats cards
        updateTopStats(data);
    }

    function getStatusClass(status) {
        status = status ? status.toLowerCase() : 'pending';
        if (status === 'confirmed' || status === 'completed') return 'status-confirmed';
        if (status === 'cancelled') return 'status-cancelled';
        return 'status-pending';
    }

    function updateTopStats(data) {
        const confirmed = data.filter(b => b.status === 'confirmed' || b.status === 'completed');
        const revenue = confirmed.reduce((s, b) => s + (Number(b.amount) || 0), 0);
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-value">${data.length}</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₹${revenue.toLocaleString()}</div>
                <div class="stat-label">Confirmed Revenue</div>
            </div>
            <div class="stat-card" style="border: 2px solid #ff6b35;">
                <div class="stat-value">₹${Math.floor(revenue * 0.025).toLocaleString()}</div>
                <div class="stat-label">Your Payout (2.5%)</div>
            </div>
        `;
    }
</script>
