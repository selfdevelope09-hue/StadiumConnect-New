<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        .header { background: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .agent-info { background: #fff5f0; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 20px; padding: 24px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; }
        .target-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .progress-bar { background: #e0e0e0; border-radius: 20px; height: 12px; margin: 15px 0; }
        .progress-fill { background: #ff6b35; border-radius: 20px; height: 100%; width: 0%; }
        .bookings-card { background: white; border-radius: 20px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .commission-amount { color: #28a745; font-weight: bold; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #d4edda; color: #155724; }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="agent-info"><i class="fas fa-user-tie"></i> <span id="agentName"></span> | ID: <span id="agentIdDisplay"></span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="target-card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span><i class="fas fa-bullseye"></i> Monthly Target</span>
            <span id="targetAmount">₹0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
            <span>Achieved: <strong id="achievedAmount">₹0</strong></span>
            <span id="remainingAmount">Remaining: ₹0</span>
            <span id="percentageText">0%</span>
        </div>
    </div>

    <div class="bookings-card">
        <h3>📋 My Bookings & Earnings</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead> <th>Booking ID</th><th>Customer</th><th>Vendor</th><th>Amount</th><th>Commission (2.5%)</th><th>Status</th> </thead>
                <tbody id="bookingsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const agentData = JSON.parse(localStorage.getItem('agent'));
    if (!agentData) window.location.href = 'agent-login.html';

    document.getElementById('agentName').innerText = agentData.name || agentData.id;
    document.getElementById('agentIdDisplay').innerText = agentData.id;

    let allBookings = [];

    function calculateCommission(amount) {
        const price = parseInt(amount?.replace(/[^0-9]/g, '')) || 0;
        return Math.floor(price * 0.025);
    }

    async function loadData() {
        const q = query(collection(db, "bookings"), where("agentId", "==", agentData.id));
        const snapshot = await getDocs(q);
        allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        const confirmedBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        const totalAmount = confirmedBookings.reduce((sum, b) => sum + (parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0), 0);
        const totalCommission = Math.floor(totalAmount * 0.025);
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-value">${allBookings.length}</div><div>Total Bookings</div></div>
            <div class="stat-card"><div class="stat-value">${confirmedBookings.length}</div><div>Confirmed</div></div>
            <div class="stat-card"><div class="stat-value">₹${totalAmount.toLocaleString()}</div><div>Total Revenue</div></div>
            <div class="stat-card"><div class="stat-value">₹${totalCommission.toLocaleString()}</div><div>Your Earnings</div></div>
        `;
        
        const target = agentData.target || 50000;
        const percent = Math.min(100, (totalAmount / target) * 100);
        document.getElementById('targetAmount').innerHTML = `🎯 ₹${target.toLocaleString()}`;
        document.getElementById('achievedAmount').innerHTML = `₹${totalAmount.toLocaleString()}`;
        document.getElementById('remainingAmount').innerHTML = `Remaining: ₹${Math.max(0, target - totalAmount).toLocaleString()}`;
        document.getElementById('percentageText').innerHTML = `${Math.floor(percent)}% Completed`;
        document.getElementById('progressFill').style.width = `${percent}%`;
        
        const tbody = document.getElementById('bookingsTable');
        if(allBookings.length === 0) { tbody.innerHTML = '.<td colspan="6">No bookings yet</td>.'; return; }
        tbody.innerHTML = allBookings.map(b => {
            const amount = parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0;
            const commission = Math.floor(amount * 0.025);
            return `
                <tr>
                    <td>${b.id?.slice(-6)}</td>
                    <td>${b.userName || '-'}</td>
                    <td>${b.vendorName || '-'}</td>
                    <td>₹${amount.toLocaleString()}</td>
                    <td class="commission-amount">₹${commission.toLocaleString()}</td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                 </tr>
            `;
        }).join('');
    }

    window.logout = () => { localStorage.removeItem('agent'); window.location.href = 'agent-login.html'; };
    loadData();
</script>
</body>
</html>
