<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agent Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        .header { background: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .agent-info { background: #fff5f0; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 24px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; }
        .stat-label { color: #666; margin-top: 8px; }
        
        /* Target Card */
        .target-card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .target-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .progress-bar { background: #e0e0e0; border-radius: 20px; height: 12px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: #ff6b35; border-radius: 20px; height: 100%; width: 0%; transition: width 0.5s; }
        .target-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; color: #666; }
        .remaining { color: #ff6b35; font-weight: 600; }
        
        /* Chart Card */
        .chart-card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .chart-container { height: 250px; }
        
        /* Bookings Table */
        .bookings-card { background: white; border-radius: 24px; padding: 24px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 500; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="agent-info"><i class="fas fa-user-tie"></i> <span id="agentName"></span> | ID: <span id="agentIdDisplay"></span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Target Card -->
    <div class="target-card">
        <div class="target-title">
            <span><i class="fas fa-bullseye"></i> Monthly Target</span>
            <span id="targetAmount">₹0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="target-stats">
            <span>Achieved: <strong id="achievedAmount">₹0</strong></span>
            <span class="remaining" id="remainingAmount">Remaining: ₹0</span>
            <span id="percentageText">0% Completed</span>
        </div>
    </div>

    <!-- Earnings Chart -->
    <div class="chart-card">
        <div class="section-title"><i class="fas fa-chart-line"></i> Your Earnings Trend</div>
        <div class="chart-container"><canvas id="earningsChart"></canvas></div>
    </div>

    <!-- Bookings List -->
    <div class="bookings-card">
        <div class="section-title"><i class="fas fa-calendar-check"></i> My Bookings</div>
        <div style="overflow-x: auto;">
            <table>
                <thead> <tr><th>Booking ID</th><th>Customer</th><th>Vendor</th><th>Event Date</th><th>Amount</th><th>Commission</th><th>Status</th></tr> </thead>
                <tbody id="bookingsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const agentData = JSON.parse(localStorage.getItem('agent'));
    if (!agentData) window.location.href = 'agent-login.html';

    document.getElementById('agentName').innerText = agentData.name || agentData.id;
    document.getElementById('agentIdDisplay').innerText = agentData.id;

    let allBookings = [];
    let monthlyEarnings = {};

    async function loadData() {
        const q = query(collection(db, "bookings"), where("agentId", "==", agentData.id));
        const snapshot = await getDocs(q);
        allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        calculateStats();
        renderStats();
        renderBookings();
        renderChart();
    }

    function calculateStats() {
        const confirmedBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed');
        const totalAmount = confirmedBookings.reduce((sum, b) => sum + (parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0), 0);
        const totalCommission = Math.floor(totalAmount * 0.025); // 2.5% commission
        
        // Monthly earnings for chart
        monthlyEarnings = {};
        confirmedBookings.forEach(b => {
            if (b.createdAt) {
                const month = new Date(b.createdAt).toLocaleString('default', { month: 'short' });
                const commission = Math.floor((parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0) * 0.025);
                monthlyEarnings[month] = (monthlyEarnings[month] || 0) + commission;
            }
        });
        
        return { totalBookings: allBookings.length, confirmed: confirmedBookings.length, totalAmount, totalCommission };
    }

    function renderStats() {
        const stats = calculateStats();
        const target = agentData.target || 50000;
        const achieved = stats.totalAmount;
        const percent = Math.min(100, (achieved / target) * 100);
        const commission = stats.totalCommission;
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-value">${stats.totalBookings}</div><div class="stat-label">Total Bookings</div></div>
            <div class="stat-card"><div class="stat-value">${stats.confirmed}</div><div class="stat-label">Confirmed</div></div>
            <div class="stat-card"><div class="stat-value">₹${achieved.toLocaleString()}</div><div class="stat-label">Total Revenue</div></div>
            <div class="stat-card"><div class="stat-value">₹${commission.toLocaleString()}</div><div class="stat-label">Your Earnings (2.5%)</div></div>
        `;
        
        document.getElementById('targetAmount').innerHTML = `🎯 ₹${target.toLocaleString()}`;
        document.getElementById('achievedAmount').innerHTML = `₹${achieved.toLocaleString()}`;
        document.getElementById('remainingAmount').innerHTML = `Remaining: ₹${Math.max(0, target - achieved).toLocaleString()}`;
        document.getElementById('percentageText').innerHTML = `${Math.floor(percent)}% Completed`;
        document.getElementById('progressFill').style.width = `${percent}%`;
    }

    function renderBookings() {
        const tbody = document.getElementById('bookingsTable');
        if (allBookings.length === 0) { tbody.innerHTML = '}<td colspan="7">No bookings yet</td>'; return; }
        tbody.innerHTML = allBookings.map(b => {
            const amount = parseInt(b.amount?.replace(/[^0-9]/g, '')) || 0;
            const commission = Math.floor(amount * 0.025);
            return `
                <tr>
                    <td>${b.id?.slice(-6)}</td>
                    <td>${b.userName || '-'}</td>
                    <td>${b.vendorName || '-'}</td>
                    <td>${b.eventDate || '-'}</td>
                    <td>₹${amount.toLocaleString()}</td>
                    <td>₹${commission.toLocaleString()}</td>
                    <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                </tr>
            `;
        }).join('');
    }

    function renderChart() {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const data = months.map(m => monthlyEarnings[m] || 0);
        new Chart(document.getElementById('earningsChart'), {
            type: 'bar',
            data: { labels: months, datasets: [{ label: 'Commission Earned (₹)', data: data, backgroundColor: '#ff6b35', borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
        });
    }

    window.logout = () => { localStorage.removeItem('agent'); window.location.href = 'agent-login.html'; };
    loadData();
</script>
</body>
</html>
