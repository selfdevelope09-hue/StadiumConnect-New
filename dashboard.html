<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        
        .header {
            background: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .user-info { background: #fff5f0; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #ff6b35; }
        
        .bookings-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 500; font-size: 13px; text-transform: uppercase; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }
        .action-btn {
            background: #ff6b35;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
        }
        .action-btn:hover { background: #e55a2b; }
        
        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
            .stats-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div class="user-info"><i class="fas fa-user-circle"></i> <span id="userName"></span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalBookings">0</div><div>Total Bookings</div></div>
        <div class="stat-card"><div class="stat-value" id="pendingBookings">0</div><div>Pending</div></div>
        <div class="stat-card"><div class="stat-value" id="confirmedBookings">0</div><div>Confirmed</div></div>
        <div class="stat-card"><div class="stat-value" id="wishlistCount">0</div><div>Wishlist</div></div>
    </div>
    
    <div class="bookings-card">
        <div class="section-title">📋 My Bookings</div>
        <div id="bookingsList"></div>
    </div>
    
    <div class="action-buttons">
        <a href="vendors.html" class="action-btn">🔍 Browse Vendors</a>
        <a href="wishlist.html" class="action-btn">❤️ My Wishlist</a>
        <a href="vendor-compare.html" class="action-btn">⚖️ Compare Vendors</a>
        <a href="event-planner.html" class="action-btn">📋 Event Planner</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
        await loadBookings();
    });

    async function loadBookings() {
        const q = query(collection(db, "bookings"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        const total = allBookings.length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const confirmed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        
        document.getElementById('totalBookings').innerText = total;
        document.getElementById('pendingBookings').innerText = pending;
        document.getElementById('confirmedBookings').innerText = confirmed;
        
        const wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.uid}`) || '[]');
        document.getElementById('wishlistCount').innerText = wishlist.length;
        
        const bookingsList = document.getElementById('bookingsList');
        if (allBookings.length === 0) {
            bookingsList.innerHTML = '<div class="empty-state">📭 No bookings yet. <a href="vendors.html" style="color:#ff6b35;">Browse vendors</a> to get started!</div>';
            return;
        }
        
        bookingsList.innerHTML = `
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>ID</th><th>Vendor</th><th>Event Date</th><th>Status</th></tr></thead>
                    <tbody>
                        ${allBookings.map(b => `
                            <tr>
                                <td>${b.id.slice(-6)}</td>
                                <td><strong>${b.vendorName || '-'}</strong></td>
                                <td>${b.eventDate || '-'}</td>
                                <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    window.logout = () => {
        auth.signOut();
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
