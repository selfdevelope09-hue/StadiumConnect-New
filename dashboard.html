<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StadiumConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; }
        .header { background: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo span { color: #ff6b35; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 800; color: #ff6b35; }
        .booking-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .review-btn { background: #ff6b35; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .review-btn.disabled { background: #ccc; cursor: not-allowed; }
        .review-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .review-modal-content { background: white; border-radius: 24px; padding: 30px; width: 90%; max-width: 450px; }
        .star-rating { display: flex; gap: 10px; font-size: 32px; cursor: pointer; justify-content: center; margin: 20px 0; }
        .star { color: #ddd; transition: 0.2s; }
        .star.active { color: #ffc107; }
        .status-completed { background: #d4edda; color: #155724; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">STADIUM<span>CONNECT</span></div>
    <div id="userInfo"></div>
</header>

<div class="container">
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalBookings">0</div><div>Total Bookings</div></div>
        <div class="stat-card"><div class="stat-number" id="completedBookings">0</div><div>Completed</div></div>
        <div class="stat-card"><div class="stat-number" id="pendingReviews">0</div><div>Pending Reviews</div></div>
    </div>
    
    <h3>📋 My Bookings</h3>
    <div id="bookingsList"></div>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="review-modal">
    <div class="review-modal-content">
        <h3>⭐ Rate & Review</h3>
        <p id="reviewVendorName"></p>
        <div class="star-rating" id="starRating">
            <span class="star" data-rating="1">★</span>
            <span class="star" data-rating="2">★</span>
            <span class="star" data-rating="3">★</span>
            <span class="star" data-rating="4">★</span>
            <span class="star" data-rating="5">★</span>
        </div>
        <textarea id="reviewComment" rows="3" placeholder="Share your experience..." style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd;"></textarea>
        <button onclick="submitReview()" style="background:#ff6b35; color:white; border:none; padding:12px; border-radius:30px; width:100%; margin-top:15px;">Submit Review</button>
        <button onclick="closeReviewModal()" style="background:#f0f0f0; border:none; padding:10px; border-radius:30px; width:100%; margin-top:10px;">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let selectedBooking = null;
    let selectedRating = 0;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        document.getElementById('userInfo').innerHTML = `<span>👤 ${user.displayName || user.email}</span> <button onclick="logout()" style="background:#ff6b35; color:white; border:none; padding:8px 16px; border-radius:30px;">Logout</button>`;
        await loadBookings();
    });

    async function loadBookings() {
        const q = query(collection(db, "bookings"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        const bookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        // Get all reviews to check which bookings are already reviewed
        const reviewsSnap = await getDocs(collection(db, "reviews"));
        const reviewedBookingIds = new Set(reviewsSnap.docs.map(d => d.data().bookingId));
        
        document.getElementById('totalBookings').innerText = bookings.length;
        document.getElementById('completedBookings').innerText = bookings.filter(b => b.status === 'completed').length;
        document.getElementById('pendingReviews').innerText = bookings.filter(b => b.status === 'completed' && !reviewedBookingIds.has(b.id)).length;
        
        const bookingsList = document.getElementById('bookingsList');
        if (bookings.length === 0) {
            bookingsList.innerHTML = '<p style="text-align:center; color:#999;">No bookings yet</p>';
            return;
        }
        
        bookingsList.innerHTML = bookings.map(b => {
            const canReview = b.status === 'completed' && !reviewedBookingIds.has(b.id);
            return `
                <div class="booking-card">
                    <div>
                        <strong>${b.vendorName}</strong><br>
                        📅 ${b.eventDate} | ${b.eventType}<br>
                        📍 ${b.eventLocation}<br>
                        <span class="status-${b.status}">${b.status.toUpperCase()}</span>
                        ${b.paymentAmount ? `<br>💰 Paid: ₹${b.paymentAmount.toLocaleString()}` : ''}
                    </div>
                    <div>
                        ${canReview ? `<button class="review-btn" onclick="openReviewModal('${b.id}', '${b.vendorName}')">⭐ Write Review</button>` : 
                          b.status === 'completed' ? '<span style="color:#28a745;">✓ Reviewed</span>' : 
                          '<span style="color:#999;">Review after completion</span>'}
                    </div>
                </div>
            `;
        }).join('');
    }

    window.openReviewModal = (bookingId, vendorName) => {
        selectedBooking = { id: bookingId, vendorName };
        document.getElementById('reviewVendorName').innerHTML = `<strong>${vendorName}</strong>`;
        document.getElementById('reviewComment').value = '';
        selectedRating = 0;
        document.querySelectorAll('.star').forEach(star => star.classList.remove('active'));
        document.getElementById('reviewModal').style.display = 'flex';
    };

    window.closeReviewModal = () => {
        document.getElementById('reviewModal').style.display = 'none';
    };

    // Star rating click handler
    document.querySelectorAll('.star').forEach(star => {
        star.addEventListener('click', () => {
            selectedRating = parseInt(star.dataset.rating);
            document.querySelectorAll('.star').forEach((s, i) => {
                if (i < selectedRating) s.classList.add('active');
                else s.classList.remove('active');
            });
        });
    });

    window.submitReview = async () => {
        if (selectedRating === 0) {
            alert('Please select a rating');
            return;
        }
        
        const comment = document.getElementById('reviewComment').value;
        if (!comment) {
            alert('Please write a review');
            return;
        }
        
        // Get booking details
        const bookingDoc = await getDoc(doc(db, 'bookings', selectedBooking.id));
        const booking = bookingDoc.data();
        
        const reviewData = {
            vendorId: booking.vendorId,
            vendorName: booking.vendorName,
            bookingId: selectedBooking.id,
            userId: currentUser.uid,
            userName: currentUser.displayName || currentUser.email,
            userPhone: booking.userPhone,
            rating: selectedRating,
            comment: comment,
            verified: true,
            createdAt: new Date().toISOString()
        };
        
        await addDoc(collection(db, 'reviews'), reviewData);
        
        // Update vendor average rating
        const reviewsSnap = await getDocs(collection(db, "reviews"));
        const vendorReviews = reviewsSnap.docs.filter(doc => doc.data().vendorId === booking.vendorId);
        const avgRating = vendorReviews.reduce((sum, doc) => sum + doc.data().rating, 0) / vendorReviews.length;
        await updateDoc(doc(db, 'vendors', booking.vendorId), { rating: avgRating.toFixed(1), reviewsCount: vendorReviews.length });
        
        alert('✅ Thank you for your review!');
        closeReviewModal();
        loadBookings();
    };

    window.logout = () => {
        auth.signOut();
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
