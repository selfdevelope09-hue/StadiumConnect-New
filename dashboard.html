<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StadiumConnect | Premium Customer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --primary-light: #ff9068;
            --dark: #0a0a2a;
            --darker: #050517;
            --light: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: #fff;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
            color: var(--dark);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255,107,53,0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(255,107,53,0.3);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(10, 10, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }
        body.light-mode .header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,107,53,0.2);
            padding: 8px 20px;
            border-radius: 40px;
        }
        .user-info i { color: var(--primary); }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .theme-toggle, .share-dashboard-btn {
            background: rgba(255,107,53,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            color: var(--primary);
        }
        .theme-toggle:hover, .share-dashboard-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239,68,68,0.4);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,107,53,0.3);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-banner h1 { font-size: 32px; margin-bottom: 8px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        body.light-mode .stat-card {
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,107,53,0.5);
        }
        .stat-icon { font-size: 40px; margin-bottom: 15px; }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: rgba(255,255,255,0.7); font-size: 14px; }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 30px;
        }
        body.light-mode .card {
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i { color: var(--primary); }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .action-card {
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .action-card:hover {
            transform: translateY(-5px);
            background: rgba(255,107,53,0.2);
            border-color: var(--primary);
        }
        .action-icon { font-size: 48px; margin-bottom: 15px; }
        .action-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }

        /* Table */
        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        body.light-mode th, body.light-mode td {
            border-bottom: 1px solid #eee;
        }
        th {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }
        td { color: rgba(255,255,255,0.9); }
        body.light-mode td { color: #333; }
        tr:hover { background: rgba(255,255,255,0.05); }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.3);
        }
        .status-confirmed, .status-completed {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .status-cancelled {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* Review Modal */
        .review-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .review-modal.active {
            display: flex;
        }
        .review-modal-content {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,107,53,0.3);
        }
        body.light-mode .review-modal-content {
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .review-modal-content h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .star-rating {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .star-rating i {
            font-size: 40px;
            cursor: pointer;
            color: #ddd;
            transition: 0.2s;
        }
        .star-rating i.active, .star-rating i.hover {
            color: #ffb347;
        }
        .review-modal textarea {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            margin-bottom: 20px;
        }
        body.light-mode .review-modal textarea {
            background: #f5f5f5;
            color: #333;
            border-color: #ddd;
        }
        .review-modal button {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            border-left: 4px solid var(--success);
            color: white;
            animation: slideUp 0.3s ease;
        }
        .toast.error { border-left-color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.6);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="particles" id="particles"></div>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">🏟️ STADIUM<span>CONNECT</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Loading...</span>
        </div>
        <div class="header-actions">
            <button class="share-dashboard-btn" onclick="shareDashboard()"><i class="fas fa-share-alt"></i></button>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="welcome-banner">
        <h1>Welcome back, <span id="userGreeting">User</span>! 👋</h1>
        <p>Your event planning journey continues. Track your bookings, explore new venues, and share your experiences.</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-bolt"></i> Quick Actions</div>
        </div>
        <div class="action-grid">
            <a href="vendors.html" class="action-card">
                <div class="action-icon"><i class="fas fa-store"></i></div>
                <div class="action-title">Browse Vendors</div>
            </a>
            <a href="wishlist.html" class="action-card">
                <div class="action-icon"><i class="fas fa-heart"></i></div>
                <div class="action-title">My Wishlist</div>
            </a>
            <a href="vendor-compare.html" class="action-card">
                <div class="action-icon"><i class="fas fa-chart-line"></i></div>
                <div class="action-title">Compare Vendors</div>
            </a>
            <a href="event-planner.html" class="action-card">
                <div class="action-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="action-title">Event Planner</div>
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-clock"></i> Recent Bookings</div>
            <a href="bookings.html" style="color: var(--primary); text-decoration: none;">View All →</a>
        </div>
        <div class="table-container" id="bookingsContainer"></div>
    </div>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="review-modal">
    <div class="review-modal-content">
        <h3><i class="fas fa-star" style="color: #ffb347;"></i> Rate Your Experience</h3>
        <div class="star-rating" id="reviewStars">
            <i class="far fa-star" data-rating="1"></i>
            <i class="far fa-star" data-rating="2"></i>
            <i class="far fa-star" data-rating="3"></i>
            <i class="far fa-star" data-rating="4"></i>
            <i class="far fa-star" data-rating="5"></i>
        </div>
        <textarea id="reviewComment" rows="4" placeholder="Share your experience with this vendor..."></textarea>
        <button onclick="submitReviewFromModal()">Submit Review</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy, limit, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzorBcavy3e12mTbGKgUud-Mm-TxnnZIM",
        authDomain: "stadiumconnect-8fecb.firebaseapp.com",
        projectId: "stadiumconnect-8fecb",
        storageBucket: "stadiumconnect-8fecb.firebasestorage.app",
        messagingSenderId: "458108198578",
        appId: "1:458108198578:web:83d83646f0e24e718b73ab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allBookings = [];
    let currentBookingForReview = null;
    let selectedRating = 0;

    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 15 + 10 + 's';
            container.appendChild(particle);
        }
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    window.shareDashboard = async () => {
        const shareData = {
            title: 'StadiumConnect Dashboard',
            text: `Check out my event planning dashboard on StadiumConnect! I've booked ${allBookings.length} events so far.`,
            url: window.location.href
        };
        if (navigator.share) {
            try {
                await navigator.share(shareData);
                showToast('Shared successfully!');
            } catch (err) {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied to clipboard!');
            }
        } else {
            navigator.clipboard.writeText(window.location.href);
            showToast('Link copied to clipboard!');
        }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.theme-toggle');
        btn.innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.theme-toggle').innerHTML = '☀️';
    }

    async function loadBookings() {
        if (!currentUser) return;
        
        const q = query(
            collection(db, "bookings"), 
            where("userId", "==", currentUser.uid),
            orderBy("createdAt", "desc"),
            limit(10)
        );
        const snapshot = await getDocs(q);
        allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        
        const total = allBookings.length;
        const pending = allBookings.filter(b => b.status === 'pending').length;
        const confirmed = allBookings.filter(b => b.status === 'confirmed' || b.status === 'completed').length;
        const wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.uid}`) || '[]');
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-value">${total}</div><div class="stat-label">Total Bookings</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">${confirmed}</div><div class="stat-label">Completed</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-heart"></i></div><div class="stat-value">${wishlist.length}</div><div class="stat-label">Wishlist</div></div>
        `;
        
        renderBookingsTable();
    }

    async function checkIfUserReviewed(vendorId) {
        if (!currentUser) return false;
        const q = query(
            collection(db, "reviews"),
            where("userId", "==", currentUser.uid),
            where("vendorId", "==", vendorId)
        );
        const snapshot = await getDocs(q);
        return snapshot.size > 0;
    }

    function renderBookingsTable() {
        const container = document.getElementById('bookingsContainer');
        if (allBookings.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px;"></i><p>No bookings yet. Start exploring vendors!</p><a href="vendors.html" style="color: var(--primary);">Browse Vendors →</a></div>`;
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead>
                    <tr><th>Booking ID</th><th>Vendor</th><th>Event Date</th><th>Amount</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="bookingsTableBody"></tbody>
            </table>
        `;
        
        const tbody = document.getElementById('bookingsTableBody');
        tbody.innerHTML = '';
        
        allBookings.forEach(async (b) => {
            const hasReviewed = await checkIfUserReviewed(b.vendorId);
            const isCompleted = b.status === 'confirmed' || b.status === 'completed';
            const showReviewBtn = isCompleted && !hasReviewed;
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><code>${b.id.slice(-8)}</code></td>
                <td><strong>${b.vendorName || b.vendor || '-'}</strong><br><small>${b.category || 'stadium'}</small></td>
                <td>${b.eventDate || b.date || '-'}</td>
                <td>₹${(b.amount || 0).toLocaleString()}</td>
                <td><span class="status-badge status-${b.status || 'pending'}">${b.status || 'pending'}</span></td>
                <td>
                    ${showReviewBtn ? `<button class="review-btn" data-booking='${JSON.stringify(b)}' style="background: linear-gradient(135deg, #ffb347, #ff8c00); border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px;"><i class="fas fa-star"></i> Rate & Review</button>` : 
                      (hasReviewed ? '<span style="color: #10b981;"><i class="fas fa-check-circle"></i> Reviewed</span>' : '<span style="color: #666;">—</span>')}
                </td>
            `;
            tbody.appendChild(row);
        });
        
        document.querySelectorAll('.review-btn').forEach(btn => {
            btn.onclick = () => {
                const booking = JSON.parse(btn.dataset.booking);
                openReviewModal(booking);
            };
        });
    }

    function openReviewModal(booking) {
        currentBookingForReview = booking;
        selectedRating = 0;
        document.getElementById('reviewComment').value = '';
        
        const stars = document.querySelectorAll('#reviewStars i');
        stars.forEach(star => {
            star.className = 'far fa-star';
            star.style.color = '#ddd';
        });
        
        document.getElementById('reviewModal').classList.add('active');
    }

    function setupStarRating() {
        const stars = document.querySelectorAll('#reviewStars i');
        stars.forEach(star => {
            star.onmouseenter = () => {
                const rating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= rating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
            star.onmouseleave = () => {
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
            star.onclick = () => {
                selectedRating = parseInt(star.dataset.rating);
                stars.forEach(s => {
                    if (parseInt(s.dataset.rating) <= selectedRating) {
                        s.className = 'fas fa-star';
                        s.style.color = '#ffb347';
                    } else {
                        s.className = 'far fa-star';
                        s.style.color = '#ddd';
                    }
                });
            };
        });
    }

    window.submitReviewFromModal = async () => {
        if (selectedRating === 0) {
            showToast('Please select a rating', true);
            return;
        }
        
        const comment = document.getElementById('reviewComment').value.trim();
        if (!comment) {
            showToast('Please write your review', true);
            return;
        }
        
        try {
            await addDoc(collection(db, 'reviews'), {
                vendorId: currentBookingForReview.vendorId,
                vendorName: currentBookingForReview.vendorName,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0],
                rating: selectedRating,
                comment: comment,
                bookingId: currentBookingForReview.id,
                createdAt: new Date().toISOString()
            });
            
            showToast('✅ Thank you for your review!');
            document.getElementById('reviewModal').classList.remove('active');
            loadBookings();
        } catch (error) {
            showToast('Failed to submit review: ' + error.message, true);
        }
    };

    function closeModalOnBackground(e) {
        if (e.target === document.getElementById('reviewModal')) {
            document.getElementById('reviewModal').classList.remove('active');
        }
    }

    window.logout = () => {
        auth.signOut();
        localStorage.removeItem('user');
        localStorage.removeItem('theme');
        window.location.href = 'index.html';
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { 
            window.location.href = 'login.html'; 
            return; 
        }
        currentUser = user;
        const name = user.displayName || user.email?.split('@')[0] || 'User';
        document.getElementById('userName').innerText = name;
        document.getElementById('userGreeting').innerText = name;
        await loadBookings();
    });

    document.getElementById('reviewModal').addEventListener('click', closeModalOnBackground);
    setupStarRating();
    createParticles();
</script>
</body>
</html>
